<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECEIPTS - 25 Professional Templates</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .no-print { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; text-transform: uppercase; color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; }
        h3 { background: var(--s); color: white; padding: 10px; border-radius: 5px; font-size: 14px; text-transform: uppercase; margin-top: 25px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; }
        input:focus { border-color: var(--p); }

        /* Template Buttons */
        .template-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 30px 0; }
        .tpl-btn { padding: 12px 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .tpl-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Preview Display */
        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; border-radius: 12px; margin-top: 30px; }
        #render-target { background: white; width: 210mm; min-height: 148mm; padding: 15mm; box-sizing: border-box; }
        .btn-act { padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 14px; }

        @media (max-width: 768px) { .template-grid { grid-template-columns: repeat(2, 1fr); } }
        @media print { .no-print { display: none; } .preview-box { background: white; padding: 0; } #render-target { width: 100%; box-shadow: none; border:none !important; } }



/* 12. VERTICAL STACK FOR TOOL PAGES (REFINED) */
/* This ensures buttons stack vertically and fit within the screen */

/* 1. Target the containers for buttons and tools */
.featured-grid, 
.button-group, 
.tools-container,
.btn-group,
#tpl-grid {
    display: flex !important;
    flex-direction: column !important; /* Force vertical stacking */
    align-items: center !important;
    width: 100% !important;
    max-width: 100% !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    box-sizing: border-box !important;
}

/* 2. Target the buttons themselves to make them responsive */
.select-btn, 
.exciting-tools-btn, 
.btn-act,
button,
select {
    width: 100% !important;      /* Make them full width of container */
    max-width: 500px !important; /* Prevent them from becoming too wide on desktop */
    margin: 5px 0 !important;
    padding: 12px 15px !important;
    height: auto !important;     /* Allow button to expand if text is long */
    white-space: normal !important; /* Allow text to wrap inside the button */
    word-wrap: break-word !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
}

/* 3. Specifically fix the Template Grid if it's overflowing */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)) !important; /* Better than forced columns */
    gap: 5px !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Ensure images or barcodes inside buttons don't break the width */
button img, button svg {
    max-width: 100% !important;
    height: auto !important;
}
    </style>
</head>
<body>

<div class="no-print">
    <div class="editor-panel">
        <h1>Receipt Templates Manager</h1>

        <!-- Header Information -->
        <h3>1. Header (Business Information)</h3>
        <div class="form-grid">
            <div class="field"><label>Logo</label><input type="file" id="logo-input" accept="image/*" onchange="loadLogo(this)"></div>
            <div class="field"><label>Business Name</label><input type="text" id="b_name" value="Global Services Pvt Ltd" oninput="update()"></div>
            <div class="field"><label>GSTIN</label><input type="text" id="b_gst" value="27ABCDE1234F1Z1" oninput="update()"></div>
            <div class="field"><label>Phone</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
            <div class="field"><label>Email</label><input type="text" id="b_email" value="billing@globalservices.com" oninput="update()"></div>
            <div class="field"><label>Website</label><input type="text" id="b_web" value="www.globalservices.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Business Address</label><input type="text" id="b_addr" value="Floor 5, Innovation Hub, New Delhi" oninput="update()"></div>
        </div>

        <!-- Receipt & Customer Info -->
        <h3>2. Receipt & Customer Details</h3>
        <div class="form-grid">
            <div class="field"><label>Receipt Number</label><input type="text" id="r_no" readonly oninput="update()"></div>
            <div class="field"><label>Receipt Date</label><input type="date" id="r_date" oninput="update()"></div>
            <div class="field"><label>Customer Name</label><input type="text" id="c_name" value="Acme Corporation" oninput="update()"></div>
            <div class="field"><label>Customer GSTIN</label><input type="text" id="c_gst" value="URP" oninput="update()"></div>
            <div class="field"><label>Cust. Phone</label><input type="text" id="c_phone" value="+91 88888 77777" oninput="update()"></div>
            <div class="field"><label>Cust. Email/Web</label><input type="text" id="c_web" value="www.acme.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Customer Address</label><input type="text" id="c_addr" value="Commercial Park, Mumbai" oninput="update()"></div>
        </div>

        <!-- Payment Details -->
        <h3>3. Payment Details</h3>
        <div class="form-grid">
            <div class="field"><label>Amount Received (Figures)</label><input type="number" id="p_amt" value="5000" oninput="handleAmount(this.value)"></div>
            <div class="field" style="grid-column: span 2;"><label>Amount in Words</label><input type="text" id="p_words" value="Five Thousand Only" oninput="update()"></div>
            <div class="field"><label>Payment Mode</label><select id="p_mode" onchange="update()"><option>Cash</option><option>UPI / GooglePay</option><option>Bank Transfer</option><option>Credit/Debit Card</option></select></div>
            <div class="field"><label>Invoice No. Ref</label><input type="text" id="p_inv" value="INV-2024-101" oninput="update()"></div>
            <div class="field"><label>Balance Due</label><input type="text" id="p_due" value="0.00" oninput="update()"></div>
        </div>

        <!-- Terms -->
        <h3>4. Footer Details</h3>
        <div class="form-grid">
            <div class="field" style="grid-column: span 2;"><label>Terms & Conditions</label><textarea id="f_terms" rows="2" oninput="update()">1. This is a computer generated receipt. 2. Subject to New Delhi jurisdiction.</textarea></div>
            <div class="field" style="grid-column: span 2;"><label>Thank You Message</label><input type="text" id="f_thank" value="Thank you for your business. We appreciate your prompt payment!" oninput="update()"></div>
        </div>

        <h3>5. Select Template Design</h3>
        <div class="template-grid" id="btn-container"></div>

        <div style="display:flex; gap:15px; justify-content:center; margin-bottom:40px;">
            <button class="btn-act" style="background:#10b981" onclick="saveData()"><i class="fas fa-save"></i> Save Data</button>
            <button class="btn-act" style="background:#2563eb" onclick="exportWord()"><i class="fas fa-file-word"></i> Download Word</button>
        </div>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<script>
    let logoImg = "";
    let activeTpl = 1;
    const colors = ["#2563eb","#52525b","#1e3a8a","#404040","#854d0e","#0d9488","#4338ca","#78350f","#14b8a6","#2563eb","#166534","#1e1b4b","#0891b2","#4682b4","#4b5563","#0f172a","#ea580c","#6d28d9","#334155","#166534","#2563eb","#000000","#1e3a8a","#475569","#2563eb"];
    const names = ["Corporate Blue", "Minimal Clean", "Classic Business", "Retail Shop", "Elegant Premium", "Modern Card", "Startup Style", "Border Frame", "Soft Pastel", "Gradient Header", "Compact Business", "Prof Accounting", "Left Accent", "Center Highlight", "Boxed Section", "Premium Corporate", "Retail Friendly", "Gradient Sidebar", "Clean Professional", "Business Ledger", "Modern Tech", "Black Header", "Simple Local", "Modern Elegant", "Fintech Ultra"];

    function handleAmount(val) {
        document.getElementById('p_words').value = numberToWords(val) + " Only";
        update();
    }

    function numberToWords(number) {
        const first = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
        const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        const mad = ['', 'Thousand', 'Million', 'Billion', 'Trillion'];
        let word = '';
        for (let i = 0; i < mad.length; i++) {
            let tempNumber = number % (100 * Math.pow(1000, i));
            if (Math.floor(tempNumber / Math.pow(1000, i)) !== 0) {
                if (Math.floor(tempNumber / Math.pow(1000, i)) < 20) word = first[Math.floor(tempNumber / Math.pow(1000, i))] + mad[i] + ' ' + word;
                else word = tens[Math.floor(tempNumber / (10 * Math.pow(1000, i)))] + '-' + first[Math.floor(tempNumber / Math.pow(1000, i)) % 10] + mad[i] + ' ' + word;
            }
            tempNumber = number % Math.pow(1000, i + 1);
            if (Math.floor(tempNumber / (100 * Math.pow(1000, i))) !== 0) word = first[Math.floor(tempNumber / (100 * Math.pow(1000, i)))] + ' Hundred ' + word;
        }
        return word.trim();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoImg = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function init() {
        const container = document.getElementById('btn-container');
        names.forEach((name, i) => {
            const btn = document.createElement('button');
            btn.className = 'tpl-btn';
            btn.style.background = colors[i];
            btn.innerText = name;
            btn.onclick = () => { activeTpl = i + 1; update(); };
            container.appendChild(btn);
        });
        document.getElementById('r_no').value = "RCP-" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById('r_date').valueAsDate = new Date();
        update();
    }

    function update() {
        const d = {
            b_name: document.getElementById('b_name').value,
            b_addr: document.getElementById('b_addr').value,
            b_phone: document.getElementById('b_phone').value,
            b_email: document.getElementById('b_email').value,
            b_web: document.getElementById('b_web').value,
            b_gst: document.getElementById('b_gst').value,
          logo: logoImg ? `<img src="${logoImg}" width="120" height="60" style="width:120px; height:60px;">` : "<h2>LOGO</h2>",
            r_no: document.getElementById('r_no').value,
            r_date: document.getElementById('r_date').value,
            c_name: document.getElementById('c_name').value,
            c_gst: document.getElementById('c_gst').value,
            c_addr: document.getElementById('c_addr').value,
            c_phone: document.getElementById('c_phone').value,
            c_web: document.getElementById('c_web').value,
            p_amt: document.getElementById('p_amt').value,
            p_words: document.getElementById('p_words').value,
            p_mode: document.getElementById('p_mode').value,
            p_inv: document.getElementById('p_inv').value,
            p_due: document.getElementById('p_due').value,
            f_terms: document.getElementById('f_terms').value,
            f_thank: document.getElementById('f_thank').value
        };
        document.getElementById('render-target').innerHTML = getTemplateHtml(activeTpl, d, colors[activeTpl-1]);
    }

    function getTemplateHtml(id, d, color) {
        const borderList = [
            `border: 8px solid ${color}; outline: 2px solid ${color}; outline-offset: 4px;`,
            `border: 1px solid #ddd;`,
            `border: 4px double ${color};`,
            `border-top: 15px solid ${color}; border-bottom: 1px solid #eee;`,
            `border: 10px inset ${color};`,
            `border: 2px solid ${color}; border-radius: 20px;`,
            `border-left: 20px solid ${color}; border-right: 1px solid #eee;`,
            `border: 15px double ${color}; padding: 10px;`,
            `border: 2px solid ${color}; border-radius: 40px 0 40px 0;`,
            `border-top: 25px solid ${color}; border-bottom: 25px solid #eee;`,
            `border: 1px dashed #000;`,
            `border: 1px solid #000; border-left: 10px solid #000;`,
            `border: 15px solid ${color}; border-style: solid none;`,
            `border: 3px dotted ${color};`,
            `border: 10px groove ${color};`,
            `border-top: 5px solid ${color}; border-left: 5px solid ${color};`,
            `border: 3px solid #333;`,
            `border-radius: 50px 50px 0 0; border: 4px solid ${color};`,
            `border: 5px ridge ${color};`,
            `border: 2px solid #222; box-shadow: inset 0 0 10px #eee;`,
            `border: 2px solid ${color};`,
            `border: 12px solid #222; border-top-color: ${color};`,
            `border-bottom: 10px solid ${color};`,
            `border: 2px solid ${color}; border-radius: 15px;`,
            `border: 1px solid #eee; background: linear-gradient(to bottom, #fff 96%, ${color} 4%);`
        ];

        const wrapS = `<div style="${borderList[id - 1]} padding:25px; min-height:140mm; box-sizing:border-box; background:white; font-family:Arial; position:relative;">`;
        const wrapE = `</div>`;

        const seller = `<div style="font-size:11px;"><b>${d.b_name}</b><br>${d.b_addr}<br>GST: ${d.b_gst}<br>PH: ${d.b_phone} | Web: ${d.b_web}</div>`;
        const customer = `<div style="font-size:11px; border-left:3px solid ${color}; padding-left:10px;"><b>RECEIVED FROM:</b><br><b style="font-size:14px;">${d.c_name}</b><br>${d.c_addr}<br>GST: ${d.c_gst}</div>`;
        const details = `
            <table width="100%" style="border-collapse:collapse; margin:20px 0; border:1px solid #eee; font-size:13px;">
                <tr style="background:#f9f9f9;"><td style="padding:15px; border-bottom:1px solid #eee;"><b>Receipt #</b><br>${d.r_no}</td><td style="padding:15px; border-bottom:1px solid #eee;" align="right"><b>Date</b><br>${d.r_date}</td></tr>
                <tr><td style="padding:15px;" colspan="2"><b>Received the sum of:</b> ${d.p_words}</td></tr>
                <tr style="background:#f9f9f9;"><td style="padding:15px;"><b>Amount Received:</b></td><td style="padding:15px;" align="right"><b style="font-size:20px; color:${color}">₹ ${d.p_amt}</b></td></tr>
                <tr><td style="padding:15px; font-size:11px;"><b>Payment Mode:</b> ${d.p_mode} | <b>Ref:</b> ${d.p_inv}</td><td style="padding:15px; font-size:11px; color:red;" align="right"><b>Balance Due: ₹ ${d.p_due}</b></td></tr>
            </table>`;
        const footer = `<div style="font-size:10px; border-top:1px solid #eee; padding-top:10px;"><b>Terms:</b> ${d.f_terms}<br><br><table width="100%"><tr><td><i>${d.f_thank}</i></td><td align="right"><b>For ${d.b_name}</b><br><br><br>Authorized Signatory</td></tr></table></div>`;

        // 25 Unique Layout Switch
       switch(id) {
            case 1: // Corporate Blue Receipt
                return wrapS + `<table width="100%" bgcolor="${color}" style="color:white; padding:20px; margin:-25px -25px 20px -25px;"><tr><td>${d.logo}</td><td align="right"><h1>RECEIPT</h1></td></tr></table><table width="100%"><tr><td>${seller}</td><td align="right">${customer}</td></tr></table>${details}${footer}` + wrapE;

            case 2: // Minimal Clean Receipt
                return wrapS + `<center>${d.logo}<h1 style="color:#ccc; letter-spacing:10px; margin:20px 0;">RECEIPT</h1><div style="margin:20px 0;">${customer}</div><hr>${details}<br>${seller}${footer}` + wrapE;

            case 3: // Classic Business Receipt
                return wrapS + `<table width="100%"><tr><td style="border:1px solid #eee; padding:10px;">${seller}</td><td align="right" valign="top">${d.logo}</td></tr></table><br><div style="background:#f2f2f2; padding:10px;">${customer}</div>${details}${footer}` + wrapE;

            case 4: // Retail Shop Receipt
                return wrapS + `<center>${d.logo}<h3 style="margin:5px 0; text-transform:uppercase;">Cash Memo</h3><b style="font-size:18px;">${d.b_name}</b><p style="font-size:10px; margin:0;">${d.b_addr}</p></center><hr style="border:1px dashed #000;">${details}<div style="background:#f9f9f9; padding:10px;">${customer}</div>${footer}` + wrapE;

            case 5: // Elegant Premium Receipt
                return wrapS + `<div style="text-align:center; border-bottom:2px solid ${color}; padding-bottom:15px; margin-bottom:20px;">${d.logo}<h1 style="color:${color}; font-family:serif; margin:10px 0;">Payment Voucher</h1></div><table width="100%"><tr><td width="50%">${seller}</td><td width="50%" align="right">${customer}</td></tr></table>${details}${footer}` + wrapE;

            case 6: // Modern Card Layout
                return wrapS + `<div style="background:#fff; border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:10px;">${d.logo} ${seller}</div><div style="background:#fff; border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:10px;">${customer}</div><div style="background:#fff; border:1px solid #ddd; padding:15px; border-radius:10px;">${details}</div>${footer}` + wrapE;

            case 7: // Startup Style Receipt
                return wrapS + `<table width="100%"><tr><td width="15%" valign="top">${d.logo}</td><td valign="top" style="padding-left:15px;">${seller}</td><td align="right" valign="top"><h3># ${d.r_no}</h3></td></tr></table><br><div style="border-top:4px solid ${color}; padding-top:15px;">${customer}</div>${details}${footer}` + wrapE;

            case 8: // Border Frame Receipt
                return wrapS + `<div style="border:2px solid ${color}; padding:15px; height:100%;"><center>${d.logo}<h2>ACKNOWLEDGEMENT RECEIPT</h2></center><hr color="${color}"><table width="100%"><tr><td>${seller}</td><td align="right">${customer}</td></tr></table>${details}${footer}</div>` + wrapE;

            case 9: // Soft Pastel Receipt
                return wrapS + `<div style="background:${color}22; padding:20px; border-radius:30px; margin-bottom:15px;"><table width="100%"><tr><td>${d.logo}</td><td align="right"><b>${d.b_name}</b></td></tr></table></div><table width="100%"><tr><td>${customer}</td><td align="right">${details}</td></tr></table>${footer}` + wrapE;

            case 10: // Modern Gradient Header
                return wrapS + `<div style="background:linear-gradient(to right, ${color}, #fff); padding:20px; margin:-25px -25px 20px -25px; color:white;"><h2>Payment Confirmed</h2># ${d.r_no}</div>${seller}<hr>${customer}${details}${footer}` + wrapE;

            case 11: // Compact Business Receipt
                return wrapS + `<div style="font-size:12px;"><table width="100%"><tr><td><b>${d.b_name}</b><br>${d.b_phone}</td><td align="right">${d.logo}</td></tr></table><hr>${customer}${details}${footer}</div>` + wrapE;

            case 12: // Professional Accounting Receipt
                return wrapS + `<table width="100%" border="1" style="border-collapse:collapse; background:#f4f4f4;"><tr><td style="padding:15px;">${seller}</td><td style="padding:15px;" align="right">${d.logo}</td></tr></table><br>${customer}${details}${footer}` + wrapE;

            case 13: // Left Accent Modern Receipt
                return wrapS + `<table width="100%" height="100%"><tr><td width="30%" bgcolor="${color}" style="color:white; padding:20px;" valign="top">${d.logo}<br><br>${seller}</td><td width="70%" style="padding-left:20px;" valign="top"><h1>RECEIPT</h1><hr>${customer}${details}${footer}</td></tr></table>` + wrapE;

            case 14: // Center Highlight Receipt
                return wrapS + `<center>${d.logo}<br><div style="background:${color}; color:white; display:inline-block; padding:5px 40px;"><h1>RECEIPT</h1></div><br><br>${seller}<br><hr>${customer}${details}${footer}</center>` + wrapE;

            case 15: // Boxed Section Receipt
                return wrapS + `<div style="border:1px solid #000; padding:10px; margin-bottom:10px;">${d.logo} <b>Business Info:</b><br>${seller}</div><div style="border:1px solid #000; padding:10px; margin-bottom:10px;"><b>Customer Info:</b><br>${customer}</div><div style="border:1px solid #000; padding:10px;">${details}</div>${footer}` + wrapE;

            case 16: // Premium Corporate Receipt
                return wrapS + `<table width="100%"><tr><td><h1>OFFICIAL RECORD</h1></td><td align="right">${d.logo}</td></tr></table><hr size="5" color="${color}">${seller}<br>${customer}${details}${footer}` + wrapE;

            case 17: // Retail Friendly Receipt
                return wrapS + `<div style="border-bottom:5px solid ${color}; margin-bottom:15px;">${d.logo} <b>${d.b_name}</b></div><table width="100%"><tr><td>${customer}</td><td align="right">${billDetails}</td></tr></table>${details}${footer}` + wrapE;

            case 18: // Gradient Sidebar Receipt
                return wrapS + `<table width="100%"><tr><td width="35%" style="background:linear-gradient(to bottom, ${color}, #4338ca); color:white; padding:20px;" valign="top">${d.logo}<br>${seller}</td><td width="65%" style="padding:20px;" valign="top"><h2>Payment Acknowledgement</h2><hr>${customer}${details}${footer}</td></tr></table>` + wrapE;

            case 19: // Clean Professional Layout
                return wrapS + `<table width="100%"><tr><td>${d.logo}</td><td align="right"><b>Receipt Ref:</b> ${d.r_no}</td></tr></table><br>${seller}<hr>${customer}${details}${footer}` + wrapE;

            case 20: // Business Ledger Style Receipt
                return wrapS + `<div style="background:#fefce8; padding:10px; border:1px solid #166534;"><center><h2>LEDGER VOUCHER</h2></center></div><br>${seller}<br><table width="100%" border="1" style="border-collapse:collapse;"><tr><td>${customer}</td></tr></table>${details}${footer}` + wrapE;

            case 21: // Modern Tech Company Receipt
                return wrapS + `<div style="font-family:monospace; border-top:10px solid ${color};">${d.logo}<h1>SYSTEM.GEN_RECEIPT</h1><table width="100%"><tr><td>${seller}</td><td align="right">${customer}</td></tr></table>${details}${footer}</div>` + wrapE;

            case 22: // Premium Black Header Receipt
                return wrapS + `<div style="background:#000; color:white; padding:20px; margin:-25px -25px 20px -25px;"><table width="100%"><tr><td>${d.logo}</td><td align="right"><h1>PAID</h1></td></tr></table></div>${seller}<br>${customer}${details}${footer}` + wrapE;

            case 23: // Simple Local Business Receipt
                return wrapS + `<center><h2>${d.b_name}</h2><p>${d.b_addr}</p></center><hr>${customer}${details}${footer}` + wrapE;

            case 24: // Modern Elegant Layout
                return wrapS + `<div style="border-radius:20px; background:#fcfcfc; padding:20px;">${d.logo} <h2>Quotation Summary</h2><table width="100%"><tr><td>${seller}</td><td align="right">${customer}</td></tr></table>${details}</div>${footer}` + wrapE;

            case 25: // Ultra Modern Fintech Receipt
                return wrapS + `<table width="100%"><tr><td>${d.logo}</td><td align="right" style="color:${color}; font-size:25px;"><b>Verified</b></td></tr></table><br>${seller}<br><div style="background:#f9fafb; padding:20px;">${customer}${details}</div>${footer}` + wrapE;

            default:
                return wrapS + `<table width="100%"><tr><td>${d.logo}</td><td align="right">${seller}</td></tr></table><hr>${customer}${details}${footer}` + wrapE;
        }
}
    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'><style>table{border-collapse:collapse; width:100%;} td,th{border:1px solid #ccc; padding:5px; font-family:Arial;}</style></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Receipt_${document.getElementById('r_no').value}.doc`;
        link.click();
    }

    function saveData() {
        alert("Receipt Data saved in browser session!");
    }

    window.onload = init;
</script>
</body>
</html>
