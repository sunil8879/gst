<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIZGEN AI | Neural Naming Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --aqua: #7FFFD4; --dark: #0f172a; --soft-aqua: #f0fffb; }
        body { font-family: 'Outfit', sans-serif; background-color: white; }
        .sidebar { background: #ffffff; border-right: 2px solid var(--aqua); }
        .name-card { 
            background: white; 
            border: 1px solid #f1f5f9; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .name-card:hover { 
            transform: translateY(-5px) scale(1.02); 
            border-color: var(--aqua); 
            box-shadow: 0 25px 50px -12px rgba(127, 255, 212, 0.4); 
        }
        .btn-aqua { background-color: var(--aqua); color: #1a202c; font-weight: 800; transition: all 0.3s; }
        .btn-aqua:hover { background-color: #45b796; color: white; box-shadow: 0 10px 20px rgba(127, 255, 212, 0.5); }
        .score-badge { background: var(--soft-aqua); color: #065f46; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 900; }
        .pagination-btn { width: 40px; height: 40px; border-radius: 10px; font-weight: bold; border: 1px solid #e2e8f0; transition: 0.2s; }
        .active-page { background: var(--aqua); border-color: var(--aqua); }
    </style>
</head>
<body class="text-slate-900">

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b-2 border-[var(--aqua)] py-4 px-8 sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-800 uppercase">BizGen <span class="text-emerald-400">AI</span></h1>
        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Pseudo-Neural Engine Active
        </div>
    </header>

    <div class="flex flex-col lg:flex-row min-h-screen">
        
        <!-- Sidebar -->
        <aside class="w-full lg:w-96 p-8 sidebar shadow-xl sticky top-20 h-fit lg:h-[calc(100vh-80px)] overflow-y-auto">
            <div class="space-y-6">
                <div>
                    <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase">Brand Keyword</label>
                    <input type="text" id="keyword" placeholder="e.g. fire, pay, cloud" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-[var(--aqua)] rounded-2xl outline-none transition-all font-bold text-lg shadow-inner">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase">Industry Context</label>
                        <select id="industry" class="w-full p-4 bg-slate-50 border-none rounded-xl font-bold appearance-none cursor-pointer">
                            <option value="tech">Tech & AI</option><option value="finance">Fintech</option>
                            <option value="beauty">Beauty</option><option value="health">Medical</option>
                            <option value="food">Restaurant</option><option value="realestate">Real Estate</option>
                            <option value="edu">Education</option><option value="legal">Law</option>
                            <option value="travel">Travel</option><option value="fashion">Fashion</option>
                            <option value="sport">Fitness</option><option value="art">Design</option>
                            <option value="pet">Pets</option><option value="nature">Eco</option>
                            <option value="music">Music</option><option value="marketing">Ad Agency</option>
                            <option value="crypto">Web3</option><option value="ecommerce">Shop</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase">Style</label>
                        <select id="style" class="w-full p-3 bg-slate-50 rounded-xl font-bold">
                            <option value="modern">Modern</option><option value="luxury">Luxury</option>
                            <option value="fun">Playful</option><option value="professional">Solid</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase">Max Length</label>
                        <select id="length" class="w-full p-3 bg-slate-50 rounded-xl font-bold">
                            <option value="short">Short (4-6)</option><option value="medium" selected>Med (7-10)</option>
                        </select>
                    </div>
                </div>

                <button onclick="generateNeuralNames()" class="w-full btn-aqua py-5 rounded-2xl shadow-xl transform active:scale-95 uppercase tracking-widest text-xs">
                    Generate Neural Names
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 p-8 bg-slate-50/50">
            <div id="welcomeScreen" class="text-center py-40">

            </div>
        </main>
    </div>

        let currentNamesPool = [];
        let currentPage = 1;
        const perPage = 24;

        // --- STEP 3: SYLLABLE GENERATOR ---
        function generateSyllable() {
            return consonants[Math.floor(Math.random() * consonants.length)] + vowels[Math.floor(Math.random() * vowels.length)];
        }

        // --- STEP 4: PATTERN ENGINE ---
 function generateNeuralName(keyword, industry, style) {
    const dice = Math.random();
    let name = "";

    // 1. Get specialized pools based on User selection
    const stylePool = styleRules[style] || styleRules.modern;
    const industryPool = roots[industry] || roots.tech;
    const key = keyword.toLowerCase();

    // 2. Select one of 6 Linguistic Patterns
    if (dice < 0.15) { 
        // PATTERN: Pure Abstract (The "Nexa/Zylo" Style)
        // Uses syllables and style-specific markers
        name = generateSyllable() + stylePool[Math.floor(Math.random() * 15)];
    } 
    else if (dice < 0.35) { 
        // PATTERN: Style-Driven Mutation (The "Spotify/Shopify" Style)
        // Blends keyword with modern style endings (zo, ly, ify, ix)
        const ending = stylePool[Math.floor(Math.random() * stylePool.length)];
        name = key + ending;
    } 
    else if (dice < 0.55) { 
        // PATTERN: The Compound Industry (The "Fintech/Wealthfront" Style)
        // Merges keyword with a high-quality industry root
        const root = industryPool[Math.floor(Math.random() * industryPool.length)];
        name = key + root;
    } 
    else if (dice < 0.75) { 
        // PATTERN: Premium Prefix (The "Neopay/Omnisys" Style)
        // Uses high-end prefixes + keyword
        const pre = prefixes[Math.floor(Math.random() * prefixes.length)];
        name = pre + key;
    } 
    else if (dice < 0.90) { 
        // PATTERN: Phonetic Blend (The "Palyte/Vexta" Style)
        // Takes the "Start" of your keyword and blends it with syllables
        const fragment = key.substring(0, 3);
        name = fragment + generateSyllable() + (style === 'luxury' ? 'a' : 'o');
    } 
    else { 
        // PATTERN: The Modern Suffix (The "Payhub/Techlab" Style)
        // Standard high-quality suffixes
        const suf = suffixes[Math.floor(Math.random() * suffixes.length)];
        name = key + suf;
    }

    // 3. Post-Processing: Clean up double letters (e.g., Pay + ly = Payly)
    // This makes names look more professional
    return cleanupName(name);
}

// HELPER: Professional cleanup to avoid ugly overlaps
function cleanupName(name) {
    // Remove triple repeating letters
    name = name.replace(/([a-z])\1\1/gi, '$1$1');
    
    // If the keyword ends in the same letter the suffix starts with, merge them
    // Example: "Press" + "Scale" -> "Prescale"
    return name.toLowerCase();
}

        // --- STEP 6, 7 & 8: FILTER & SCORING ---
        function getScore(name, style) {
            let score = 0;
            if (name.length <= 6) score += 3;
            if (name.length > 6 && name.length <= 9) score += 2;
            
            // Style matching
            const bonusLetters = styleRules[style] || [];
            bonusLetters.forEach(l => { if (name.includes(l)) score += 1; });
            
            // Pronounceability (vowel check)
            if (/[aeiouy]{1,2}/.test(name)) score += 2;
            
            return score;
        }

        function isValid(name) {
            // Remove bad patterns (triple consonants or triple vowels)
            if (/(.)\1\1/.test(name)) return false; 
            if (name.length < 3 || name.length > 12) return false;
            return /[aeiouy]/.test(name);
        }

        function generateNeuralNames() {
            const keyword = document.getElementById('keyword').value.trim() || 'nova';
            const industry = document.getElementById('industry').value;
            const style = document.getElementById('style').value;
            const lengthLimit = document.getElementById('length').value;

            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('pagination').classList.remove('hidden');

            const nameSet = new Set();
            let attempts = 0;

            while (nameSet.size < 1200 && attempts < 10000) {
                attempts++;
                let rawName = generateNeuralName(keyword, industry, style);
                
                if (isValid(rawName)) {
                    if (lengthLimit === 'short' && rawName.length > 6) continue;
                    
                    const score = getScore(rawName, style);
                    nameSet.add({
                        val: rawName.charAt(0).toUpperCase() + rawName.slice(1),
                        score: score
                    });
                }
            }

            // Sort by score (Step 8)
            currentNamesPool = Array.from(nameSet).sort((a, b) => b.score - a.score);
            currentPage = 1;
            renderDisplay();
        }

        function renderDisplay() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const batch = currentNamesPool.slice(start, end);

            batch.forEach(item => {
                const card = document.createElement('div');
                card.className = "name-card p-10 rounded-[2.5rem] flex flex-col items-center justify-center text-center relative overflow-hidden";
                
                const style = document.getElementById('style').value;
                let fontCss = "font-black tracking-tighter text-2xl";
                if(style === 'luxury') fontCss = "font-serif italic text-3xl opacity-80";
                if(style === 'modern') fontCss = "font-sans uppercase tracking-[0.2em] text-xl font-light";

                card.innerHTML = `
                    <div class="flex justify-between w-full absolute top-6 px-8">
                        <span class="score-badge">AI SCORE: ${item.score}/10</span>
                        <div class="w-2 h-2 rounded-full bg-[var(--aqua)]"></div>
                    </div>
                    <h3 class="${fontCss} text-slate-800 mb-2">${item.val}</h3>
                    <p class="text-[8px] font-bold uppercase tracking-[0.4em] text-slate-400">Premium Domain</p>
                    <div class="mt-8 flex gap-2">
                        <button onclick="copyName('${item.val}')" class="text-[9px] font-black hover:text-emerald-500 transition-colors uppercase tracking-widest">Copy Name</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            updatePaginationUI();
        }

        function updatePaginationUI() {
            const wrapper = document.getElementById('pageButtons');
            wrapper.innerHTML = '';
            const total = Math.ceil(currentNamesPool.length / perPage);

            const start = Math.max(1, currentPage - 2);
            const end = Math.min(total, start + 4);

            for (let i = start; i <= end; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `pagination-btn ${i === currentPage ? 'active-page' : 'bg-white text-slate-400'}`;
                btn.onclick = () => { currentPage = i; renderDisplay(); window.scrollTo({top:0, behavior:'smooth'}); };
                wrapper.appendChild(btn);
            }
            document.getElementById('pageStats').innerText = `Neural Discovery: ${currentNamesPool.length} variations | Page ${currentPage} of ${total}`;
        }

        function copyName(txt) {
            navigator.clipboard.writeText(txt);
            alert("Saved to clipboard: " + txt);
        }
