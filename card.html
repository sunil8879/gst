<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITE CARD AI | 10 Structural Layouts</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;800&family=Space+Grotesk:wght@300;700&family=Montserrat:wght@400;900&family=Lexend:wght@400;800&family=Outfit:wght@400;900&family=Dancing+Script:wght@700&family=Oswald:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/gh/ushelp/EasyQRCodeJS@master/dist/easy.qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --card-w: 1050px; --card-h: 600px; --accent: #7FFFD4; }
        * { box-sizing: border-box; letter-spacing: -0.04em; }
        body { margin: 0; background: #020617; display: flex; height: 100vh; overflow: hidden; color: white; font-family: 'Inter', sans-serif; }

        /* --- SIDEBAR --- */
        .sidebar { width: 400px; min-width: 400px; background: #0f172a; height: 100vh; overflow-y: auto; padding: 30px; border-right: 1px solid #1e293b; flex-shrink: 0; }
        .sidebar h2 { font-weight: 900; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #020617; color: white; font-size: 0.8rem; }
        
        /* --- WORKSPACE --- */
        .workspace { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; overflow: auto; padding: 40px; }

        /* --- THE CARD --- */
        #card-frame {
            width: var(--card-w); height: var(--card-h);
            background: white; position: relative; flex-shrink: 0;
            padding: 80px 80px 180px 80px; /* Safe zone for bottom assets */
            transform: scale(0.6); transform-origin: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            transition: 0.4s all ease; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- FIXED ASSETS --- */
        #logo-slot { position: absolute !important; bottom: 10px !important; left: 20px !important; width: 240px; height: 100px; display: flex; align-items: center; }
        #logo-slot img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #qr-slot { position: absolute !important; bottom: 10px !important; right: 20px !important; width: 100px; height: 100px; background: white; padding: 8px; border-radius: 8px; }

        /* --- DYNAMIC CONTENT AREA --- */
        #content-area { width: 100%; height: 100%; display: flex; flex-direction: column; }

        .t-name { font-size: 4rem; font-weight: 900; margin: 0; line-height: 1; }
        .t-title { font-size: 1.4rem; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .contact-list { list-style: none; padding: 0; margin: 20px 0; font-size: 1.1rem; }
        .contact-list li { margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
        .t-comp { font-size: 1.8rem; font-weight: 800; margin-top: 10px; }

        /* --- 10 STRUCTURAL LAYOUTS --- */
        .lay-1 { align-items: flex-start; text-align: left; } /* Classic Left */
        .lay-2 { align-items: center; text-align: center; }    /* Centered */
        .lay-3 { align-items: flex-end; text-align: right; }   /* Right Modern */
        
        .lay-4 .contact-list { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 20px; } /* Split */
        
        .lay-5 .t-name { font-size: 6rem; text-align: center; width: 100%; } /* Hero */
        .lay-5 { align-items: center; justify-content: center; }

        .lay-6 .t-name { border-bottom: 4px solid; width: 100%; padding-bottom: 15px; margin-bottom: 15px; } /* Top Bar */

        .lay-7 #content-area { border: 2px solid; padding: 40px; } /* Boxed */

        .lay-8 .t-name { margin-left: 0; } /* Diagonal */
        .lay-8 .t-title { margin-left: 50px; }
        .lay-8 .contact-list { margin-left: 100px; }

        .lay-9 .contact-list li:not(#r_ph) { display: none !important; } /* Minimal */
        .lay-9 .t-name { font-size: 5rem; }

        .lay-10 { border-left: 15px solid; padding-left: 40px !important; } /* Left Border */



/* --- 13 NEW ADVANCED LAYOUTS --- */
.lay-11 { border-left: 100px solid rgba(0,0,0,0.05); padding-left: 40px !important; } /* Sidebar Strip */
.lay-12 #content-area { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 50px; border-radius: 20px; } /* Card-within-Card */
.lay-13 .t-name, .lay-13 .t-title, .lay-13 .contact-list { border-bottom: 1px solid; padding: 15px 0; width: 100%; } /* Horizontal Bands */
.lay-14 { align-items: flex-start; } .lay-14 .t-title { margin-left: 40px; } .lay-14 .contact-list { margin-left: 80px; } /* Corner Focus */
.lay-15 .contact-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } 
.lay-15 li { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; } /* Floating Blocks */
.lay-16 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; } 
.lay-16 .t-title { border-right: 2px solid; padding-right: 20px; } /* Center Line Divider */
.lay-17 { align-items: flex-start; } .lay-17 .contact-list { margin-left: auto; text-align: right; } /* Asymmetric */
.lay-18 .t-title { background: var(--accent); color: #000 !important; padding: 5px 15px; display: inline-block; } /* Highlight Box */
.lay-19 { justify-content: space-between; flex-direction: row !important; flex-wrap: wrap; } /* Minimal Edge */
.lay-20 { gap: 0; } .lay-20 * { margin-bottom: 5px; } /* Stack Card */

/* SPLIT LAYOUTS */
.lay-21 { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; border-top: 1px solid; padding-top: 20px; } /* 50/50 Split */
.lay-22 { display: grid; grid-template-columns: 2fr 1fr; width: 100%; height: 100%; } 
.lay-22 .contact-list { font-size: 0.9rem; } /* 70/30 Split */
.lay-23 { border-top: 4px solid; border-bottom: 4px solid; padding: 40px 0 !important; justify-content: space-between; } /* Top/Bottom Split */


/* --- 10 NEXT-LEVEL TRENDY LAYOUTS --- */
.lay-24 #content-area { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 40px; border-radius: 20px; } /* Glassmorphism */
.lay-25 { background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.3)); justify-content: space-around; } /* Gradient Flow */
.lay-26 .t-name { font-size: 8rem !important; font-family: 'Syncopate', sans-serif; line-height: 0.7; } /* Bold Typography */
.lay-27 .t-name { text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); } /* Neon Glow */
.lay-28 { border-right: 30px solid var(--accent) !important; padding-right: 50px !important; } /* Edge Highlight */
.lay-29 #logo-slot { transform: translateY(-40px); filter: drop-shadow(0 15px 10px rgba(0,0,0,0.3)); } /* Floating Logo */
.lay-30 .contact-list span { display: none !important; } .lay-30 .contact-list { flex-direction: row !important; font-size: 2rem; gap: 30px; } /* Minimal Icon Only */
.lay-31 #content-area { box-shadow: 20px 20px 0px var(--accent); border: 2px solid var(--accent); padding: 30px; } /* Layered Card */
.lay-32 { align-items: center; justify-content: center; gap: 50px; } /* Center Focus Spaced */
.lay-33 .t-name { font-family: 'Dancing Script', cursive; font-size: 5rem !important; text-transform: none !important; letter-spacing: 0; } /* Signature Style */


        /* --- TOOLBAR --- */
        .controls { display: flex; gap: 15px; margin-top: -80px; z-index: 100; padding-bottom: 50px; }
        .btn { padding: 15px 30px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-magic { background: var(--accent); color: #020617; }
        .btn-dl { background: white; color: #020617; }

#card-frame { border-radius: 0px; transition: border-radius 0.4s ease; }





/* --- MOBILE RESPONSIVE FIX --- */
@media (max-width: 900px) {
    body { 
        flex-direction: column; 
        overflow: auto; /* Allows scrolling down to see the card */
    }
    .sidebar { 
        width: 100%; 
        min-width: 100%; 
        height: auto; 
        border-right: none; 
        border-bottom: 2px solid var(--accent); 
    }
    .workspace { 
        width: 100%;
        min-height: 500px; /* Ensures space for the card */
        padding: 0;
        justify-content: flex-start;
        overflow: visible;
    }
    #card-frame {
        /* This line auto-scales the 1050px card to fit any mobile screen width */
        transform: scale(calc(window.innerWidth / 1150)); 
        transform-origin: top center;
        margin-top: 20px;
    }
    .controls {
        margin-top: 20px; /* Removes the negative margin used for desktop */
        flex-direction: column;
        width: 90%;
    }

#card-frame { margin-bottom: -280px !important; } .controls { margin-top: 0 !important; padding-bottom: 80px; }
}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Infinite Card AI</h2>
        <div class="input-group"><label>Logo</label><input type="file" id="in_logo" onchange="previewLogo(event)"></div>
        <div class="input-group"><label>Name</label><input type="text" id="in_name" value="ALEX RIVERA" oninput="update()"></div>
        <div class="input-group"><label>Title</label><input type="text" id="in_title" value="Creative Director" oninput="update()"></div>
        <div class="input-group"><label>Company</label><input type="text" id="in_comp" value="NEXUS STUDIO" oninput="update()"></div>
        <div class="input-group"><label>Slogan</label><input type="text" id="in_tag" value="Pixels with Purpose" oninput="update()"></div>
        <div class="input-group"><label>Phone</label><input type="text" id="in_ph" value="+1 234 567 890" oninput="update()"></div>
        <div class="input-group"><label>WhatsApp</label><input type="text" id="in_wa" value="+1 234 567 890" oninput="update()"></div>
        <div class="input-group"><label>Email</label><input type="text" id="in_em" value="alex@nexus.com" oninput="update()"></div>
        <div class="input-group"><label>Website</label><input type="text" id="in_web" value="www.nexus.com" oninput="update()"></div>
        <div class="input-group"><label>Address</label><input type="text" id="in_addr" value="Manhattan, NY" oninput="update()"></div>
        <div class="input-group"><label>QR Link</label><input type="text" id="in_qr" value="https://nexus.com" onchange="genQR()"></div>
    </div>

    <div class="workspace">
        <div id="card-frame">
            <div id="logo-slot"><img id="logo-img" src="https://via.placeholder.com/200x80/eeeeee/333333?text=LOGO" alt="logo"></div>
            <div id="qr-slot"><div id="qr_box"></div></div>

            <div id="content-area" class="lay-1">
                <h1 class="t-name" id="out_name">ALEX RIVERA</h1>
                <div class="t-title" id="out_title">Creative Director</div>
                <ul class="contact-list">
                    <li id="r_ph"><i class="fas fa-phone"></i> <span></span></li>
                    <li id="r_wa"><i class="fab fa-whatsapp"></i> <span></span></li>
                    <li id="r_em"><i class="fas fa-envelope"></i> <span></span></li>
                    <li id="r_web"><i class="fas fa-globe"></i> <span></span></li>
                    <li id="r_addr"><i class="fas fa-map-marker-alt"></i> <span></span></li>
                </ul>
                <div class="t-comp" id="out_comp">NEXUS STUDIO</div>
                <div id="out_tag" style="opacity:0.7; font-style:italic;">Pixels with Purpose</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-magic" onclick="shuffle()"><i class="fas fa-random"></i> Shuffle Everything</button>
            <button class="btn btn-dl" onclick="exp()"><i class="fas fa-download"></i> Export PNG</button>
        </div>
    </div>

    <script>
        function update() {
            document.getElementById('out_name').innerText = document.getElementById('in_name').value;
            document.getElementById('out_title').innerText = document.getElementById('in_title').value;
            document.getElementById('out_comp').innerText = document.getElementById('in_comp').value;
            document.getElementById('out_tag').innerText = document.getElementById('in_tag').value;
            tRow('r_ph', document.getElementById('in_ph').value);
            tRow('r_wa', document.getElementById('in_wa').value);
            tRow('r_em', document.getElementById('in_em').value);
            tRow('r_web', document.getElementById('in_web').value);
            tRow('r_addr', document.getElementById('in_addr').value);
        }

        function tRow(id, v) {
            const el = document.getElementById(id);
            if(!v) el.style.display = 'none';
            else { el.style.display = 'flex'; el.querySelector('span').innerText = v; }
        }

        function previewLogo(e) { document.getElementById('logo-img').src = URL.createObjectURL(e.target.files[0]); }

        function genQR() {
            const b = document.getElementById("qr_box"); b.innerHTML = "";
            new QRCode(b, {
                text: document.getElementById('in_qr').value || "Nexus",
                width: 85, height: 85, colorDark: "#000000", colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

      function shuffle() {
    const frame = document.getElementById('card-frame');
    const content = document.getElementById('content-area');
    
    // 1. Pick from all 33 Layouts
    content.className = 'lay-' + (Math.floor(Math.random() * 33) + 1);

    // 2. Random Colors
    const h = Math.floor(Math.random() * 360);
    const isDark = Math.random() > 0.4;
    const bg = isDark ? `hsl(${h}, 35%, 10%)` : `hsl(${h}, 20%, 97%)`;
    const accent = `hsl(${Math.random() * 360}, 85%, 60%)`;
    const text = isDark ? '#ffffff' : '#0f172a';

    // 3. Expanded Font Library
    const fonts = ['Lexend', 'Playfair Display', 'Poppins', 'Montserrat', 'Space Grotesk', 'Oswald', 'Syncopate', 'Outfit', 'Inter'];
// --- SMART SHAPE ENGINE ---
    const shapes = ['0px', '25px', '60px', '120px 0px 120px 0px'];
    frame.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];

    
    // Apply Styles
    frame.style.backgroundColor = bg;
    frame.style.color = text;
    frame.style.fontFamily = fonts[Math.floor(Math.random() * fonts.length)];
    frame.style.border = `${Math.floor(Math.random() * 15)}px solid ${accent}`;
    
    // Special: Add random gradient background for lay-25
    if(content.className === 'lay-25') {
        frame.style.background = `linear-gradient(135deg, ${bg}, ${accent}33)`;
    }

    // Apply Accents
    document.getElementById('out_name').style.color = accent;
    document.querySelectorAll('.contact-list i').forEach(i => i.style.color = accent);
    
    // Set variable for CSS access
    document.documentElement.style.setProperty('--accent', accent);
}
        function exp() {
            const f = document.getElementById('card-frame');
            f.style.transform = "scale(1)";
            html2canvas(f, { scale: 2 }).then(c => {
                const l = document.createElement('a');
                l.download = 'BusinessCard.png';
                l.href = c.toDataURL();
                l.click();
                f.style.transform = "scale(0.6)";
            });
        }

        window.onload = () => { genQR(); update(); shuffle(); };







function adjustMobileScale() {
    if (window.innerWidth <= 900) {
        const card = document.getElementById('card-frame');
        // Calculate the scale: Screen Width divided by Card Width (plus some margin)
        const scale = window.innerWidth / 1100; 
        card.style.transform = `scale(${scale})`;
        
        // Adjust the toolbar position so it doesn't overlap
        const controls = document.querySelector('.controls');
     
    } else {
        // Reset to desktop scale
        const card = document.getElementById('card-frame');
        card.style.transform = "scale(0.6)";
        document.querySelector('.controls').style.marginTop = "-80px";
    }
}

// Run on load and whenever the screen size changes
window.addEventListener('resize', adjustMobileScale);
window.addEventListener('load', adjustMobileScale);
    </script>
</body>
</html>
