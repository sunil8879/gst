<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILL BOOK PRO - 500 STYLES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #1e40af; --s: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .no-print { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; outline: none; }
        h3 { background: #0f172a; color: white; padding: 8px; font-size: 11px; border-radius: 4px; text-transform: uppercase; margin: 20px 0 10px 0; }
        
        .ui-table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 10px; }
        .ui-table th { background: #f1f5f9; padding: 8px; border: 1px solid #cbd5e1; font-size: 11px; text-align: left; }
        .ui-table td { border: 1px solid #cbd5e1; padding: 4px; }
        .ui-table input { border: none; width: 100%; }

        .template-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 150px; overflow-y: auto; background: #e2e8f0; padding: 10px; border-radius: 8px; }
        .tpl-btn { padding: 8px 0; border: none; cursor: pointer; color: white; font-size: 9px; font-weight: bold; border-radius: 3px; }
        
        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; margin-top: 20px; border-radius: 10px; }
        #render-target { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn-act { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        /* Featured Templates Dropdowns */
        .featured-section { margin-top: 60px; text-align: center; border-top: 2px solid #e2e8f0; padding-top: 30px; padding-bottom: 50px; }
        .featured-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .select-btn { padding: 15px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; color: white; text-transform: uppercase; font-size: 13px; min-width: 220px; }

        @media print { .no-print { display: none !important; } .preview-box { background: white; padding: 0; } #render-target { width: 100%; box-shadow: none; border:none !important; } }


/* 12. UNIVERSAL OVERFLOW & VERTICAL STACK FIX */

/* 1. Force buttons to behave like blocks (one per line) */
/* We target the buttons directly so we don't have to guess the container names */
.btn-act, 
.select-btn, 
.exciting-tools-btn, 
.no-print button:not(.tpl-btn) { 
    display: block !important;      /* Forces element to take up the full width */
    width: 100% !important;         /* Ensures it fills the screen */
    max-width: 100% !important; 
    margin: 10px 0 !important;      /* Adds space between stacked buttons */
    white-space: normal !important;  /* Allows long text to wrap to the next line */
    height: auto !important;        /* Allows the button to grow taller for wrapped text */
    box-sizing: border-box !important;
    text-align: center !important;
}

/* 2. Fix containers ONLY if they are already visible */
/* We use flex-direction: column but DO NOT force display: flex */
.btn-group, 
.button-group, 
.featured-grid, 
.tools-container, 
div[style*="display: flex"], 
div[style*="display:flex"] {
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    /* Removed 'display: flex !important' to prevent hidden items from appearing */
}

/* 3. Keep the 500 Style grid as a grid (not a single long column) */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)) !important;
    gap: 5px !important;
    width: 100% !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Prevent horizontal scrolling on the whole page */
html, body {
    max-width: 100% !important;
    overflow-x: hidden !important;
}

/* 5. Ensure the Barcode/Label preview fits the screen */
#render-target, #capture-area, .preview-box {
    max-width: 100% !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
}


    </style>
</head>
<body>

<div class="no-print">
    <h1>Bill Book Pro (500 Styles)</h1>
    
    <h3>1. Shop Details</h3>
    <div class="form-grid">
        <div class="field"><label>Logo</label><input type="file" accept="image/*" onchange="loadLogo(this)"></div>
        <div class="field"><label>Shop Name</label><input type="text" id="b_name" value="The Mega Store" oninput="update()"></div>
        <div class="field"><label>GSTIN</label><input type="text" id="b_gst" value="27ABCDE1234F1Z1" oninput="update()"></div>
        <div class="field"><label>Phone</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
        <div class="field"><label>Email</label><input type="text" id="b_email" value="sales@store.com" oninput="update()"></div>
        <div class="field"><label>Website</label><input type="text" id="b_web" value="www.themegastore.com" oninput="update()"></div>
        <div class="field" style="grid-column: span 2;"><label>Address</label><input type="text" id="b_addr" value="MG Road, Central Market, New Delhi" oninput="update()"></div>
    </div>

    <h3>2. Customer & Bill Info</h3>
    <div class="form-grid">
        <div class="field"><label>Bill Number</label><input type="text" id="q_no" value="BILL-501" oninput="update()"></div>
        <div class="field"><label>Date</label><input type="date" id="q_date" oninput="update()"></div>
        <div class="field"><label>Customer Name</label><input type="text" id="c_name" value="Jane Smith" oninput="update()"></div>
        <div class="field"><label>Customer GSTIN</label><input type="text" id="c_gst" value="27URP1234X" oninput="update()"></div>
        <div class="field" style="grid-column: span 2;"><label>Customer Address</label><input type="text" id="c_addr" value="Warehouse 4, Port Road, Mumbai" oninput="update()"></div>
    </div>

    <h3>3. Items</h3>
    <table class="ui-table">
        <thead>
            <tr><th width="5%">No</th><th>Item</th><th>HSN</th><th width="10%">Qty</th><th width="12%">Rate</th><th width="10%">Disc%</th><th>Total</th><th width="5%"></th></tr>
        </thead>
        <tbody id="ui_rows"></tbody>
    </table>
    <button onclick="addRow()" style="padding: 5px 15px; cursor: pointer;">+ Add Item</button>

    <h3>4. Summary & Taxes</h3>
    <div class="form-grid">
        <div class="field"><label>CGST %</label><input type="number" id="s_cgst" value="9" oninput="calculate()"></div>
        <div class="field"><label>SGST %</label><input type="number" id="s_sgst" value="9" oninput="calculate()"></div>
        <div class="field"><label>IGST %</label><input type="number" id="s_igst" value="0" oninput="calculate()"></div>
        <div class="field"><label>Payment Mode</label><input type="text" id="s_pay" value="Cash" oninput="update()"></div>
        <div class="field"><label>Balance Due</label><input type="number" id="s_due" value="0" oninput="update()"></div>
        <div class="field"><label>Thank You Msg</label><input type="text" id="f_thank" value="Thank you for shopping!" oninput="update()"></div>
        <div class="field"><label>Grand Total</label><input type="text" id="disp_grand" readonly style="background:#eee; font-weight:bold;"></div>
    </div>

    <div class="template-grid" id="tpl-grid"></div>

    <div class="btn-group">
        <button class="btn-act" style="background:#10b981;" onclick="window.print()"><i class="fas fa-save"></i> SAVE PDF</button>
        <button class="btn-act" style="background:#2563eb;" onclick="exportWord()"><i class="fas fa-file-word"></i> SAVE WORD</button>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<!-- Featured Templates -->
<div class="no-print featured-section">
    <h2 style="color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Featured Templates</h2>
    <div class="featured-grid">
        <select class="select-btn" style="background:#1e40af" onchange="if(this.value) window.location.href=this.value">
            <option value="" selected disabled>SMART TEMPLATES</option>
            <option value="final_billbook.html">Bill Book</option>
            <option value="final_bill_of_exchange.html">Bill of Exchange</option>
            <option value="final_credit_note.html">Credit Note</option>
            <option value="final_delivery_challan.html">Delivery Challan</option>
            <option value="final_debit_notes.html">Debit Note</option>
            <option value="final_purchase_order.html">Purchase Order</option>
            <option value="final_quotation.html">Quotation</option>
            <option value="final_receipts.html">Receipt</option>
            <option value="final_voucher.html">Voucher</option>
            <option value="final_work_order.html">Work Order</option>
        </select>
        <select class="select-btn" style="background:#0f172a" onchange="if(this.value) window.location.href=this.value">
            <option value="" selected disabled>EXPLORE TEMPLATES</option>
            <option value="billbook_PC.html">Bill Book</option>
            <option value="bill_of_exchange_PC.html">Bill of Exchange</option>
            <option value="credit_note_PC.html">Credit Note</option>
            <option value="delivery_challan_PC.html">Delivery Challan</option>
            <option value="debit_note_PC.html">Debit Note</option>
            <option value="purchase_order_PC.html">Purchase Order</option>
            <option value="quotation_PC.html">Quotation</option>
            <option value="receipts_PC.html">Receipt</option>
            <option value="voucher_PC.html">Voucher</option>
            <option value="work_order_PC.html">Work Order</option>
        </select>
    </div>
</div>

<script>
    let logoImg = "";
    let activeStyle = 1;
    const colors = ["#1e40af", "#b91c1c", "#047857", "#7c3aed", "#1e293b"];

    const Modules = {
        borders: [
            (c) => `border: 6px solid ${c}; padding: 30px;`,
            (c) => `border: 1px solid #ddd; box-shadow: 10px 10px 0px ${c}; padding: 30px;`,
            (c) => `border: 3px double ${c}; outline: 1px solid #000; outline-offset: 4px; padding: 30px;`,
            (c) => `border-left: 20px solid ${c}; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 30px;`,
            (c) => `border: 2px solid #333; border-radius: 15px; padding: 30px;`
        ],
        headers: [
            (d, c) => `<table width="100%"><tr><td>${d.logo}<h1>${d.bName}</h1></td><td align="right"><small>${d.bAddr}<br>PH: ${d.bPhone}<br>GST: ${d.bGst}</small></td></tr></table><hr color="${c}">`,
            (d, c) => `<div style="background:${c}; color:white; padding:20px; margin:-30px -30px 20px -30px; text-align:center;">${d.logo}<h1>${d.bName}</h1><small>${d.bEmail} | ${d.bWeb}</small></div>`,
            (d, c) => `<center>${d.logo}<h2 style="border-bottom:2px solid ${c}">${d.bName}</h2><p style="font-size:12px;">${d.bAddr} | ${d.bPhone}</p></center>`,
            (d, c) => `<table width="100%"><tr><td bgcolor="${c}" style="color:white; padding:15px;"><h1>INVOICE</h1></td><td align="right">${d.logo}<b>${d.bName}</b><br><small>GST: ${d.bGst}</small></td></tr></table>`,
            (d, c) => `<div style="border-left:10px solid ${c}; padding-left:15px;"><h1>${d.bName}</h1><p>${d.bWeb}<br>${d.bEmail}</p></div>`
        ],
        tables: [
            (rows, c) => `<table width="100%" border="1" style="border-collapse:collapse; margin:15px 0;"><thead><tr bgcolor="${c}" style="color:white"><th>No</th><th>Item</th><th>HSN</th><th>Qty</th><th>Rate</th><th>Disc%</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`,
            (rows, c) => `<table width="100%" style="border-collapse:collapse; margin:15px 0;"><thead style="border-bottom:2px solid ${c}"><tr><th>No</th><th>Item</th><th>HSN</th><th>Qty</th><th>Rate</th><th>Disc%</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`,
            (rows, c) => `<table width="100%" border="1" style="border-collapse:collapse; margin:15px 0; border-color:#eee;"><tbody>${rows}</tbody></table>`,
            (rows, c) => `<div style="border:1px solid #ddd; border-radius:8px; overflow:hidden;"><table width="100%" border="1" style="border-collapse:collapse;">${rows}</table></div>`
        ]
    };

    function addRow() {
        const id = Date.now();
        const html = `<tr class="item-row" id="row_${id}">
            <td align="center">.</td>
            <td><input type="text" class="i-name" value="Item Name" oninput="update()"></td>
            <td><input type="text" class="i-hsn" value="1234" oninput="update()"></td>
            <td><input type="number" class="i-qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="i-rate" value="100" oninput="calculate()"></td>
            <td><input type="number" class="i-disc" value="0" oninput="calculate()"></td>
            <td><input type="text" class="i-amt" readonly></td>
            <td><button onclick="document.getElementById('row_${id}').remove(); calculate();">&times;</button></td>
        </tr>`;
        document.getElementById('ui_rows').insertAdjacentHTML('beforeend', html);
        calculate();
    }

    function calculate() {
        let st = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            let q = parseFloat(row.querySelector('.i-qty').value) || 0;
            let r = parseFloat(row.querySelector('.i-rate').value) || 0;
            let d = parseFloat(row.querySelector('.i-disc').value) || 0;
            let line = (q * r) - ((q * r) * (d / 100));
            row.querySelector('.i-amt').value = line.toFixed(2);
            st += line;
        });
        let cP = parseFloat(document.getElementById('s_cgst').value) || 0;
        let sP = parseFloat(document.getElementById('s_sgst').value) || 0;
        let iP = parseFloat(document.getElementById('s_igst').value) || 0;
        let tax = st * ((cP + sP + iP) / 100);
        document.getElementById('disp_grand').value = (st + tax).toFixed(2);
        update();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoImg = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function update() {
        const id = activeStyle - 1;
        const color = colors[id % 5];
        const d = {
            bName: document.getElementById('b_name').value, bAddr: document.getElementById('b_addr').value, bGst: document.getElementById('b_gst').value,
            bPhone: document.getElementById('b_phone').value, bEmail: document.getElementById('b_email').value, bWeb: document.getElementById('b_web').value,
            logo: logoImg ? `<img src="${logoImg}" width="120">` : `<b>LOGO</b>`,
            billNo: document.getElementById('q_no').value, billDate: document.getElementById('q_date').value,
            cName: document.getElementById('c_name').value, cAddr: document.getElementById('c_addr').value, cGst: document.getElementById('c_gst').value,
            payMode: document.getElementById('s_pay').value, due: document.getElementById('s_due').value, thank: document.getElementById('f_thank').value,
            grand: document.getElementById('disp_grand').value, cgst: document.getElementById('s_cgst').value, sgst: document.getElementById('s_sgst').value, igst: document.getElementById('s_igst').value
        };

        const border = Modules.borders[Math.floor(id / 5) % 5](color);
        const header = Modules.headers[Math.floor(id / 25) % 5](d, color);
        const table = Modules.tables[Math.floor(id / 125) % 4];

        const rows = Array.from(document.querySelectorAll('.item-row')).map((row, i) => `
            <tr><td align="center">${i+1}</td><td>${row.querySelector('.i-name').value}</td><td align="center">${row.querySelector('.i-hsn').value}</td><td align="center">${row.querySelector('.i-qty').value}</td><td align="right">${row.querySelector('.i-rate').value}</td><td align="center">${row.querySelector('.i-disc').value}%</td><td align="right">${row.querySelector('.i-amt').value}</td></tr>
        `).join('');

        document.getElementById('render-target').innerHTML = `
            <div style="${border} min-height:280mm; background:white; font-family:Arial,sans-serif;">
                ${header}
                <table width="100%" style="margin-top:10px;"><tr><td width="60%"><b>BILL TO:</b><br>${d.cName}<br>${d.cAddr}<br>GST: ${d.cGst}</td><td align="right"><b>INVOICE NO:</b> ${d.billNo}<br><b>DATE:</b> ${d.billDate}</td></tr></table>
                ${table(rows, color)}
                <table width="100%">
                    <tr>
                        <td width="60%"><b>Mode:</b> ${d.payMode}<br><b>Balance:</b> ₹ ${d.due}<br><br><i>${d.thank}</i></td>
                        <td align="right">
                            <small>CGST: ${d.cgst}% | SGST: ${d.sgst}% | IGST: ${d.igst}%</small>
                            <h2 style="color:${color}; margin-top:5px;">GRAND TOTAL: ₹ ${d.grand}</h2>
                        </td>
                    </tr>
                </table>
                <div style="margin-top:50px; text-align:right;"><b>Authorized Signatory</b><br><br>________________</div>
            </div>`;
    }

    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = 'BillBook.doc'; link.click();
    }

    const grid = document.getElementById('tpl-grid');
    for (let i = 1; i <= 500; i++) {
        const btn = document.createElement('button');
        btn.className = 'tpl-btn'; btn.style.background = colors[(i - 1) % 5]; btn.innerText = i;
        btn.onclick = () => { activeStyle = i; update(); };
        grid.appendChild(btn);
    }
    document.getElementById('q_date').valueAsDate = new Date();
    addRow();
</script>
</body>
</html>
