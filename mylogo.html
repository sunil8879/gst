  <style>
    :root { --bg: #050505; --accent: #ff0055; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

    .controls { 
        max-width: 1200px; margin: 0 auto 50px; background: #111; padding: 40px; 
        border-radius: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
        gap: 20px; border: 1px solid #333;
    }

    input, select { padding: 18px; border-radius: 12px; border: none; background: #222; color: white; font-size: 1.1rem; }
    
    .btn-gen { 
        grid-column: 1 / -1; padding: 20px; border-radius: 12px; border: none;
        background: linear-gradient(90deg, #ff00cc, #3333ff); color: white;
        font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
    }

    #logoGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(450px, 1fr)); gap: 40px; max-width: 1500px; margin: 0 auto; }

    .logo-card {
        aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
        border-radius: 40px; overflow: hidden; transition: 0.4s; cursor: pointer;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
    }

    .logo-inner {
        width: 100%; height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 40px; text-align: center; box-sizing: border-box;
    }

    /* MASSIVE ICONS */
.logo-icon svg {
    /* Change width/height from fixed to max-size */
    width: 220px !important; 
    height: 220px !important;
    max-width: 80%; /* Never wider than 80% of the card */
    max-height: 50%; /* Never taller than 50% of the card */
    flex-shrink: 1; /* Allow it to shrink if text is too long */
    margin-bottom: 10px;
}
    
    /* SMALL TEXT */
 .logo-name {
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-width: 90%; /* Keep text away from the very edges */
    line-height: 1.1;
}

    .logo-tag { letter-spacing: 0.2em; text-transform: uppercase; font-weight: bold; font-size: 1.0rem; }

    /* DOWNLOAD OVERLAY */
    .download-overlay {
        position: absolute; top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        opacity: 0; transition: 0.3s; z-index: 10;
    }
    .logo-card:hover .download-overlay { opacity: 1; }
    .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 70%; }
    .btn-dl { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; text-transform: uppercase; background: white; color: black; }
    .btn-dl:hover { background: var(--accent); color: white; }

    /* LAYOUT HELPERS */
    .flex-row { flex-direction: row !important; gap: 20px; }
    .circle-frame { border: 8px solid currentColor; border-radius: 50%; padding: 30px; }
    .square-frame { border: 8px solid currentColor; padding: 30px; }
    .underline { border-bottom: 6px solid currentColor; padding-bottom: 5px; }
    .glass { background: rgba(255,255,255,0.2) !important; backdrop-filter: blur(10px); }
    .neon-glow { text-shadow: 0 0 15px currentColor; }
    .outline-text { -webkit-text-stroke: 1px currentColor; color: transparent !important; }
    .double-border { border: 3px solid currentColor; outline: 8px solid currentColor; outline-offset: 8px; margin: 30px; }
    .watermark { position: absolute; font-size: 15rem !important; opacity: 0.1 !important; transform: scale(2.5); z-index: 0; }








/* 🔴 TOP SECTION (RED + CENTERED) */
.controls { 
    max-width: 1200px; 
    margin: 0 auto 50px; 

    background: #008000; /* RED BACKGROUND */
    color: #ffffff; /* WHITE TEXT */

    padding: 50px 20px; 
    border-radius: 20px;

    display: flex;
    flex-direction: column;
    align-items: center;     /* horizontal center */
    justify-content: center; /* vertical center */
    text-align: center;

    gap: 20px;
}

/* INPUT GROUP CENTERING */
.input-group { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    align-items: center;
    width: 100%;
    max-width: 400px;
}

/* INPUT FIELDS */
input, select { 
    padding: 15px; 
    border-radius: 10px; 
    border: none; 
    background: #FFFFFF; 
    color: #000000; 
    font-size: 1rem; 
    width: 100%;
}

/* ⚪ BUTTON (WHITE BG + BLACK TEXT) */
.btn-gen { 
    padding: 18px 30px; 
    border-radius: 12px; 
    border: 2px solid #000;

    background: #000000;   /* WHITE */
    color: #ffffff;        /* BLACK TEXT */

    font-size: 1.3rem; 
    font-weight: 900; 
    cursor: pointer; 
    text-transform: uppercase;

    transition: 0.3s;
}

/* 🔥 HOVER EFFECT */
.btn-gen:hover {
    background: #000000;
    color: #FFFFFF;
}



/* Headings / labels */
.controls label {
    font-weight: 600;
}

/* Inputs */
.controls input,
.controls select {
    font-weight: 400;
}

/* Button */
.btn-gen {
    font-weight: 700;
}

.main-heading {
    font-family: 'Poppins', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: #FFFFFF;
    margin: 0;
    letter-spacing: 2px;
    text-align: center;
}



/* Styling for the Optional Fixed Image */
.fixed-user-photo {
    position: absolute;
    top: 25px; /* Fixed at the top */
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    border-radius: 50%; /* Circle look */
    object-fit: cover;
    border: 4px solid white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    z-index: 5; /* Above background, behind buttons */
}







/* --- MOBILE COMPLIANCE & RESPONSIVENESS --- */

/* Prevent any horizontal shifting on the whole page */
html, body {
    max-width: 100vw;
    overflow-x: hidden;
}

/* Adjust the Logo Grid for Tablets and Phones */
@media (max-width: 768px) {
    /* 1. Header & Controls: Stack vertically and center */
    .header-section {
        padding: 30px 15px;
    }
    
    .header-section h1 {
        font-size: 1.8rem; /* Smaller title for mobile */
    }

    .controls {
        grid-template-columns: 1fr; /* Stack inputs one by one */
        gap: 15px;
        width: 100%;
    }

    input, select {
        width: 100% !important; /* Full width inputs */
        box-sizing: border-box;
    }

    /* 2. Formatting Bar: Wrap items so they don't go off-screen */
    .format-bar {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
    }

    .format-bar div {
        border-left: none !important;
        padding-left: 0 !important;
        justify-content: center;
    }

    /* 3. THE LOGO GRID: Shrink cards to fit the screen */
    #logoGrid {
        grid-template-columns: 1fr; /* One logo per row on mobile */
        padding: 20px;
        gap: 25px;
    }

    /* 4. THE LOGO CARD: Scale down the card size and elements */
    .logo-card {
        width: 100%;
        max-width: 350px; /* Keep them neat on small screens */
        margin: 0 auto;
    }

    /* Scale down the massive icon for mobile */
    .logo-icon svg {
        width: 140px !important; 
        height: 140px !important;
    }

    .logo-name {
        font-size: 1.2rem !important; /* Force smaller font on mobile */
    }

    .logo-tag {
        font-size: 0.7rem !important;
    }

    /* 5. Fixed User Photo Scaling */
    .fixed-user-photo {
        width: 60px;
        height: 60px;
        top: 15px;
    }
}
</style>

    const font = FONTS[Math.floor(Math.random() * FONTS.length)];
    const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    const iconName = ICONS[ind][Math.floor(Math.random() * ICONS[ind].length)];

    const card = document.createElement('div');




    card.className = 'logo-card';
    card.style.backgroundColor = pal.bg;

    const inner = document.createElement('div');
    inner.className = 'logo-inner';
    inner.style.color = pal.text;


// OPTIONAL: If a photo is uploaded, add it to the Top-Center of the card
    if (currentPhotoBase64) {
        const photoImg = document.createElement('img');
        photoImg.src = currentPhotoBase64;
        photoImg.className = 'fixed-user-photo';
        card.appendChild(photoImg);
        
        // Push the inner content down slightly so it doesn't collide
        inner.style.paddingTop = "100px"; 
    }

    // NAME ELEMENT + FORMATTING
    const nameEl = document.createElement('div');
    nameEl.className = 'logo-name';
    nameEl.innerText = name;
    nameEl.style.fontFamily = font;
  // DYNAMIC FONT SCALING based on character count
    if (name.length > 20) {
        nameEl.style.fontSize = '1.2rem'; // Ultra small for very long names
    } else if (name.length > 15) {
        nameEl.style.fontSize = '1.5rem';
    } else if (name.length > 10) {
        nameEl.style.fontSize = '2.0rem';
    } else {
        nameEl.style.fontSize = '2.2rem'; // Default for short names
    }
    
    // Explicitly set or reset styles based on checkboxes
    nameEl.style.fontWeight = format.nameB ? '900' : 'normal';
    nameEl.style.fontStyle = format.nameI ? 'italic' : 'normal';
    nameEl.style.textDecoration = format.nameU ? 'underline' : 'none';

    // TAGLINE ELEMENT + FORMATTING
    const tagEl = document.createElement('div');
// Inside createLogo, near tagEl definition:
    if (tag.length > 25) {
        tagEl.style.fontSize = '0.6rem';
    } else {
        tagEl.style.fontSize = '1.2rem';
    }
    tagEl.className = 'logo-tag';
    tagEl.innerText = tag;
    tagEl.style.color = pal.accent;
    tagEl.style.fontWeight = format.tagB ? '900' : 'normal';
    tagEl.style.fontStyle = format.tagI ? 'italic' : 'normal';
    tagEl.style.textDecoration = format.tagU ? 'underline' : 'none';

    // ICON ELEMENT
    const iconWrap = document.createElement('div');
    iconWrap.className = 'logo-icon';
    iconWrap.innerHTML = `<i data-lucide="${iconName}" color="${pal.text}" stroke-width="1.5"></i>`;

    
    // 30 LAYOUT ENGINE
   const appendAll = () => inner.append(iconWrap, nameEl, tagEl);

    switch(layoutIdx) {
        // --- 1–10: MODERN & CLEAN ---
        case 1: inner.classList.add('flex-row'); appendAll(); break;
        case 2: appendAll(); break; // Standard Centered
        case 3: iconWrap.style.display = 'none'; nameEl.style.fontSize = '4rem'; inner.append(nameEl, tagEl); break;
        case 4: iconWrap.classList.add('circle-frame'); appendAll(); break;
        case 5: iconWrap.classList.add('square-frame'); inner.classList.add('flex-row'); appendAll(); break;
        case 6: card.style.background = `linear-gradient(90deg, ${pal.accent} 35%, ${pal.bg} 35%)`; appendAll(); break;
        case 7: nameEl.classList.add('bordered-box'); appendAll(); break;
        case 8: nameEl.classList.add('underline'); appendAll(); break;
        case 9: appendAll(); break; // Tagline below
        case 10: nameEl.style.whiteSpace = 'pre-wrap'; nameEl.innerText = name.split(' ').join('\n'); appendAll(); break;

        // --- 11–20: STYLISH & TRENDY ---
        case 11: card.style.borderLeft = `25px solid ${pal.accent}`; inner.style.alignItems = 'flex-start'; inner.style.textAlign = 'left'; appendAll(); break;
        case 12: card.style.borderRight = `25px solid ${pal.accent}`; inner.style.alignItems = 'flex-end'; inner.style.textAlign = 'right'; appendAll(); break;
        case 13: card.style.background = `linear-gradient(135deg, ${pal.bg} 50%, ${pal.accent} 50%)`; appendAll(); break;
        case 14: card.style.background = `linear-gradient(45deg, ${pal.accent}, ${pal.text})`; inner.style.color = '#ffffff'; appendAll(); break;
        case 15: nameEl.classList.add('neon-glow'); iconWrap.classList.add('neon-glow'); appendAll(); break;
        case 16: card.classList.add('glass'); appendAll(); break;
        case 17: card.style.boxShadow = 'inset 0 0 50px rgba(0,0,0,0.3), 0 40px 60px rgba(0,0,0,0.5)'; appendAll(); break;
        case 18: nameEl.classList.add('outline-text'); appendAll(); break;
        case 19: card.style.borderRadius = '50%'; card.style.border = `12px double ${pal.text}`; appendAll(); break;
        case 20: card.style.borderRadius = '100px'; appendAll(); break;

        // --- 21–30: WOW / CREATIVE / PREMIUM ---
        case 21: iconWrap.style.marginBottom = '-40px'; iconWrap.style.zIndex = '2'; nameEl.style.zIndex = '1'; appendAll(); break;
        case 22: nameEl.innerText = name.substring(1); inner.classList.add('flex-row'); appendAll(); break;
        case 23: 
            const m = Math.ceil(name.length/2); 
            nameEl.innerHTML = `<span style="color:${pal.accent}">${name.slice(0,m)}</span>${name.slice(m)}`; 
            appendAll(); break;
        case 24: iconWrap.style.transform = 'rotate(-25deg)'; appendAll(); break;
        case 25: 
            const wm = iconWrap.cloneNode(true); 
            wm.classList.add('watermark'); 
            card.appendChild(wm); 
            inner.append(nameEl, tagEl); 
            break;
        case 26: 
            inner.style.border = `4px solid ${pal.text}`; 
            inner.style.outline = `8px solid ${pal.text}`; 
            inner.style.outlineOffset = '8px'; 
            inner.style.margin = '35px'; 
            appendAll(); break;
        case 27: card.style.clipPath = 'polygon(0% 0%, 100% 0%, 100% 85%, 50% 100%, 0% 85%)'; appendAll(); break;
        case 28: 
            const hr = document.createElement('div'); 
            hr.style.cssText = `width:120px; height:5px; background:${pal.accent}; margin:15px;`; 
            inner.append(iconWrap, hr, nameEl, tagEl); 
            break;
        case 29: 
            inner.style.display = 'grid'; 
            inner.style.gridTemplateColumns = '1fr 1fr'; 
            inner.append(iconWrap, nameEl, tagEl); 
            break;
        case 30: nameEl.classList.add('three-d'); appendAll(); break;
        
        default: appendAll(); break;
    }
         
    
    card.appendChild(inner);

    // DOWNLOAD OVERLAY
    const overlay = document.createElement('div');
    overlay.className = 'download-overlay';
    const btnBox = document.createElement('div');
    btnBox.className = 'dl-group';

    ['PNG', 'JPG', 'PDF', 'SVG'].forEach(fmt => {
        const b = document.createElement('button');
        b.className = 'btn-dl';
        b.innerText = fmt;
        b.onclick = (e) => { 
            e.stopPropagation(); 
           // We now pass 'card' so the background color is captured
downloadLogo(card, name, fmt);
        };
        btnBox.appendChild(b);
    });

    overlay.appendChild(btnBox);
    card.appendChild(overlay);

    return card;
}

// 3. THE DOWNLOAD HANDLER
async function downloadLogo(cardElement, fileName, format) {
    try {
        // 1. Hide the buttons before capturing
        const overlay = cardElement.querySelector('.download-overlay');
        if (overlay) overlay.style.display = 'none';

        // 2. Capture the card at 4x resolution (High Quality)
        const canvas = await html2canvas(cardElement, {
            scale: 4, 
            useCORS: true,
            backgroundColor: null, // Keeps transparency for PNG
            logging: false
        });

        const imgData = canvas.toDataURL('image/png');

        if (format === 'SVG') {
            // THE FIX: Embed the high-res capture into an SVG wrapper
            // This preserves ALL 30 layouts (Gradients, Neon, 3D, etc.)
            const svgContent = `
                <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                    <image href="${imgData}" width="1024" height="1024" />
                </svg>`;
            const blob = new Blob([svgContent], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            triggerDownload(url, `${fileName}_card.svg`);
        } 
        else if (format === 'PDF') {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'px', [canvas.width, canvas.height]);
            pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`${fileName}_card.pdf`);
        } 
        else if (format === 'JPG') {
            // For JPG, we need a white background (since it doesn't support transparency)
            const jpgCanvas = document.createElement('canvas');
            jpgCanvas.width = canvas.width;
            jpgCanvas.height = canvas.height;
            const ctx = jpgCanvas.getContext('2d');
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(canvas, 0, 0);
            triggerDownload(jpgCanvas.toDataURL('image/jpeg', 0.9), `${fileName}_card.jpg`);
        } 
        else {
            // PNG
            triggerDownload(imgData, `${fileName}_card.png`);
        }

        // 3. Show the buttons again
        if (overlay) overlay.style.display = 'flex';

    } catch (err) {
        console.error("Critical Download Error:", err);
        alert("Download failed. Make sure you are connected to the internet to load libraries.");
    }
}

// Helper to trigger the actual browser download
function triggerDownload(url, name) {
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
window.onload = generateLogos;

function initIndustryDropdown() {
    const select = document.getElementById('industry') || document.getElementById('indInp');
    if (!select) return;

    // Clear existing options
    select.innerHTML = '';

    // Sort industries alphabetically and add them to the dropdown
    Object.keys(ICONS).sort().forEach(industry => {
        const opt = document.createElement('option');
        opt.value = industry;
        opt.innerHTML = industry;
        select.appendChild(opt);
    });
}

// Run this when the page loads
window.addEventListener('DOMContentLoaded', (event) => {
    initIndustryDropdown();
    generateLogos(); // Generate first set automatically
});




function applyLiveStyles() {
    // 1. Get the current state of all checkboxes
    const nB = document.getElementById('nameBold').checked;
    const nI = document.getElementById('nameItalic').checked;
    const nU = document.getElementById('nameUnderline').checked;
    
    const tB = document.getElementById('tagBold').checked;
    const tI = document.getElementById('tagItalic').checked;
    const tU = document.getElementById('tagUnderline').checked;

    // 2. Update all Names currently on the grid
    document.querySelectorAll('.logo-name').forEach(el => {
        el.style.fontWeight = nB ? '900' : 'normal';
        el.style.fontStyle = nI ? 'italic' : 'normal';
        el.style.textDecoration = nU ? 'underline' : 'none';
    });

    // 3. Update all Taglines currently on the grid
    document.querySelectorAll('.logo-tag').forEach(el => {
        el.style.fontWeight = tB ? '900' : 'normal';
        el.style.fontStyle = tI ? 'italic' : 'normal';
        el.style.textDecoration = tU ? 'underline' : 'none';
    });
}





let currentPhotoBase64 = null; // Stores the image globally

function previewUserPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            currentPhotoBase64 = e.target.result;
            generateLogos(); // Instant refresh to show image on current cards
        };
        reader.readAsDataURL(input.files[0]);
    }
}
