        :root {
            --primary: #1e3a8a;
            --aqua: #7FFFD4;
            --navy: #0f172a;
            --white: #ffffff;
            --bg-canvas: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--navy); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 380px; background: #161e2e; padding: 30px; 
            border-right: 1px solid #2d3748; overflow-y: auto; flex-shrink: 0;
        }
        .sidebar h2 { font-weight: 800; color: var(--aqua); text-transform: uppercase; margin-bottom: 25px; border-bottom: 2px solid var(--aqua); padding-bottom: 10px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #a0aec0; margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2d3748; 
            background: #0f172a; color: white; font-weight: 600; font-size: 0.9rem;
        }
        input:focus { outline: none; border-color: var(--aqua); }

        /* --- WORKSPACE --- */
        .workspace { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; padding: 40px; position: relative; }

        /* --- THE LOGO CANVAS --- */
        #logo-preview-container {
            width: 512px; height: 512px; background: white;
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        #logo-content {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; height: 100%;
            padding: 40px; text-align: center;
        }

        #logo-icon { font-size: 80px; margin-bottom: 15px; transition: 0.3s; }
        #logo-text { font-size: 45px; line-height: 1; transition: 0.3s; }
        #logo-slogan { font-size: 14px; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        /* --- CONTROLS --- */
        .controls { display: flex; gap: 15px; margin-top: 40px; }
        .btn { 
            padding: 15px 25px; border-radius: 12px; border: none; font-weight: 800; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .btn-magic { background: var(--aqua); color: var(--navy); box-shadow: 0 0 20px rgba(127, 255, 212, 0.3); }
        .btn-download { background: var(--white); color: var(--navy); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* --- DL DROPDOWN --- */
        .dl-group { position: relative; display: inline-block; }
        .dl-menu { 
            position: absolute; bottom: 100%; left: 0; background: white; 
            border-radius: 10px; display: none; width: 150px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 10px; z-index: 100;
        }
        .dl-group:hover .dl-menu { display: block; }
        .dl-menu button { 
            width: 100%; padding: 10px; border: none; background: none; 
            text-align: left; font-weight: 700; cursor: pointer; color: var(--navy); 
        }
        .dl-menu button:hover { background: #f0fdfa; color: var(--primary); }

        /* --- LAYOUT VARIANTS --- */
        .layout-side { flex-direction: row !important; gap: 20px; }
        .layout-badge { border: 20px solid; padding: 20px; }
        .layout-minimal #logo-icon { display: none; }
        .layout-icon-only #logo-text, .layout-icon-only #logo-slogan { display: none; }

#logo-icon { display: inline-block; font-family: "Font Awesome 6 Free"; font-weight: 900; }



/* --- ADVANCED TEXT EFFECTS --- */
.text-gradient { background: linear-gradient(to right, var(--aqua), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.text-outline { -webkit-text-stroke: 1px var(--white); color: transparent; }
.text-3d { text-shadow: 0 1px 0 #ccc, 0 2px 0 #c9c9c9, 0 3px 0 #bbb, 0 4px 0 #b9b9b9, 0 5px 0 #aaa, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15); }

/* --- ADVANCED CONTAINER EFFECTS --- */
.glass { background: rgba(255, 255, 255, 0.1) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
.neo { background: #e0e0e0 !important; box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff !important; border: none !important; }
.neo #logo-text, .neo #logo-icon { color: #444 !important; }

/* --- BLOBS & SHAPES --- */

.frame-corner { border: 10px solid transparent; border-image: radial-gradient(var(--aqua) 2px, transparent 0) 10; }

#user-uploaded-img { max-width: 150px; display: none; margin-bottom: 15px; }

.logo-content-base {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
}




/* --- 20 PRO LOGO LAYOUTS --- */
.lay-1 { flex-direction: row !important; gap: 30px; text-align: left; } /* Icon Left */
.lay-2 { flex-direction: column !important; } /* Icon Top */
.lay-3 #logo-icon { display: none; } /* Wordmark */
.lay-4 #logo-icon { font-family: inherit; font-style: normal; border: 4px solid; padding: 10px; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; } /* Lettermark */
.lay-5 { border-radius: 50% !important; border: 10px double; padding: 50px; } /* Badge */
.lay-6 { flex-direction: row !important; gap: 15px; } .lay-6 #logo-slogan { margin-top: 0; padding-left: 15px; border-left: 2px solid; } /* Inline */
.lay-7 { flex-direction: row !important; } .lay-7 #logo-icon { padding-right: 30px; border-right: 3px solid; margin-bottom: 0; } .lay-7 .text-group { padding-left: 30px; text-align: left; }
.lay-8 #logo-icon { position: absolute; font-size: 300px !important; opacity: 0.1; z-index: 1; transform: rotate(-15deg); } /* Overlay */
.lay-9 { border-radius: 50% !important; border: 5px solid; outline: 15px solid transparent; outline-offset: -20px; } /* Emblem */
.lay-10 { gap: 0; } .lay-10 #logo-icon, .lay-10 #logo-text, .lay-10 #logo-slogan { background: rgba(0,0,0,0.1); width: 100%; padding: 10px; margin: 2px 0; } /* Stacked Block */
.lay-11 { transform: skewX(-10deg); } /* Diagonal */
.lay-12 #logo-text { background: var(--white); color: var(--navy); padding: 5px 20px; } /* Text inside shape */
.lay-13 { border: 2px solid; border-radius: 50% !important; width: 450px !important; height: 450px !important; } /* Circle Border */
.lay-14 { border-left: 20px solid; padding-left: 40px !important; align-items: flex-start !important; text-align: left; } /* Side Strip */
.lay-15 #logo-preview-container { background-image: radial-gradient(var(--white) 1px, transparent 0); background-size: 20px 20px; } /* Pattern */
.lay-16 #logo-text { border-bottom: 5px solid; padding-bottom: 10px; margin-bottom: 10px; } /* Underline */
.lay-17 #logo-text { border-top: 5px solid; padding-top: 10px; } /* Overline */
.lay-18 #logo-text { text-align: left; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.2); } /* Split Text */
.lay-19 { flex-direction: row !important; justify-content: center; gap: 20px; } /* Icon Between */
.lay-20 { align-items: flex-start !important; justify-content: flex-start !important; padding: 40px !important; } /* Minimal Corner */

/* Base helper for Text Grouping */
.text-group { display: flex; flex-direction: column; z-index: 5; }

           <div id="logo-content" class="logo-content-base">
    <i id="logo-icon" class="fa-solid fa-bolt"></i>
    <div class="text-group">

    <script>
      const fonts = ['Abel', 'Abril Fatface', 'Anton', 'Arvo', 'Bebas Neue', 'Bitter', 'Bree Serif', 'Cabin', 'Cairo', 'Caveat', 'Comfortaa', 'Courgette', 'Crimson Text', 'Dancing Script', 'Dosis', 'Exo 2', 'Fira Sans', 'Fjalla One', 'Fredoka One', 'Hind', 'Inconsolata', 'Indie+Flower', 'Inter', 'Josefin Sans', 'Kanit', 'Lalezar', 'Lato', 'Lexend', 'Libre Baskerville', 'Lobster', 'Lora', 'Montserrat', 'Nunito', 'Open Sans', 'Oswald', 'Outfit', 'Pacifico', 'Playfair Display', 'Poppins', 'Quicksand', 'Raleway', 'Righteous', 'Roboto', 'Shadows Into Light', 'Space Grotesk', 'Syncopate', 'Teko', 'Titillium Web', 'Ubuntu', 'Varela Round'];
        
    function updateLogo() {
            const name = document.getElementById('in_name').value;
            const slogan = document.getElementById('in_slogan').value;
            const iconInput = document.getElementById('in_icon').value.trim(); // Added trim
            
            document.getElementById('logo-text').innerText = name;
            document.getElementById('logo-slogan').innerText = slogan;
            
            // This forces the icon to update immediately
            const iconEl = document.getElementById('logo-icon');
            iconEl.className = `fa-solid fa-${iconInput}`;
            
            const shape = document.getElementById('in_shape').value;
            const container = document.getElementById('logo-preview-container');
            if(shape === 'circle') { container.style.borderRadius = '50%'; container.style.width = '550px'; }
            else if(shape === 'rect') { container.style.borderRadius = '0px'; container.style.width = '750px'; }
            else { container.style.borderRadius = '0px'; container.style.width = '550px'; }
        }

     function previewUserImg(e) {
            const reader = new FileReader();
            reader.onload = function(){
                let img = document.getElementById('logo-user-img');
                if(!img) {
                    img = document.createElement('img');
                    img.id = "logo-user-img";
                    document.getElementById('logo-content').prepend(img);
                }
                img.src = reader.result;
                img.style.maxWidth = "180px";
                img.style.maxHeight = "180px";
                img.style.marginBottom = "15px";
                img.style.objectFit = "contain";
                document.getElementById('logo-icon').style.display = "none";
            }
            reader.readAsDataURL(e.target.files[0]);
        }
function shuffleLogo() {
    const container = document.getElementById('logo-preview-container');
    const content = document.getElementById('logo-content');
    const text = document.getElementById('logo-text');
    const icon = document.getElementById('logo-icon');
    const slogan = document.getElementById('logo-slogan');
    const vibe = document.getElementById('in_vibe').value;
    const name = document.getElementById('in_name').value;

    // 1. Color Palette
    const h = Math.floor(Math.random() * 360);
    const isDark = Math.random() > 0.5;
    const bgColor = isDark ? `hsl(${h}, 40%, 12%)` : `hsl(${h}, 15%, 98%)`;
    const accent = isDark ? `hsl(${Math.random() * 360}, 80%, 75%)` : `hsl(${h}, 80%, 25%)`;

    // 2. Apply Theme
    container.style.background = bgColor;
    container.style.color = accent;
    container.style.border = "none";
    container.style.padding = "40px";

    // 3. Random Layout (1 to 20)
    const layoutNum = Math.floor(Math.random() * 20) + 1;
    content.className = "logo-content-base lay-" + layoutNum;
    
    // 4. Typography & Icon Randomization
    const font = fonts[Math.floor(Math.random() * fonts.length)];
    text.style.fontFamily = font;
    text.style.color = accent;
    icon.style.color = accent;
    slogan.style.color = accent;
    slogan.style.opacity = "0.8";
    
    // 5. Special Layout Logic
    icon.style.display = "block";
    text.style.display = "block";
    icon.innerText = ""; // Clear initials if any
    
    if(layoutNum === 4) { // Lettermark Logic
        icon.innerText = name.charAt(0).toUpperCase();
        icon.className = ""; // Remove fontawesome class
    } else {
        icon.className = `fa-solid fa-${document.getElementById('in_icon').value}`;
    }

    if(layoutNum === 19) { // Icon Between logic
        const mid = Math.ceil(name.length / 2);
        const part1 = name.substring(0, mid);
        const part2 = name.substring(mid);
        text.innerHTML = `<span>${part1}</span> <i class="${icon.className}" style="font-size:0.8em"></i> <span>${part2}</span>`;
        icon.style.display = "none";
    } else {
        text.innerHTML = name;
    }

    // 6. Shape Logic
    const shapeType = document.getElementById('in_shape').value;
    if(shapeType === 'circle') container.style.borderRadius = "50%";
    else if(shapeType === 'rect') container.style.width = "750px";
    else { container.style.width = "550px"; container.style.borderRadius = "0px"; }

    // 7. WOW Effects (Glass/Neo/Neon)
    if(vibe === 'glass') container.classList.add('glass');
    if(vibe === 'neo') container.classList.add('neo');
    if(vibe === 'neon') text.style.textShadow = `0 0 15px ${accent}`;
}
      async function exportLogo(fmt) {
    const container = document.getElementById('logo-preview-container');
    const brandName = document.getElementById('in_name').value || 'Logo';

 if (fmt === 'svg') {
        const canvas = await html2canvas(container, { backgroundColor: null, scale: 2 });
        const imgData = canvas.toDataURL("image/png");
        
        // This creates an SVG container and embeds the High-Res logo as a vector-wrapped image
        // This is the only way to keep 3D effects, Glassmorphism, and Icons perfectly intact
        const svgData = `
        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${container.offsetWidth}" height="${container.offsetHeight}">
            <image width="${container.offsetWidth}" height="${container.offsetHeight}" xlink:href="${imgData}" />
        </svg>`;
        
        const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `${brandName}_Vector.svg`;
        link.href = url;
        link.click();
        return;
    }

    // PNG, JPG, and PDF Logic
    const canvas = await html2canvas(container, {
        scale: 4, // 4x scale for professional high-res quality
        useCORS: true,
        backgroundColor: (fmt === 'jpg') ? "#FFFFFF" : null, // Forces white BG for JPG
    });

    if (fmt === 'png' || fmt === 'jpg') {
        const mime = (fmt === 'jpg') ? 'image/jpeg' : 'image/png';
        const link = document.createElement('a');
        link.download = `${brandName}_Logo.${fmt}`;
        link.href = canvas.toDataURL(mime, 1.0);
        link.click();
    } else if (fmt === 'pdf') {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF(container.offsetWidth > container.offsetHeight ? 'l' : 'p', 'px', [container.offsetWidth, container.offsetHeight]);
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, container.offsetWidth, container.offsetHeight);
        pdf.save(`${brandName}_Logo.pdf`);
    }
}
        // Init
        window.onload = () => {
            updateLogo();
            shuffleLogo();
        };
    </script>
