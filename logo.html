const generate500Palettes = () => {
    const palettes = [
        // We keep your initial high-quality manual palettes first
        { main: '#6366f1', secondary: '#1e1b4b', bg: '#ffffff', grad: 'linear-gradient(135deg, #6366f1 0%, #4338ca 100%)' },
        { main: '#10b981', secondary: '#064e3b', bg: '#ffffff', grad: 'linear-gradient(135deg, #10b981 0%, #059669 100%)' },
        { main: '#f43f5e', secondary: '#4c0519', bg: '#ffffff', grad: 'linear-gradient(135deg, #fb7185 0%, #e11d48 100%)' },
        { main: '#0ea5e9', secondary: '#0c4a6e', bg: '#ffffff', grad: 'linear-gradient(135deg, #38bdf8 0%, #0284c7 100%)' },
        { main: '#f59e0b', secondary: '#451a03', bg: '#ffffff', grad: 'linear-gradient(135deg, #fbbf24 0%, #d97706 100%)' }
    ];

    const hslToHex = (h, s, l) => {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    };

    // Generate 495 additional unique palettes
    for (let i = 0; i < 495; i++) {
        // Use the Golden Angle to distribute hues evenly (0-360)
        const hue = (i * 137.508) % 360; 
        
        // Vary saturation and lightness for professional branding looks
        const saturation = 60 + (i % 30); // 60% to 90%
        const lightness = 40 + (i % 20);  // 40% to 60%
        
        const mainColor = hslToHex(hue, saturation, lightness);
        const secondaryColor = hslToHex(hue, saturation, lightness - 25); // Darker version
        const accentColor = hslToHex((hue + 15) % 360, saturation, lightness - 10);
        
        palettes.push({
            main: mainColor,
            secondary: secondaryColor,
            bg: '#ffffff',
            grad: `linear-gradient(135deg, ${mainColor} 0%, ${accentColor} 100%)`
        });
    }
    return palettes;
};

    let lastLayout = -1;

    function generateLogos() {
        if(!document.getElementById('bizName').value) return alert("Enter Business Name");
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('loadMore').classList.remove('hidden');
        document.getElementById('logoGrid').innerHTML = '';
        renderBatch();
    }

    function renderBatch() {
        const name = document.getElementById('bizName').value.toUpperCase();
        const tag = document.getElementById('tagline').value.toUpperCase();
        const industry = document.getElementById('industry').value;
        const grid = document.getElementById('logoGrid');

        for (let i = 0; i < 24; i++) {
            let colorIdx, layoutIdx;
            do { colorIdx = Math.floor(Math.random() * colors.length); } while (colorIdx === lastColor);
            do { layoutIdx = Math.floor(Math.random() * 26); } while (layoutIdx === lastLayout);
            
            lastColor = colorIdx;
            lastLayout = layoutIdx;

            const config = {
                color: colors[colorIdx],
                font: fonts[Math.floor(Math.random() * fonts.length)],
                icon: icons[industry][Math.floor(Math.random() * icons[industry].length)],
                layout: layoutIdx
            };

            grid.appendChild(createLogoCard(name, tag, config));
        }
    }

            <div class="download-overlay opacity-0 absolute inset-0 bg-white/95 backdrop-blur-md flex flex-col items-center justify-center gap-4 transition-all duration-300 p-10">
                <button onclick="downloadLogo(event, 'jpg')" class="w-full bg-gray-100 hover:bg-gray-200 py-3 rounded-xl font-bold text-xs transition-all">JPG</button>
                <button onclick="downloadLogo(event, 'png')" class="w-full bg-gray-100 hover:bg-gray-200 py-3 rounded-xl font-bold text-xs transition-all">PNG</button>
                <button onclick="downloadLogo(event, 'pdf')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs shadow-xl">PDF DOCUMENT</button>
            </div>
        `;
        return div;
    }

    async function downloadLogo(event, type) {
        event.stopPropagation();
        const card = event.currentTarget.closest('.logo-card');
        const bizName = document.getElementById('bizName').value || 'logo';
        const overlay = card.querySelector('.download-overlay');
        
        overlay.style.visibility = 'hidden';
        const canvas = await html2canvas(card, { 
            scale: 4, 
            backgroundColor: card.style.backgroundColor,
            logging: false,
            useCORS: true
        });
        overlay.style.visibility = 'visible';

        if(type === 'pdf') {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'px', [canvas.width, canvas.height]);
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`${bizName}.pdf`);
        } else {
            const link = document.createElement('a');
            link.download = `${bizName}.${type}`;
            link.href = canvas.toDataURL(`image/${type === 'jpg' ? 'jpeg' : 'png'}`, 1.0);
            link.click();
        }
    }
</script>
</body>
</html>
