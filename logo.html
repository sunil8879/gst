const generate500Palettes = () => {
    const palettes = [
        // We keep your initial high-quality manual palettes first
        { main: '#6366f1', secondary: '#1e1b4b', bg: '#ffffff', grad: 'linear-gradient(135deg, #6366f1 0%, #4338ca 100%)' },
        { main: '#10b981', secondary: '#064e3b', bg: '#ffffff', grad: 'linear-gradient(135deg, #10b981 0%, #059669 100%)' },
        { main: '#f43f5e', secondary: '#4c0519', bg: '#ffffff', grad: 'linear-gradient(135deg, #fb7185 0%, #e11d48 100%)' },
        { main: '#0ea5e9', secondary: '#0c4a6e', bg: '#ffffff', grad: 'linear-gradient(135deg, #38bdf8 0%, #0284c7 100%)' },
        { main: '#f59e0b', secondary: '#451a03', bg: '#ffffff', grad: 'linear-gradient(135deg, #fbbf24 0%, #d97706 100%)' }
    ];

    const hslToHex = (h, s, l) => {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    };

    // Generate 495 additional unique palettes
    for (let i = 0; i < 495; i++) {
        // Use the Golden Angle to distribute hues evenly (0-360)
        const hue = (i * 137.508) % 360; 
        
        // Vary saturation and lightness for professional branding looks
        const saturation = 60 + (i % 30); // 60% to 90%
        const lightness = 40 + (i % 20);  // 40% to 60%
        
        const mainColor = hslToHex(hue, saturation, lightness);
        const secondaryColor = hslToHex(hue, saturation, lightness - 25); // Darker version
        const accentColor = hslToHex((hue + 15) % 360, saturation, lightness - 10);
        
        palettes.push({
            main: mainColor,
            secondary: secondaryColor,
            bg: '#ffffff',
            grad: `linear-gradient(135deg, ${mainColor} 0%, ${accentColor} 100%)`
        });
    }
    return palettes;
};

function generateLogos() {
    if(!document.getElementById('bizName').value) return alert("Enter Business Name");
    document.getElementById('welcomeScreen').style.display = 'none';
    document.getElementById('paginationWrapper').classList.remove('hidden');
    
    pageCache = {}; // Clear previous session
    renderPage(1);
}


function renderPage(page) {
    // 1. Update the Global Current Page
    currentPage = page;
    
    const grid = document.getElementById('logoGrid');
    grid.innerHTML = '';
    
    // 2. Check Cache or Generate New Batch
    if (!pageCache[currentPage]) {
        pageCache[currentPage] = generateLogoDataBatch();
    }

    // 3. Render the batch
    pageCache[currentPage].forEach(item => {
        grid.appendChild(createLogoCard(item.name, item.tag, item.config));
    });

    // 4. Refresh UI and Scroll
    updatePaginationUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// THE ENGINE: Creates 24 unique combinations from the 1.87 Billion possibilities
function generateLogoDataBatch() {
    const name = document.getElementById('bizName').value.toUpperCase();
    const tag = document.getElementById('tagline').value.toUpperCase();
    const industryKey = document.getElementById('industry').value;
    const industryRule = industryRules[industryKey];
    const designStyle = designConsistencyEngine[industryKey] || designConsistencyEngine.tech;
    
    let batch = [];
    for (let i = 0; i < logosPerPage; i++) {
        const isIconDominant = Math.random() > 0.5;
        const iconSize = isIconDominant ? (90 * designStyle.iconScale) : (50 * designStyle.iconScale);
        const titleSize = isIconDominant ? '1.5rem' : '2.5rem';
        const hue = industryRule.hues[0] + (Math.random() * (industryRule.hues[1] - industryRule.hues[0]));
        
        batch.push({
            name: name,
            tag: tag,
            config: {
                color: { 
                    main: `hsl(${hue}, 70%, 45%)`, 
                    secondary: `hsl(${hue}, 80%, 15%)`, 
                    bg: Math.random() > 0.8 ? '#111827' : '#ffffff', // 20% Dark variants
                    grad: `linear-gradient(135deg, hsl(${hue}, 70%, 45%) 0%, hsl(${(hue+30)%360}, 70%, 60%) 100%)`
                },
                font: { 
                    name: industryRule.fonts[Math.floor(Math.random() * industryRule.fonts.length)],
                    tagFont: 'Inter',
                    weight: '800',
                    spacing: designStyle.textSpacing
                },
                icon: icons[industryKey][Math.floor(Math.random() * icons[industryKey].length)],
                layout: Math.floor(Math.random() * 26),
                hierarchy: { icon: `${iconSize}px`, title: titleSize, shadow: designStyle.shadow }
            }
        });
    }
    return batch;
}





function updatePaginationUI() {
    const wrapper = document.getElementById('paginationButtons');
    if (!wrapper) return;
    wrapper.innerHTML = '';

    // Calculate a visible range of 5 pages around the current page
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(maxPages, startPage + 4);
    
    // Adjust start if we are near the end
    if (endPage === maxPages) {
        startPage = Math.max(1, endPage - 4);
    }

    // 1. Previous Button
    if (currentPage > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.innerText = 'Prev';
        prevBtn.className = "px-4 py-2 rounded-xl font-bold bg-white text-gray-600 border hover:bg-gray-50 transition-all cursor-pointer";
        prevBtn.onclick = () => renderPage(currentPage - 1);
        wrapper.appendChild(prevBtn);
    }

    // 2. Numbered Buttons
    for (let i = startPage; i <= endPage; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = `w-12 h-12 rounded-xl font-bold transition-all border cursor-pointer ${i === currentPage ? 'bg-indigo-600 text-white shadow-xl border-indigo-600' : 'bg-white text-gray-400 hover:border-indigo-500'}`;
        
        // This closure ensures 'i' is captured correctly for every button
        const pageTarget = i;
        btn.onclick = () => renderPage(pageTarget);
        
        wrapper.appendChild(btn);
    }

    // 3. Next Button
    if (currentPage < maxPages) {
        const nextBtn = document.createElement('button');
        nextBtn.innerText = 'Next';
        nextBtn.className = "px-4 py-2 rounded-xl font-bold bg-white text-gray-600 border hover:bg-gray-50 transition-all cursor-pointer";
        nextBtn.onclick = () => renderPage(currentPage + 1);
        wrapper.appendChild(nextBtn);
    }
    
    document.getElementById('pageInfo').innerText = `Infinite Discovery: Showing Page ${currentPage} of ${maxPages}`;
}

    async function downloadLogo(event, type) {
        event.stopPropagation();
        const card = event.currentTarget.closest('.logo-card');
        const bizName = document.getElementById('bizName').value || 'logo';
        const overlay = card.querySelector('.download-overlay');
        
        overlay.style.visibility = 'hidden';
        const canvas = await html2canvas(card, { 
            scale: 4, 
            backgroundColor: card.style.backgroundColor,
            logging: false,
            useCORS: true
        });
        overlay.style.visibility = 'visible';

        if(type === 'pdf') {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('l', 'px', [canvas.width, canvas.height]);
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`${bizName}.pdf`);
        } else {
            const link = document.createElement('a');
            link.download = `${bizName}.${type}`;
            link.href = canvas.toDataURL(`image/${type === 'jpg' ? 'jpeg' : 'png'}`, 1.0);
            link.click();
        }
    }


function magicShuffle() {
    // 1. Clear the cache of the current 22 Lac designs
    pageCache = {}; 
    // 2. Reset to page 1
    currentPage = 1;
    // 3. Re-generate a fresh batch from the 23 Billion pool
    renderPage(1);
    // 4. Smooth feedback for user
    window.scrollTo({ top: 0, behavior: 'smooth' });
}


function seeVariations(event, favIcon, favFont) {
    event.stopPropagation();
    pageCache = {}; // Reset
    const grid = document.getElementById('logoGrid');
    grid.innerHTML = '';
    
    // Generate 24 logos using ONLY that icon and font, but different colors/layouts
    for (let i = 0; i < 24; i++) {
        const hue = Math.random() * 360;
        const config = {
            color: { main: `hsl(${hue}, 70%, 45%)`, secondary: '#111827', bg: '#ffffff' },
            font: { name: favFont, tagFont: 'Inter', weight: '800' },
            icon: favIcon,
            layout: Math.floor(Math.random() * 26),
            hierarchy: { icon: '80px', title: '2rem', shadow: 'none' }
        };
        grid.appendChild(createLogoCard(document.getElementById('bizName').value, '', config));
    }
    document.getElementById('paginationWrapper').classList.add('hidden'); // Hide pagination for specific variations
}
