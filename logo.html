   function resetSectorPool() {
    const bizSelect = document.getElementById('in_biz_type');
    if (!bizSelect) return;
    
    const bizValue = bizSelect.value;
    
    // Safety Check: Try to find the industry, fallback to 'General'
    let sourceArray = sectorIcons[bizValue];
    
    if (!sourceArray) {
        console.warn("Industry Mismatch: '" + bizValue + "' not found in sectorIcons. Falling back to General.");
        sourceArray = sectorIcons["General"];
    }

    // Final Protection: If even 'General' is missing, use a hardcoded default
    if (!sourceArray) {
        sourceArray = ["star", "trophy", "shield", "bolt", "rocket", "globe"];
    }
    
    // Reset the working pool
    sectorPool = [...sourceArray];
    count = 0;
    
    const statusEl = document.getElementById('shuffle-status');
    if(statusEl) statusEl.innerText = `Discovery Mode: 0/${sectorPool.length}`;
}


        function handleUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('logo-img-display').src = event.target.result;
                isUserImage = true;
                update();
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function fallbackToFA() {
            document.getElementById('logo-img-display').style.display = "none";
            document.getElementById('fa-fallback').style.display = "block";
        }

      function shuffle() {
    const container = document.getElementById('logo-preview-container');
    const content = document.getElementById('logo-content');
    const text = document.getElementById('logo-text');
    const slogan = document.getElementById('logo-slogan');
    const icon = document.getElementById('logo-img-display');
    const fa = document.getElementById('fa-fallback');
    const biz = document.getElementById('in_biz_type').value;

    if(sectorPool.length === 0) resetSectorPool();
    const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // 1. Pick Layout (1-30)
    const layoutNum = Math.floor(Math.random() * 30) + 1;
    container.className = ""; // Reset
    content.className = "lay-" + layoutNum;
    
    // Reset element visibility
    text.style.display = "block";
    slogan.style.display = "block";
    icon.style.display = "block";
    fa.style.display = "none";
    icon.style.position = "static";
    icon.style.opacity = "1";
    container.style.transform = "none";

    // 2. Icon Selection
    if(!isUserImage) {
        const pick = sectorPool.splice(Math.floor(Math.random()*sectorPool.length), 1)[0];
        icon.src = `https://img.icons8.com/fluency/240/${pick}.png`;
        fa.className = `fa-solid fa-${pick}`;
    }

    // 3. Colors & Theme
    const h = Math.floor(Math.random() * 360);
    const accent = `hsl(${h}, 85%, 65%)`;
    const isDark = Math.random() > 0.5;
    if(!document.getElementById('in_trans').checked) {
        container.style.backgroundColor = isDark ? `hsl(${h}, 30%, 10%)` : `hsl(${h}, 10%, 97%)`;
    }
    document.documentElement.style.setProperty('--accent', accent);
    
    // 4. Typography
    text.style.fontFamily = r(fonts);
    text.style.color = accent;
    slogan.style.color = accent;
    fa.style.color = accent;
    text.style.fontSize = (Math.random() * 20 + 45) + "px";
    text.style.textTransform = Math.random() > 0.5 ? 'uppercase' : 'none';

    // 5. Special Layout Logic
    if(layoutNum === 9) { // Lettermark
        icon.style.display = "none";
        fa.style.display = "block";
        fa.innerHTML = `<span style="font-family:${text.style.fontFamily}; font-size:150px;">${document.getElementById('in_name').value.charAt(0)}</span>`;
    } else {
        fa.innerHTML = "";
    }

    // 6. Physics/Filters
    if (layoutNum !== 15 && layoutNum !== 23) { // Don't filter Neumorphic or Gold text
        icon.style.filter = `drop-shadow(0 15px 15px rgba(0,0,0,0.2)) hue-rotate(${Math.random()*360}deg)`;
    }
    
    update();
    if(typeof fixMobileLogoScale === "function") fixMobileLogoScale();
}


     function update() {
    const container = document.getElementById('logo-preview-container');
    const isTrans = document.getElementById('in_trans').checked;
    const bgUrl = document.getElementById('in_bg_url').value.trim();

    document.getElementById('logo-text').innerText = document.getElementById('in_name').value;
    document.getElementById('logo-slogan').innerText = document.getElementById('in_tag').value;

    // Handle Transparency Check
    if(isTrans) {
        container.classList.add('checkerboard-bg');
        container.style.backgroundImage = "none"; // Clear image if checking trans
    } else {
        container.classList.remove('checkerboard-bg');
        if(bgUrl) {
            container.style.backgroundImage = `url('${bgUrl}')`;
            container.style.backgroundSize = "cover";
            container.style.backgroundPosition = "center";
        } else {
            container.style.backgroundImage = "none";
        }
if (window.innerWidth <= 900) fixMobileLogoScale();
    }

    const shape = document.getElementById('in_shape').value;
    container.style.borderRadius = shape === 'circle' ? "50%" : "0";
    container.style.width = shape === 'rect' ? "750px" : "550px";
}
      async function exportLogo(fmt) {
    const container = document.getElementById('logo-preview-container');
    const brandName = document.getElementById('in_name').value.trim() || 'NexusLogo';
    const isTransChecked = document.getElementById('in_trans').checked;

    // 1. PRE-EXPORT CLEANUP
    // Remove checkerboard preview so it doesn't get saved into the logo file
    if(isTransChecked) container.classList.remove('checkerboard-bg');

    try {
        if (fmt === 'svg') {
            // SVG FIX: We capture the high-res render and wrap it in a proper SVG XML shell
            const canvas = await html2canvas(container, { scale: 2, useCORS: true, backgroundColor: null });
            const imgData = canvas.toDataURL("image/png");

            const svgData = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${container.offsetWidth}" height="${container.offsetHeight}">
                <image width="100%" height="100%" xlink:href="${imgData}" />
            </svg>`;

            const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `${brandName}.svg`;
            link.href = url;
            link.click();
        } else {
            // PNG and JPG Logic (High Resolution Scale 4)
            const canvas = await html2canvas(container, {
                scale: 4, 
                useCORS: true,
                // JPGs don't support transparency and turn black; we force white if JPG is chosen
                backgroundColor: (fmt === 'jpg') ? "#ffffff" : null, 
            });

            const mimeType = (fmt === 'jpg') ? 'image/jpeg' : 'image/png';
            const link = document.createElement('a');
            link.download = `${brandName}.${fmt}`;
            link.href = canvas.toDataURL(mimeType, 1.0);
            link.click();
        }
    } catch (error) {
        console.error("Design Export Error:", error);
        alert("Download failed. Please check your internet connection and try again.");
    } finally {
        // 2. RESTORE PREVIEW STATE
        // Put the checkerboard back if the user had the transparency box checked
        if(isTransChecked) container.classList.add('checkerboard-bg');
    }
}

    if(typeof resetSectorPool === "function") resetSectorPool(); 
    shuffle(); 
};
