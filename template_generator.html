<script>
const PEXELS_KEY = 'EK3XGcWyIt8Koch3FbcfOMvjtx6Mtbk5p9SzshuTS8iRnw602yY5l9jK';
const PIXABAY_KEY = '38932758-f534c18530843322e7f591365'; // Replace with your actual key
let currentPage = 1;
let isFetching = false;
let currentQuery = '';

// Fonts to rotate through for "Infinite" look
const fonts = ['Montserrat', 'Playfair Display', 'Oswald', 'Bebas Neue', 'Dancing Script', 'Arial Black'];

function updateInputs() {

}
function startFresh() {
    document.getElementById('templateGrid').innerHTML = '';
    currentPage = 1;
    fetchTemplates();
}

async function fetchTemplates() {
    if (isFetching) return;
    isFetching = true;
    document.getElementById('loader').style.display = 'block';

    const type = document.getElementById('templateType').value;
    const category = document.getElementById('imgCategory').value || 'abstract';
    
    // --- VALIDATION LOGIC ---
    // List of types that MUST use Pixabay
    const pixabayTypes = ['birthday', 'festival', 'wedding', 'party'];
    
    let url = '';
    let headers = {};

    if (pixabayTypes.includes(type)) {
        // PIXABAY API
        url = `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(category)}&image_type=photo&per_page=12&page=${currentPage}`;
    } else {
        // PEXELS API
        url = `https://api.pexels.com/v1/search?query=${category}&per_page=12&page=${currentPage}`;
        headers = { Authorization: PEXELS_KEY };
    }

    try {
        const response = await fetch(url, { headers: headers });
        const data = await response.json();
        
        // Normalize results so createRandomizedCard works for both
        const photos = pixabayTypes.includes(type) ? data.hits : data.photos;

        photos.forEach(photo => {
            // Pixabay uses 'webformatURL', Pexels uses 'src.large2x'
            const imgUrl = pixabayTypes.includes(type) ? photo.webformatURL : photo.src.large2x;
            const card = createRandomizedCard(imgUrl);
            document.getElementById('templateGrid').appendChild(card);
        });

        currentPage++;
    } catch (err) {
        console.error("API Error");
    } finally {
        isFetching = false;
        document.getElementById('loader').style.display = 'none';
    }
}
function createRandomizedCard(imgUrl) {
    const type = document.getElementById('templateType').value;
    const vals = Array.from(document.querySelectorAll('.dynamic-field')).map(f => f.value || '');
    
    const card = document.createElement('div');
    card.className = 'base-card';
    
    // Set Sizing
    if (['inst_story', 'whatsapp'].includes(type)) card.classList.add('tall');
    else if (['fb_cover', 'yt_banner'].includes(type)) card.classList.add('wide');
    else card.classList.add('standard');

    card.style.backgroundImage = `url('${imgUrl}')`;
    const randomOverlay = `rgba(0,0,0,${(Math.random() * 0.4 + 0.3).toFixed(1)})`;

    let contentHtml = `<div class="overlay" style="background:${randomOverlay}"></div><div class="content" style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">`;

    switch(type) {
        // --- ORIGINAL 5 ---
        case 'instagram':
            contentHtml += `<h1 style="font-size:2.5rem; font-weight:900;">${vals[0]}</h1><p>${vals[1]}</p><div style="margin-top:auto; border-top:1px solid white; width:100%; padding-top:10px;">${vals[2]}</div>`;
            break;
        case 'youtube':
            contentHtml = contentHtml.replace('align-items:center', 'align-items:flex-start').replace('text-align:center', 'text-align:left');
            contentHtml += `<h1 style="font-size:3.5rem; line-height:1; text-shadow:4px 4px 0 #ff0000; -webkit-text-stroke:1px black;">${vals[0]}</h1><span style="background:yellow; color:black; padding:5px 10px; font-weight:bold;">${vals[1]}</span>`;
            break;
        case 'event':
            contentHtml += `<h1 style="border-bottom:3px solid white; padding-bottom:10px;">${vals[0]}</h1><p style="font-style:italic;">${vals[3]}</p><div style="margin-top:20px;">📅 ${vals[1]} <br> 📍 ${vals[2]}</div>`;
            break;
        case 'sale':
            contentHtml += `<h1 style="font-size:5rem; color:#ffcc00; margin:0;">${vals[0]}</h1><p style="font-size:1.5rem;">On ${vals[1]}</p><div style="background:red; padding:10px 30px; border-radius:50px; margin-top:15px; font-weight:bold;">SHOP NOW</div><div style="position:absolute; bottom:20px; right:20px;">${vals[2]}</div>`;
            break;
        case 'quote':
            contentHtml += `<p style="font-size:2rem; font-family:'Playfair Display'; font-style:italic;">"${vals[0]}"</p><p style="margin-top:20px;">— ${vals[1]}</p>`;
            break;

        // --- NEW 19 ---
        case 'inst_story':
            contentHtml = contentHtml.replace('justify-content:center', 'justify-content:space-between');
            contentHtml += `<div style="margin-top:50px;"><h1>${vals[0]}</h1><p>${vals[1]}</p></div><div style="margin-bottom:30px; font-weight:bold;">${vals[2]}</div>`;
            break;
        case 'fb_cover':
            contentHtml = contentHtml.replace('align-items:center', 'align-items:flex-start').replace('text-align:center', 'text-align:left');
            contentHtml += `<h1 style="font-size:3rem; margin:0;">${vals[0]}</h1><p>${vals[1]}</p>`;
            break;
        case 'yt_banner':
            contentHtml += `<h1 style="font-size:4rem; margin:0;">${vals[0]}</h1><h3>${vals[1]}</h3><div style="background:red; color:white; padding:5px 15px; font-size:0.8rem;">${vals[2]}</div>`;
            break;
        case 'certificate':
            contentHtml += `<div style="border:10px double gold; padding:20px;"><h3>CERTIFICATE</h3><h1 style="font-family:serif; font-size:3rem;">${vals[0]}</h1><p>For ${vals[1]}</p><small>${vals[2]}</small></div>`;
            break;
        case 'menu':
            contentHtml += `<h2>${vals[0]}</h2><hr style="width:80%"><div style="width:80%;">`;
            const items = vals[1].split(','); const prices = vals[2].split(',');
            items.forEach((item, i) => { contentHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${item}</span><span>${prices[i]||''}</span></div>`; });
            contentHtml += `</div>`;
            break;
        case 'hiring':
            contentHtml += `<h2 style="letter-spacing:10px;">WE ARE HIRING</h2><h1 style="font-size:3rem; margin:10px 0;">${vals[0]}</h1><p>${vals[1]}</p><div style="background:#007bff; padding:10px 20px; border-radius:5px; margin-top:20px;">${vals[2]}</div>`;
            break;
        case 'festival':
            contentHtml += `<h1 style="color:gold;">${vals[0]}</h1><p style="font-size:1.5rem;">${vals[1]}</p><div style="margin-top:auto;">From: ${vals[2]}</div>`;
            break;
        case 'id_card':
            contentHtml += `<div style="width:120px; height:120px; background:#fff; border-radius:10px; margin-bottom:15px;"></div><h2 style="margin:0;">${vals[0]}</h2><p style="color:#007bff; margin:5px 0;">${vals[1]}</p><p style="margin-top:auto; font-family:monospace; opacity:0.6;">${vals[2]}</p>`;
            break;
        case 'wedding':
            contentHtml += `<h1 style="font-family:'Dancing Script'; font-size:3rem;">${vals[0]}</h1><p>Save the Date</p><p>${vals[1]}</p><p>${vals[2]}</p>`;
            break;
        default:
            // Fallback for Birthday, Facebook Post, LinkedIn, Twitter, WhatsApp, Party, Announcement, Webinar, Brochure, Flyer
            contentHtml += `<h1 style="font-size:2.5rem; margin:10px 0;">${vals[0]}</h1><p style="font-size:1.2rem;">${vals[1]}</p><p style="margin-top:auto;">${vals[2] || ''}</p>`;
    }

    contentHtml += `</div>`;
    card.innerHTML = contentHtml;






// Add Download Buttons
    const downloadOverlay = document.createElement('div');
    downloadOverlay.className = 'download-overlay';
    downloadOverlay.innerHTML = `
        <button class="dl-btn" onclick="downloadFile(this.parentElement.parentElement, 'png')">PNG</button>
        <button class="dl-btn" onclick="downloadFile(this.parentElement.parentElement, 'jpg')">JPG</button>
        <button class="dl-btn" onclick="downloadFile(this.parentElement.parentElement, 'pdf')">PDF</button>
    `;
    card.appendChild(downloadOverlay);

}

window.onscroll = function() {

async function downloadFile(cardElement, format) {
    // 1. Prepare the card (hide buttons for the photo)
    cardElement.classList.add('capturing');

    // 2. Capture the card as a canvas
    const canvas = await html2canvas(cardElement, {
        useCORS: true, // Important for Pexels images
        scale: 2,      // Higher quality
        backgroundColor: null
    });

    cardElement.classList.remove('capturing');

    if (format === 'png' || format === 'jpg') {
        // 3a. Handle Image Download
        const imgType = format === 'jpg' ? 'image/jpeg' : 'image/png';
        const imgData = canvas.toDataURL(imgType, 0.9);
        const link = document.createElement('a');
        link.download = `my-template.${format}`;
        link.href = imgData;
        link.click();
    } else if (format === 'pdf') {
        // 3b. Handle PDF Download
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        
        // Match PDF size to Card size
        const orientation = cardElement.offsetWidth > cardElement.offsetHeight ? 'l' : 'p';
        const pdf = new jsPDF({
            orientation: orientation,
            unit: 'px',
            format: [cardElement.offsetWidth, cardElement.offsetHeight]
        });
        
        pdf.addImage(imgData, 'PNG', 0, 0, cardElement.offsetWidth, cardElement.offsetHeight);
        pdf.save('my-template.pdf');
    }
}
</script>
</body>
