<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BILL OF EXCHANGE TEMPLATES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .no-print { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; text-transform: uppercase; color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; }
        h3 { background: var(--s); color: white; padding: 10px; border-radius: 5px; font-size: 14px; text-transform: uppercase; margin-top: 25px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--p); }

        /* Template Grid */
        .template-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .tpl-btn { padding: 12px 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .tpl-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Preview Area */
        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; border-radius: 12px; margin-top: 30px; }
        #render-target { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; }
        .btn-act { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        
        @media (max-width: 768px) { .template-grid { grid-template-columns: repeat(2, 1fr); } }
        @media print { .no-print { display: none !important; } body { padding: 0; } .preview-box { background: white; padding: 0; } #render-target { width: 100%; box-shadow: none; border:none !important; } }



/* 12. VERTICAL STACK FOR TOOL PAGES (REFINED) */
/* This ensures buttons stack vertically and fit within the screen */

/* 1. Target the containers for buttons and tools */
.featured-grid, 
.button-group, 
.tools-container,
.btn-group,
#tpl-grid {
    display: flex !important;
    flex-direction: column !important; /* Force vertical stacking */
    align-items: center !important;
    width: 100% !important;
    max-width: 100% !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    box-sizing: border-box !important;
}

/* 2. Target the buttons themselves to make them responsive */
.select-btn, 
.exciting-tools-btn, 
.btn-act,
button,
select {
    width: 100% !important;      /* Make them full width of container */
    max-width: 500px !important; /* Prevent them from becoming too wide on desktop */
    margin: 5px 0 !important;
    padding: 12px 15px !important;
    height: auto !important;     /* Allow button to expand if text is long */
    white-space: normal !important; /* Allow text to wrap inside the button */
    word-wrap: break-word !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
}

/* 3. Specifically fix the Template Grid if it's overflowing */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)) !important; /* Better than forced columns */
    gap: 5px !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Ensure images or barcodes inside buttons don't break the width */
button img, button svg {
    max-width: 100% !important;
    height: auto !important;
}



@media screen and (max-width: 768px) {
    /* Stack all buttons and inputs vertically */
    .btn-group, .featured-grid, .form-grid, .btn-group { 
        display: flex !important; 
        flex-direction: column !important; 
        align-items: center !important; 
    }
    .btn-act, .select-btn, input, select, textarea, .field { 
        width: 100% !important; 
        max-width: 100% !important; 
    }
    /* Center the preview container */
    .preview-box { 
        display: flex !important; 
        justify-content: center !important; 
        overflow: hidden !important; 
        padding: 10px 0 !important;
    }
#render-target { 
    transform-origin: top center !important;
    margin: 0 auto 50px auto !important; /* THE FIX: 50px gap at the bottom */
    box-sizing: border-box !important;   /* THE FIX: Forces border to stay inside */
    width: 210mm; 
}

/* Also add this to allow height to grow */
#render-target div { min-height: 0 !important; }
}
    </style>
</head>
<body>

<div class="no-print">
    <div class="editor-panel">
        <h1>Bill of Exchange Designer</h1>

        <!-- Header -->
        <h3>1. Header & Drawer (Issuer) Details</h3>
        <div class="form-grid">
            <div class="field"><label>Logo</label><input type="file" id="logo-input" accept="image/*" onchange="loadLogo(this)"></div>
            <div class="field"><label>Drawer (Company) Name</label><input type="text" id="b_name" value="Global Trade Finance Ltd" oninput="update()"></div>
            <div class="field"><label>Contact No</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
            <div class="field"><label>Email</label><input type="text" id="b_email" value="ops@globaltrade.com" oninput="update()"></div>
            <div class="field"><label>Website</label><input type="text" id="b_web" value="www.globaltrade.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Drawer Address</label><input type="text" id="b_addr" value="Innovation Plaza, Business District, New Delhi" oninput="update()"></div>
        </div>

        <!-- Drawee & Payee -->
        <h3>2. Drawee (Payer) & 3. Payee (Receiver) Details</h3>
        <div class="form-grid">
            <div class="field"><label>Drawee Name</label><input type="text" id="c_name" value="Acme Industrial Corp" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Drawee Address</label><input type="text" id="c_addr" value="45 Export Way, Port Area, Mumbai" oninput="update()"></div>
            <div class="field"><label>Payee Name</label><input type="text" id="p_name" value="Standard Chartered Bank" oninput="update()"></div>
            <div class="field"><label>Drawee Contact</label><input type="text" id="c_phone" value="+91 88888 77777" oninput="update()"></div>
        </div>

        <!-- Bill Details -->
        <h3>4. Bill Info & 5. Payment Terms</h3>
        <div class="form-grid">
            <div class="field"><label>Bill Number</label><input type="text" id="v_no" value="BOE-2024-501" oninput="update()"></div>
            <div class="field"><label>Bill Date</label><input type="date" id="v_date" oninput="update()"></div>
            <div class="field"><label>Place of Issue</label><input type="text" id="v_place" value="New Delhi" oninput="update()"></div>
            <div class="field"><label>Payable On</label><select id="v_on" onchange="update()"><option>On Demand</option><option>After Sight</option><option>Fixed Date</option></select></div>
            <div class="field"><label>Due Date</label><input type="date" id="v_due" oninput="update()"></div>
            <div class="field"><label>Amount (Figures)</label><input type="number" id="v_amt" value="500000" oninput="handleAmount(this.value)"></div>
            <div class="field" style="grid-column: span 2;"><label>Amount in Words</label><input type="text" id="v_words" value="Five Lakh Only" oninput="update()"></div>
        </div>

        <!-- Acceptance -->
        <h3>6. Acceptance</h3>
        <div class="form-grid">
            <div class="field"><label>Accepted By</label><input type="text" id="a_name" value="Acme Industrial Corp" oninput="update()"></div>
            <div class="field"><label>Date of Acceptance</label><input type="date" id="a_date" oninput="update()"></div>
        </div>

        <div class="template-grid" id="btn-container"></div>

        <div style="display:flex; gap:15px; justify-content:center; margin-bottom:40px;">
            <button class="btn-act" style="background:#10b981" onclick="alert('Details Saved Locally!')"><i class="fas fa-save"></i> Save Data</button>
            <button class="btn-act" style="background:#2563eb" onclick="exportWord()"><i class="fas fa-file-word"></i> MS Word Export</button>
        </div>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<script>
    let logoData = "";
    let activeId = 1;
    const tplColors = ["#1e3a8a","#52525b","#1e3a8a","#1e293b","#000000","#475569","#4338ca","#1e3a8a","#64748b","#0d9488","#3b82f6","#334155","#444444","#0891b2","#be123c","#000000","#0d9488","#1e3a8a","#854d0e","#2563eb","#1e293b","#0f766e","#1e3a8a","#0284c7","#2563eb"];
    const tplNames = ["Classic Banking", "Minimal Legal", "Modern Card", "Sidebar Structured", "Premium Dark Finance", "Grid Layout", "Gradient Modern", "Traditional Trade", "Compact Financial", "Bold Header", "Rounded Modern", "Split Column", "Elegant Minimal", "FinTech Style", "Highlight Section", "Legal Contract", "Soft Pastel", "Table-Based Finance", "Luxury Gold", "Split Header", "Dashboard Inspired", "Thin Border Minimal", "Executive Business", "Bright Business", "Smart Signature"];

    function handleAmount(val) {
        document.getElementById('v_words').value = numberToWords(val) + " Only";
        update();
    }

    function numberToWords(n) {
        if (n == 0) return 'Zero';
        var a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
        var b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        function g(n) { return n<20?a[n]:b[Math.floor(n/10)]+(n%10!=0?" "+a[n%10]:""); }
        function h(n,s) { return n==0?"":(n>99?a[Math.floor(n/100)]+" Hundred "+g(n%100):g(n))+s; }
        let res = h(Math.floor(n/10000000)," Crore ")+h(Math.floor((n/100000)%100)," Lakh ")+h(Math.floor((n/1000)%100)," Thousand ")+h(Math.floor((n/100)%10)," Hundred ");
        res += (n%100!=0 && n>100?"and ":"")+g(n%100);
        return res.trim();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoData = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function init() {
        const container = document.getElementById('btn-container');
        tplNames.forEach((name, i) => {
            const btn = document.createElement('button');
            btn.className = 'tpl-btn';
            btn.style.background = tplColors[i];
            btn.innerText = name;
            btn.onclick = () => { activeId = i + 1; update(); };
            container.appendChild(btn);
        });
        document.getElementById('v_date').valueAsDate = new Date();
        document.getElementById('v_due').valueAsDate = new Date();
        document.getElementById('a_date').valueAsDate = new Date();
        update();
    }

    function update() {
        const d = {
            bName: document.getElementById('b_name').value,
            bAddr: document.getElementById('b_addr').value,
            bCont: document.getElementById('b_phone').value + " | " + document.getElementById('b_email').value,
            bWeb: document.getElementById('b_web').value,
            logo: logoData ? `<img src="${logoData}" width="120" height="60" style="width:120px; height:60px;">` : "<h2>LOGO</h2>",
            vNo: document.getElementById('v_no').value,
            vDate: document.getElementById('v_date').value,
            vPlace: document.getElementById('v_place').value,
            vOn: document.getElementById('v_on').value,
            vDue: document.getElementById('v_due').value,
            vAmt: document.getElementById('v_amt').value,
            vWords: document.getElementById('v_words').value,
            cName: document.getElementById('c_name').value,
            cAddr: document.getElementById('c_addr').value,
            cCont: document.getElementById('c_phone').value,
            pName: document.getElementById('p_name').value,
            aName: document.getElementById('a_name').value,
            aDate: document.getElementById('a_date').value
        };
        document.getElementById('render-target').innerHTML = renderTemplate(activeId, d, tplColors[activeId-1]);
    }

    function renderTemplate(id, d, color) {
        const borderStyle = `border: 8px solid ${color}; outline: 2px solid ${color}; outline-offset: 4px;`;
        const wrapS = (bg) => `<div style="background:${bg}; ${borderStyle} padding:40px; min-height:280mm; box-sizing:border-box; font-family:Arial; color:#333; position:relative;">`;
        const wrapE = `</div>`;
        
        const seller = `<div style="font-size:11px;"><b>${d.bName}</b><br>${d.bAddr}<br>PH: ${d.bCont}<br>${d.bWeb}</div>`;
        const legalStatement = `<div style="margin:40px 0; font-size:18px; line-height:1.6; text-align:justify;">On <b>${d.vDue}</b>, pay the sum of <b style="color:${color}">₹ ${parseFloat(d.vAmt).toLocaleString('en-IN')}</b> (${d.vWords}) to <b>${d.pName}</b> or order, for value received.</div>`;
        
        const detailsTable = `<table width="100%" border="1" style="border-collapse:collapse; margin:20px 0; border:1px solid #ddd;">
            <tr bgcolor="#f9f9f9"><td style="padding:10px"><b>Bill Number:</b> ${d.vNo}</td><td style="padding:10px"><b>Date:</b> ${d.vDate}</td></tr>
            <tr><td style="padding:10px"><b>Place:</b> ${d.vPlace}</td><td style="padding:10px"><b>Payable:</b> ${d.vOn}</td></tr>
        </table>`;

        const addressBlock = `<table width="100%" style="margin:20px 0;"><tr>
            <td width="50%" valign="top"><b>DRAWER (Issuer):</b><br>${d.bName}<br>${d.bAddr}</td>
            <td width="50%" valign="top" align="right"><b>DRAWEE (Payer):</b><br>${d.cName}<br>${d.cAddr}</td>
        </tr></table>`;

        const acceptance = `<div style="border:2px solid #000; padding:20px; width:250px; margin:20px 0;">
            <center><b>ACCEPTED</b></center><br>
            By: ${d.aName}<br>Date: ${d.aDate}<br><br>Signature: ________________</div>`;

        const sign = `<div style="margin-top:60px; text-align:right;">For <b>${d.bName}</b><br><br><br>Drawer Signature</div>`;

       switch(id) {
            case 1: // Classic Banking
                return wrapS("#fff") + `<table width="100%"><tr><td>${d.logo}<h1>BILL OF EXCHANGE</h1></td><td align="right">${seller}</td></tr></table><hr color="${color}">${detailsTable}${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 2: // Minimal Legal
                return wrapS("#fff", "border:1px solid #000;") + `<center><h2>BILL OF EXCHANGE</h2><hr>${seller}</center><br>${addressBlock}${legalStatement}<table width="100%"><tr><td width="50%">${acceptance}</td><td align="right" valign="bottom">${sign}</td></tr></table>` + wrapE;

            case 3: // Modern Card Layout
                return wrapS("#f3f4f6", "none") + `<div style="background:white; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;"><table width="100%"><tr><td>${d.logo}</td><td align="right">${seller}</td></tr></table></div><div style="background:white; padding:15px; border-radius:10px; border:1px solid #ddd;">${detailsTable}${legalStatement}</div><div style="background:white; padding:15px; border-radius:10px; border:1px solid #ddd; margin-top:10px;">${addressBlock}${acceptance}${sign}</div>` + wrapE;

            case 4: // Sidebar Structured
                return wrapS("#fff") + `<table width="100%" height="100%"><tr><td width="30%" bgcolor="${color}" style="color:white; padding:20px;" valign="top">${d.logo}<br><h3>DRAWER</h3>${seller}<hr>No: ${d.vNo}</td><td width="70%" style="padding:20px;" valign="top"><h1>BILL OF EXCHANGE</h1>${detailsTable}${legalStatement}${addressBlock}${acceptance}${sign}</td></tr></table>` + wrapE;

            case 5: // Premium Dark Finance
                return wrapS("#111", "border:8px solid gold;") + `<div style="color:white; text-align:center;">${d.logo}<h1 style="color:gold">BILL OF EXCHANGE</h1><hr color="gold">${seller}<div style="background:#fff; color:#333; padding:20px; margin-top:20px;">${addressBlock}${legalStatement}${acceptance}${sign}</div></div>` + wrapE;

            case 6: // Grid Layout Template
                return wrapS("#f8fafc", `border:2px solid ${color};`) + `<table width="100%" border="1" style="border-collapse:collapse; background:white;"><tr><td style="padding:15px;">${seller}</td><td style="padding:15px;" align="right"><b>Bill Info</b><br># ${d.vNo}<br>${d.vDate}</td></tr></table>${legalStatement}${addressBlock}${acceptance}${sign}` + wrapE;

            case 7: // Gradient Modern Template
                return wrapS("linear-gradient(to bottom, #f3f4f6, #fff)") + `<div style="background:white; padding:25px; border-top:5px solid ${color};">${d.logo}<table width="100%"><tr><td>${seller}</td><td align="right"><h3>BILL OF EXCHANGE</h3></td></tr></table>${legalStatement}${addressBlock}${acceptance}${sign}</div>` + wrapE;

            case 8: // Traditional Trade Template
                return wrapS("#fff", "border:2px solid #000;") + `<div style="font-family:'Times New Roman';"><table width="100%"><tr><td>${seller}</td><td align="right">${d.logo}</td></tr></table><center><h2><u>BILL OF EXCHANGE</u></h2></center>${addressBlock}${detailsTable}${legalStatement}${acceptance}${sign}</div>` + wrapE;

            case 9: // Compact Financial Template
                return wrapS("#f9fafb", `border-bottom:15px solid ${color};`) + `<div style="font-size:11px;"><table width="100%"><tr><td><b>${d.bName}</b><br>Ref: ${d.vNo}</td><td align="right">${d.logo}</td></tr></table><hr>${legalStatement}${addressBlock}${acceptance}${sign}</div>` + wrapE;

            case 10: // Bold Header Template
                return wrapS("#fff") + `<div style="background:${color}; color:white; padding:30px; margin:-40px -40px 20px -40px;"><center><h1>BILL OF EXCHANGE</h1></center></div>${seller}<hr>${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 11: // Rounded Modern Template
                return wrapS("#f0f9ff", "none") + `<div style="background:white; border-radius:30px; padding:30px; border:1px solid #bae6fd;">${d.logo}${seller}<hr>${addressBlock}${legalStatement}${acceptance}${sign}</div>` + wrapE;

            case 12: // Split Column Layout
                return wrapS("#fff") + `<table width="100%"><tr><td width="45%" valign="top" style="border-right:2px solid #eee; padding-right:15px;">${d.logo}<br>${seller}</td><td width="55%" style="padding-left:15px;"><h1>BILL OF EXCHANGE</h1>${detailsTable}${legalStatement}</td></tr></table>${addressBlock}${acceptance}${sign}` + wrapE;

            case 13: // Elegant Minimal Template
                return wrapS("#fff", "border:none; border-left:15px solid " + color) + `<h1>BILL OF EXCHANGE</h1>${seller}<hr>${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 14: // FinTech Style Template
                return wrapS("linear-gradient(to bottom, #ecfeff, #fff)") + `<table width="100%"><tr><td>${d.logo}</td><td align="right"><b>${d.bName}</b></td></tr></table><div style="background:white; border-radius:15px; padding:20px; border:1px solid #e0f2f1; margin-top:20px;">${detailsTable}${legalStatement}</div>${addressBlock}${acceptance}${sign}` + wrapE;

            case 15: // Highlight Section Template
                return wrapS("#fff", `border:1px solid #eee;`) + `<div style="border:2px solid ${color}; padding:15px; margin-bottom:10px;">${seller}</div><div style="border:2px solid ${color}; padding:15px; margin-bottom:10px;">${addressBlock}</div>${legalStatement}${acceptance}${sign}` + wrapE;

            case 16: // Legal Contract Style
                return wrapS("#fff", "border:1px solid #000;") + `<center><h3>NEGOTIABLE INSTRUMENT: BILL OF EXCHANGE</h3></center><br>This document certifies a debt obligation by <b>${d.cName}</b> to <b>${d.pName}</b>.<br>${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 17: // Soft Pastel Template
                return wrapS("#fff5f5", "none") + `<div style="background:white; border-radius:20px; padding:20px; border:3px solid #feb2b2;">${seller}<hr>${addressBlock}${legalStatement}${acceptance}${sign}</div>` + wrapE;

            case 18: // Table-Based Finance Template
                return wrapS("#fff", `border:2px solid ${color};`) + `<table width="100%" border="1" style="border-collapse:collapse;"><tr><td colspan="2" align="center"><b>${d.bName}</b></td></tr><tr><td>${seller}</td><td>${detailsTable}</td></tr></table>${legalStatement}${acceptance}${sign}` + wrapE;

            case 19: // Luxury Gold Finance Template
                return wrapS("#000", "border:10px double #d4af37;") + `<div style="color:white; padding:10px;"><center>${d.logo}<h1 style="color:#d4af37;">PREMIUM FINANCE BILL</h1></center><br>${seller}<div style="background:#222; padding:15px;">${addressBlock}${legalStatement}${acceptance}</div>${sign}</div>` + wrapE;

            case 20: // Split Header Template
                return wrapS("#fff") + `<table width="100%"><tr><td><h1>BILL OF EXCHANGE</h1></td><td align="right">${d.logo}</td></tr></table><table width="100%"><tr><td width="50%">${seller}</td><td width="50%" align="right" valign="top">${addressBlock}</td></tr></table><hr>${legalStatement}${acceptance}${sign}` + wrapE;

            case 21: // Dashboard Inspired Template
                return wrapS("#f8fafc") + `<div style="background:white; border:1px solid #ddd; padding:20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">${seller}</div><br><div style="background:white; border:1px solid #ddd; padding:20px;">${addressBlock}</div>${legalStatement}${acceptance}${sign}` + wrapE;

            case 22: // Thin Border Minimal Template
                return wrapS("#fff", `border:1px solid #000;`) + `<div style="border:1px solid #ccc; padding:20px; margin:10px;">${seller}<hr>${addressBlock}${legalStatement}${acceptance}${sign}</div>` + wrapE;

            case 23: // Executive Business Template
                return wrapS("linear-gradient(to bottom, #f1f5f9, #fff)") + `<table width="100%"><tr><td>${d.logo}</td><td align="right"><b>BILL OF EXCHANGE</b><br># ${d.vNo}</td></tr></table><hr>${seller}<br>${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 24: // Bright Business Template
                return wrapS("#fff") + `<div style="background:#0ea5e9; color:white; padding:20px; margin:-40px -40px 10px -40px;"><h2>${d.bName}</h2></div>${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            case 25: // Smart Signature Template
                return wrapS("#fff", `border:10px double ${color}; padding:10px;`) + `<center>${d.logo}<h1>${d.bName}</h1></center><hr color="${color}">${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;

            default:
                return wrapS("#fff") + `<table width="100%"><tr><td>${d.logo}<h2>BILL OF EXCHANGE</h2></td><td align="right">${seller}</td></tr></table><hr>${detailsTable}${addressBlock}${legalStatement}${acceptance}${sign}` + wrapE;
        }
}

    function saveToLocal() {
        const data = { b: document.getElementById('b_name').value, a: document.getElementById('b_addr').value, p: document.getElementById('p_name').value };
        localStorage.setItem('boe_settings', JSON.stringify(data));
        alert("Details Saved Locally!");
    }

    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'><style>table{border-collapse:collapse; width:100%;} td,th{border:1px solid #ccc; padding:5px; font-family:Arial;}</style></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `BillOfExchange_${document.getElementById('v_no').value}.doc`;
        link.click();
    }
    window.onload = init;
</script>


<script>
    function masterScaler() {
        const target = document.getElementById('render-target');
        const container = document.querySelector('.preview-box');
        if (!target || window.innerWidth > 768) return;

        const screenWidth = window.innerWidth;
        const a4Width = 800; // Standard A4 pixel width
        // Calculate scale with a 5% safety gap (0.95) to prevent border cutting
        const scale = (screenWidth / a4Width) * 0.92; 

        target.style.transform = `scale(${scale})`;
        container.style.height = (target.offsetHeight * scale) + 'px';
    }

    window.addEventListener('load', masterScaler);
    window.addEventListener('resize', masterScaler);
    // Re-scale if the user clicks a style button
    document.addEventListener('click', () => setTimeout(masterScaler, 50));
</script>
</body>
