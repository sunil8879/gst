<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURCHASE ORDER - 500 TEMPLATES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .no-print { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; text-transform: uppercase; color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; }
        h3 { background: var(--s); color: white; padding: 10px; border-radius: 5px; font-size: 14px; text-transform: uppercase; margin-top: 25px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; }
        
        .ui-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        .ui-table th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; font-size: 11px; text-align: left; }
        .ui-table td { border: 1px solid #e2e8f0; padding: 5px; }
        .ui-table input { border: none; width: 100%; background: transparent; }

        .template-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; max-height: 150px; overflow-y: auto; padding: 10px; background: #eee; border-radius: 8px; }
        .tpl-btn { padding: 10px 2px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; font-size: 9px; text-transform: uppercase; }

        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; border-radius: 12px; margin-top: 30px; }
        #render-target { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; }
        .btn-act { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        
     .featured-section {display: none !important; }
        .featured-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .select-btn { padding: 15px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; color: white; text-transform: uppercase; font-size: 13px; min-width: 220px; }

        @media print { .no-print { display: none !important; } .preview-box { background: white; padding: 0; } #render-target { width: 100%; box-shadow: none; border:none !important; } }





/* 12. VERTICAL STACK FOR TOOL PAGES (REFINED) */
/* This ensures buttons stack vertically and fit within the screen */

/* 1. Target the containers for buttons and tools */
.featured-grid, 
.button-group, 
.tools-container,
.btn-group,
#tpl-grid {
    display: flex !important;
    flex-direction: column !important; /* Force vertical stacking */
    align-items: center !important;
    width: 100% !important;
    max-width: 100% !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    box-sizing: border-box !important;
}

/* 2. Target the buttons themselves to make them responsive */
.select-btn, 
.exciting-tools-btn, 
.btn-act,
button,
select {
    width: 100% !important;      /* Make them full width of container */
    max-width: 500px !important; /* Prevent them from becoming too wide on desktop */
    margin: 5px 0 !important;
    padding: 12px 15px !important;
    height: auto !important;     /* Allow button to expand if text is long */
    white-space: normal !important; /* Allow text to wrap inside the button */
    word-wrap: break-word !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
}

/* 3. Specifically fix the Template Grid if it's overflowing */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)) !important; /* Better than forced columns */
    gap: 5px !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Ensure images or barcodes inside buttons don't break the width */
button img, button svg {
    max-width: 100% !important;
    height: auto !important;
}


@media screen and (max-width: 768px) {
    /* Stack all buttons and inputs vertically */
    .btn-group, .featured-grid, .form-grid, .btn-group { 
        display: flex !important; 
        flex-direction: column !important; 
        align-items: center !important; 
    }
    .btn-act, .select-btn, input, select, textarea, .field { 
        width: 100% !important; 
        max-width: 100% !important; 
    }
    /* Center the preview container */
    .preview-box { 
        display: flex !important; 
        justify-content: center !important; 
        overflow: hidden !important; 
        padding: 10px 0 !important;
    }
#render-target { 
    transform-origin: top center !important;
    margin: 0 auto 50px auto !important; /* THE FIX: 50px gap at the bottom */
    box-sizing: border-box !important;   /* THE FIX: Forces border to stay inside */
    width: 210mm; 
}

/* Also add this to allow height to grow */
#render-target div { min-height: 0 !important; }
}
    </style>
</head>
<body>

<div class="no-print">
    <div class="editor-panel">
        <h1>Purchase Order Pro - 500 Engine</h1>

        <h3>1. Buyer Information (My Company)</h3>
        <div class="form-grid">
            <div class="field"><label>Logo</label><input type="file" id="logo-input" accept="image/*" onchange="loadLogo(this)"></div>
            <div class="field"><label>Business Name</label><input type="text" id="b_name" value="Global Tech Solutions" oninput="update()"></div>
            <div class="field"><label>GSTIN</label><input type="text" id="b_gst" value="27ABCDE1234F1Z1" oninput="update()"></div>
            <div class="field"><label>Phone</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
            <div class="field"><label>Email</label><input type="text" id="b_email" value="procurement@globaltech.com" oninput="update()"></div>
            <div class="field"><label>Website</label><input type="text" id="b_web" value="www.globaltech.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Address</label><input type="text" id="b_addr" value="Innovation Plaza, Sector 62, Noida, UP" oninput="update()"></div>
        </div>

        <h3>2. PO & 3. Supplier Details</h3>
        <div class="form-grid">
            <div class="field"><label>PO Number</label><input type="text" id="q_no" value="PO-2024-771" oninput="update()"></div>
            <div class="field"><label>Issue Date</label><input type="date" id="q_date" oninput="update()"></div>
            <div class="field"><label>Delivery Date</label><input type="date" id="del_date" oninput="update()"></div>
            <div class="field"><label>Place of Delivery</label><input type="text" id="del_pos" value="Warehouse 4, Mumbai Port" oninput="update()"></div>
            <div class="field"><label>Supplier Name</label><input type="text" id="s_name" value="Industrial Spares Mfg" oninput="update()"></div>
            <div class="field"><label>Supplier GSTIN</label><input type="text" id="s_gst" value="27QWERT5544P1Z2" oninput="update()"></div>
            <div class="field"><label>Supplier Contact</label><input type="text" id="s_phone" value="+91 88888 77777" oninput="update()"></div>
            <div class="field"><label>Supplier Email</label><input type="text" id="s_email" value="sales@industrialspares.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Supplier Address</label><input type="text" id="s_addr" value="Plot 12, Industrial Area, Pune, MH" oninput="update()"></div>
        </div>

        <h3>4. Order Items (Dynamic Calculations)</h3>
        <table class="ui-table">
            <thead>
                <tr><th width="5%">No</th><th>Description</th><th>HSN</th><th width="8%">Qty</th><th width="12%">Rate</th><th width="15%">Amount</th><th></th></tr>
            </thead>
            <tbody id="ui_rows"></tbody>
        </table>
        <button onclick="addRow()" style="margin-top:10px; cursor:pointer; padding: 5px 15px;">+ Add Item</button>

        <h3>5. Summary & 6. Terms</h3>
        <div class="form-grid">
            <div class="field"><label>Discount (Value)</label><input type="number" id="s_disc" value="0" oninput="calculate()"></div>
            <div class="field"><label>CGST (%)</label><input type="number" id="s_cgst_p" value="9" oninput="calculate()"></div>
            <div class="field"><label>SGST (%)</label><input type="number" id="s_sgst_p" value="9" oninput="calculate()"></div>
            <div class="field"><label>IGST (%)</label><input type="number" id="s_igst_p" value="0" oninput="calculate()"></div>
            <div class="field"><label>Payment Terms</label><input type="text" id="e_pay" value="30% Advance, 70% on Delivery" oninput="update()"></div>
            <div class="field"><label>Delivery Terms</label><input type="text" id="e_del" value="F.O.R Destination" oninput="update()"></div>
            <div class="field"><label>Grand Total</label><input type="text" id="disp_grand" readonly style="font-weight:bold; color:red; background:#f0f0f0;"></div>
            <div class="field" style="grid-column: span 3;"><label>Terms & Conditions</label><textarea id="e_terms" rows="2" oninput="update()">1. Goods must match HSN specifications. 2. Quality inspection at delivery.</textarea></div>
        </div>

        <p style="font-weight:bold; margin-top:20px;">SELECT TEMPLATE (1-500):</p>
        <div class="template-grid" id="tpl-grid"></div>

        <div style="display:flex; gap:15px; justify-content:center; margin-bottom:40px;">
            <button class="btn-act" style="background:#10b981" onclick="window.print()"><i class="fas fa-save"></i> Save PDF</button>
            <button class="btn-act" style="background:#2563eb" onclick="exportWord()"><i class="fas fa-file-word"></i> MS Word</button>
        </div>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<div class="no-print featured-section">
    <h2 style="color: #64748b; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Featured Templates</h2>
    <div class="featured-grid">
        <select class="select-btn" style="background:#1e40af" onchange="if(this.value) window.location.href=this.value">
            <option value="" selected disabled>SMART TEMPLATES</option>
            <option value="final_billbook.html">Bill Book</option>
            <option value="final_bill_of_exchange.html">Bill of Exchange</option>
            <option value="final_credit_note.html">Credit Note</option>
            <option value="final_delivery_challan.html">Delivery Challan</option>
            <option value="final_debit_notes.html">Debit Note</option>
            <option value="final_purchase_order.html">Purchase Order</option>
            <option value="final_quotation.html">Quotation</option>
            <option value="final_receipts.html">Receipt</option>
            <option value="final_voucher.html">Voucher</option>
            <option value="final_work_order.html">Work Order</option>
        </select>
        <select class="select-btn" style="background:#0f172a" onchange="if(this.value) window.location.href=this.value">
            <option value="" selected disabled>EXPLORE TEMPLATES</option>
            <option value="billbook_PC.html">Bill Book</option>
            <option value="bill_of_exchange_PC.html">Bill of Exchange</option>
            <option value="credit_note_PC.html">Credit Note</option>
            <option value="delivery_challan_PC.html">Delivery Challan</option>
            <option value="debit_note_PC.html">Debit Note</option>
            <option value="purchase_order_PC.html">Purchase Order</option>
            <option value="quotation_PC.html">Quotation</option>
            <option value="receipts_PC.html">Receipt</option>
            <option value="voucher_PC.html">Voucher</option>
            <option value="work_order_PC.html">Work Order</option>
        </select>
    </div>
</div>

<script>
    let logoImg = "";
    let activeStyle = 1;
    const colors = ["#1e40af", "#b91c1c", "#047857", "#7c3aed", "#1e293b"];

    const Modules = {
        borders: [
            (c) => `border: 10px solid ${c}; padding: 30px;`,
            (c) => `border: 2px solid ${c}; padding: 30px;`,
            (c) => `border-left: 20px solid ${c}; border-right: 1px solid #eee; padding: 30px;`,
            (c) => `border: 4px double ${c}; padding: 30px;`,
            (c) => `box-shadow: 15px 15px 0px ${c}; border: 2px solid #000; padding: 30px;`
        ],
        headers: [
            (d, c) => `<table width="100%"><tr><td>${d.logo}<h1>PURCHASE ORDER</h1></td><td align="right" style="font-size:11px;">${d.bAddr}<br>GST: ${d.bGst}</td></tr></table>`,
            (d, c) => `<div style="background:${c}; color:white; padding:20px; margin:-30px -30px 20px -30px; text-align:center;">${d.logo}<h1>PURCHASE ORDER</h1><small>${d.bWeb}</small></div>`,
            (d, c) => `<center>${d.logo}<h2 style="border-bottom:2px solid ${c}">${d.bName}</h2><p>${d.bAddr}</p></center>`,
            (d, c) => `<table width="100%"><tr><td bgcolor="${c}" style="color:white; padding:20px;"><h1>PO DOCUMENT</h1></td><td align="right">${d.logo}<br><b>${d.bName}</b></td></tr></table>`,
            (d, c) => `<div style="border-bottom:5px solid ${c}; padding-bottom:10px;">${d.logo} <b>${d.bName}</b><br>${d.bEmail}</div>`
        ],
        tables: [
            (rows, c) => `<table width="100%" border="1" style="border-collapse:collapse; margin:15px 0;"><thead><tr bgcolor="${c}" style="color:white"><th>No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`,
            (rows, c) => `<table width="100%" border="1" style="border-collapse:collapse; margin:15px 0; border-color:#eee;"><tbody>${rows}</tbody></table>`,
            (rows, c) => `<div style="border:2px solid ${c}; border-radius:10px; overflow:hidden;"><table width="100%" border="1" style="border-collapse:collapse;">${rows}</table></div>`,
            (rows, c) => `<table width="100%" style="border-collapse:collapse; margin:15px 0;"><thead style="border-bottom:3px solid ${c}"><tr><th>No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`
        ]
    };

    function addRow() {
        const tbody = document.getElementById('ui_rows');
        const id = Date.now();
        const html = `<tr class="item-row" id="row_${id}">
            <td align="center">${tbody.children.length + 1}</td>
            <td><input type="text" class="i-desc" value="Hardware Item" oninput="update()"></td>
            <td><input type="text" class="i-hsn" value="8481" oninput="update()"></td>
            <td><input type="number" class="i-qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="i-rate" value="1000" oninput="calculate()"></td>
            <td><input type="text" class="i-amt" readonly></td>
            <td><button onclick="document.getElementById('row_${id}').remove(); calculate();" style="color:red; background:none; border:none; cursor:pointer;">&times;</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', html);
        calculate();
    }

    function calculate() {
        let st = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            let q = parseFloat(row.querySelector('.i-qty').value) || 0;
            let r = parseFloat(row.querySelector('.i-rate').value) || 0;
            let line = q * r;
            row.querySelector('.i-amt').value = line.toFixed(2);
            st += line;
        });
        const d = parseFloat(document.getElementById('s_disc').value) || 0;
        const cp = parseFloat(document.getElementById('s_cgst_p').value) || 0;
        const sp = parseFloat(document.getElementById('s_sgst_p').value) || 0;
        const ip = parseFloat(document.getElementById('s_igst_p').value) || 0;
        const tax = (st - d) * ((cp + sp + ip) / 100);
        document.getElementById('disp_grand').value = (st - d + tax).toFixed(2);
        update();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoImg = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function update() {
        const id = activeStyle - 1;
        const color = colors[id % 5];
        const d = {
            bName: document.getElementById('b_name').value, bAddr: document.getElementById('b_addr').value, bGst: document.getElementById('b_gst').value,
            bPhone: document.getElementById('b_phone').value, bEmail: document.getElementById('b_email').value, bWeb: document.getElementById('b_web').value,
            logo: logoImg ? `<img src="${logoImg}" width="120" style="width:120px; height:auto;">` : "<b>LOGO</b>",
            poNo: document.getElementById('q_no').value, poDate: document.getElementById('q_date').value,
            delDate: document.getElementById('del_date').value, delPlace: document.getElementById('del_pos').value,
            sName: document.getElementById('s_name').value, sAddr: document.getElementById('s_addr').value, sGst: document.getElementById('s_gst').value, sEmail: document.getElementById('s_email').value,
            pTerms: document.getElementById('e_pay').value, dTerms: document.getElementById('e_del').value, tAndC: document.getElementById('e_terms').value,
            grand: document.getElementById('disp_grand').value
        };

        const border = Modules.borders[Math.floor(id / 5) % 5](color);
        const header = Modules.headers[Math.floor(id / 25) % 5](d, color);
        const tableLogic = Modules.tables[Math.floor(id / 125) % 4];

        const rows = Array.from(document.querySelectorAll('.item-row')).map((row, i) => `
            <tr><td align="center">${i+1}</td><td>${row.querySelector('.i-desc').value}</td><td align="center">${row.querySelector('.i-hsn').value}</td><td align="center">${row.querySelector('.i-qty').value}</td><td align="right">${row.querySelector('.i-rate').value}</td><td align="right">${row.querySelector('.i-amt').value}</td></tr>
        `).join('');

        document.getElementById('render-target').innerHTML = `
            <div style="${border} min-height:280mm; background:white; font-family:Arial;">
                ${header}
                <table width="100%" style="font-size:12px; margin-top:10px;">
                    <tr>
                        <td width="50%"><b>SUPPLIER:</b><br>${d.sName}<br>${d.sAddr}<br>GST: ${d.sGst}</td>
                        <td align="right"><b>PO NO:</b> ${d.poNo}<br><b>DATE:</b> ${d.poDate}<br><b>DELIVERY:</b> ${d.delDate}</td>
                    </tr>
                </table>
                ${tableLogic(rows, color)}
                <table width="100%" style="font-size:12px;">
                    <tr>
                        <td width="60%"><b>Payment Terms:</b> ${d.pTerms}<br><b>Delivery Place:</b> ${d.delPlace}<br><br><b>T&C:</b> ${d.tAndC}</td>
                        <td align="right" valign="top"><h2 style="color:${color}">TOTAL: ₹ ${d.grand}</h2></td>
                    </tr>
                </table>
                <div style="margin-top:60px; text-align:right;"><b>Authorized Signatory</b><br><br>________________</div>
            </div>`;
    }

    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a'); link.href = url; link.download = 'PurchaseOrder.doc'; link.click();
    }

    const grid = document.getElementById('tpl-grid');
    for (let i = 1; i <= 500; i++) {
        const btn = document.createElement('button');
        btn.className = 'tpl-btn'; btn.style.background = colors[(i - 1) % 5]; btn.innerText = i;
        btn.onclick = () => { activeStyle = i; update(); };
        grid.appendChild(btn);
    }
    document.getElementById('q_date').valueAsDate = new Date();
    document.getElementById('del_date').valueAsDate = new Date();
    window.onload = () => { addRow(); update(); };
</script>


<script>
    function masterScaler() {
        const target = document.getElementById('render-target');
        const container = document.querySelector('.preview-box');
        if (!target || window.innerWidth > 768) return;

        const screenWidth = window.innerWidth;
        const a4Width = 800; // Standard A4 pixel width
        // Calculate scale with a 5% safety gap (0.95) to prevent border cutting
        const scale = (screenWidth / a4Width) * 0.92; 

        target.style.transform = `scale(${scale})`;
        container.style.height = (target.offsetHeight * scale) + 'px';
    }

    window.addEventListener('load', masterScaler);
    window.addEventListener('resize', masterScaler);
    // Re-scale if the user clicks a style button
    document.addEventListener('click', () => setTimeout(masterScaler, 50));
</script>
</body>
</html>
