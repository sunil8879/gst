<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURCHASE ORDER TEMPLATES PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .no-print { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; text-transform: uppercase; color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; }
        h3 { background: var(--s); color: white; padding: 10px; border-radius: 5px; font-size: 14px; text-transform: uppercase; margin-top: 25px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--p); }
        
        .ui-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        .ui-table th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; font-size: 11px; text-align: left; }
        .ui-table td { border: 1px solid #e2e8f0; padding: 5px; }
        .ui-table input { border: none; width: 100%; background: transparent; padding: 5px; box-sizing: border-box; }

        .template-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .tpl-btn { padding: 12px 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .tpl-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; border-radius: 12px; margin-top: 30px; }
        #render-target { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; }
        .btn-act { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        
        @media (max-width: 768px) { .template-grid { grid-template-columns: repeat(2, 1fr); } }
        @media print { .no-print { display: none !important; } body { padding: 0; } .preview-box { background: white; padding: 0; } #render-target { width: 100%; box-shadow: none; border:none !important; } }



/* 12. VERTICAL STACK FOR TOOL PAGES (REFINED) */
/* This ensures buttons stack vertically and fit within the screen */

/* 1. Target the containers for buttons and tools */
.featured-grid, 
.button-group, 
.tools-container,
.btn-group,
#tpl-grid {
    display: flex !important;
    flex-direction: column !important; /* Force vertical stacking */
    align-items: center !important;
    width: 100% !important;
    max-width: 100% !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    box-sizing: border-box !important;
}

/* 2. Target the buttons themselves to make them responsive */
.select-btn, 
.exciting-tools-btn, 
.btn-act,
button,
select {
    width: 100% !important;      /* Make them full width of container */
    max-width: 500px !important; /* Prevent them from becoming too wide on desktop */
    margin: 5px 0 !important;
    padding: 12px 15px !important;
    height: auto !important;     /* Allow button to expand if text is long */
    white-space: normal !important; /* Allow text to wrap inside the button */
    word-wrap: break-word !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
}

/* 3. Specifically fix the Template Grid if it's overflowing */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)) !important; /* Better than forced columns */
    gap: 5px !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Ensure images or barcodes inside buttons don't break the width */
button img, button svg {
    max-width: 100% !important;
    height: auto !important;
}



@media screen and (max-width: 768px) {
    /* Stack all buttons and inputs vertically */
    .btn-group, .featured-grid, .form-grid, .btn-group { 
        display: flex !important; 
        flex-direction: column !important; 
        align-items: center !important; 
    }
    .btn-act, .select-btn, input, select, textarea, .field { 
        width: 100% !important; 
        max-width: 100% !important; 
    }
    /* Center the preview container */
    .preview-box { 
        display: flex !important; 
        justify-content: center !important; 
        overflow: hidden !important; 
        padding: 10px 0 !important;
    }
#render-target { 
    transform-origin: top center !important;
    margin: 0 auto 50px auto !important; /* THE FIX: 50px gap at the bottom */
    box-sizing: border-box !important;   /* THE FIX: Forces border to stay inside */
    width: 210mm; 
}

/* Also add this to allow height to grow */
#render-target div { min-height: 0 !important; }
}
    </style>
</head>
<body>

<div class="no-print">
    <div class="editor-panel">
        <h1>Purchase Order Designer</h1>

        <h3>1. Header (Buyer / My Company Info)</h3>
        <div class="form-grid">
            <div class="field"><label>Logo</label><input type="file" id="logo-input" accept="image/*" onchange="loadLogo(this)"></div>
            <div class="field"><label>Business Name</label><input type="text" id="b_name" value="Global Supply Chain Ltd" oninput="update()"></div>
            <div class="field"><label>GSTIN</label><input type="text" id="b_gst" value="27ABCDE1234F1Z1" oninput="update()"></div>
            <div class="field"><label>Contact No</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
            <div class="field"><label>Email</label><input type="text" id="b_email" value="procurement@globalsupply.com" oninput="update()"></div>
            <div class="field"><label>Website</label><input type="text" id="b_web" value="www.globalsupply.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Business Address</label><input type="text" id="b_addr" value="Plot 88, Sector 18, Gurgaon, Haryana" oninput="update()"></div>
        </div>

        <h3>2. PO & 3. Supplier Details</h3>
        <div class="form-grid">
            <div class="field"><label>PO Number</label><input type="text" id="po_no" value="PO-2024-771" oninput="update()"></div>
            <div class="field"><label>Issue Date</label><input type="date" id="po_date" oninput="update()"></div>
            <div class="field"><label>Delivery Date</label><input type="date" id="del_date" oninput="update()"></div>
            <div class="field"><label>Place of Delivery</label><input type="text" id="del_pos" value="Warehouse 4, Mumbai Port" oninput="update()"></div>
            <div class="field"><label>Supplier Name</label><input type="text" id="s_name" value="Industrial Spares Mfg" oninput="update()"></div>
            <div class="field"><label>Supplier GSTIN</label><input type="text" id="s_gst" value="27QWERT5544P1Z2" oninput="update()"></div>
            <div class="field"><label>Supplier Contact</label><input type="text" id="s_phone" value="+91 88888 77777" oninput="update()"></div>
            <div class="field" style="grid-column: span 1;"><label>Supplier Email</label><input type="text" id="s_email" value="sales@industrialspares.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Supplier Address</label><input type="text" id="s_addr" value="Plot 12, Industrial Area, Pune, Maharashtra" oninput="update()"></div>
        </div>

        <h3>4. Order Table (Dynamic Math)</h3>
        <table class="ui-table">
            <thead>
                <tr>
                    <th width="5%">No</th><th width="45%">Item Description</th><th width="10%">HSN</th><th width="8%">Qty</th><th width="8%">Unit</th><th width="12%">Rate</th><th width="12%">Amount</th><th width="5%"></th>
                </tr>
            </thead>
            <tbody id="ui_rows"></tbody>
        </table>
        <button onclick="addRow()" style="margin-top:10px; cursor:pointer; padding:8px 15px;">+ Add Row</button>

        <h3>5. Summary & 6. Terms</h3>
        <div class="form-grid">
            <div class="field"><label>Subtotal</label><input type="text" id="summ_sub" readonly style="background:#f0f0f0;"></div>
            <div class="field"><label>Discount (₹)</label><input type="number" id="summ_disc" value="0" oninput="calculate()"></div>
            <div class="field"><label>GST Rate (%)</label><input type="number" id="summ_gst_rate" value="18" oninput="calculate()"></div>
            <div class="field"><label>Total Order Value</label><input type="text" id="summ_grand" readonly style="font-weight:bold; color:red; background:#f0f0f0;"></div>
            <div class="field"><label>Payment Terms</label><input type="text" id="e_pay" value="30% Advance, 70% on Delivery" oninput="update()"></div>
            <div class="field"><label>Delivery Terms</label><input type="text" id="e_del" value="F.O.R Destination" oninput="update()"></div>
            <div class="field" style="grid-column: span 3;"><label>Terms & Conditions</label><textarea id="e_terms" rows="2" oninput="update()">1. Goods must match HSN specifications. 2. Quality inspection at the time of delivery.</textarea></div>
            <div class="field" style="grid-column: span 2;"><label>Thank You Message</label><input type="text" id="f_thank" value="Thank you for your business. We look forward to a great partnership." oninput="update()"></div>
        </div>

        <div class="template-grid" id="btn-container"></div>

        <div style="display:flex; gap:15px; justify-content:center; margin-bottom:40px;">
            <button class="btn-act" style="background:#10b981" onclick="saveToLocal()"><i class="fas fa-save"></i> Save Data</button>
            <button class="btn-act" style="background:#2563eb" onclick="exportWord()"><i class="fas fa-file-word"></i> MS Word Export</button>
        </div>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<script>
    let logoData = "";
    let activeId = 1;
    const colors = ["#1e40af","#52525b","#1e3a8a","#1e293b","#854d0e","#475569","#4338ca","#1e3a8a","#64748b","#0d9488","#3b82f6","#334155","#444444","#0891b2","#be123c","#000000","#0d9488","#1e3a8a","#854d0e","#2563eb","#1e293b","#0f766e","#1e3a8a","#0284c7","#2563eb"];
    const names = ["Corporate Blue", "Minimal Business", "Card Style", "Sidebar PO", "Premium Dark", "Grid Structured", "Gradient Modern", "Classic Trade", "Compact Professional", "Bold Header", "Rounded Modern", "Split Column", "Elegant Minimal", "Tech Startup", "Highlight Section", "Legal Contract", "Soft Pastel", "Table-Focused", "Luxury Gold", "Split Header", "Dashboard Inspired", "Thin Border", "Executive Business", "Bright Business", "Smart Signature"];

    function addRow() {
        const tbody = document.getElementById('ui_rows');
        const id = Date.now();
        const html = `<tr class="item-row" id="row_${id}">
            <td align="center">${tbody.children.length + 1}</td>
            <td><input type="text" class="i-desc" value="Industrial Spare Part" oninput="update()"></td>
            <td><input type="text" class="i-hsn" value="8481" oninput="update()"></td>
            <td><input type="number" class="i-qty" value="1" oninput="calculate()"></td>
            <td><input type="text" class="i-unit" value="Nos" oninput="update()"></td>
            <td><input type="number" class="i-rate" value="1000" oninput="calculate()"></td>
            <td><input type="text" class="i-total" value="1000.00" readonly></td>
            <td align="center"><button onclick="document.getElementById('row_${id}').remove(); calculate();" style="color:red; background:none; border:none; cursor:pointer;">&times;</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', html);
        calculate();
    }

    function calculate() {
        let subtotal = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const q = parseFloat(row.querySelector('.i-qty').value) || 0;
            const r = parseFloat(row.querySelector('.i-rate').value) || 0;
            const line = q * r;
            row.querySelector('.i-total').value = line.toFixed(2);
            subtotal += line;
        });
        const disc = parseFloat(document.getElementById('summ_disc').value) || 0;
        const gstRate = parseFloat(document.getElementById('summ_gst_rate').value) || 0;
        const taxable = subtotal - disc;
        const tax = taxable * (gstRate / 100);
        const grand = taxable + tax;

        document.getElementById('summ_sub').value = subtotal.toFixed(2);
        document.getElementById('summ_grand').value = grand.toFixed(2);
        update();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoData = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function init() {
        const container = document.getElementById('btn-container');
        names.forEach((name, i) => {
            const btn = document.createElement('button');
            btn.className = 'tpl-btn';
            btn.style.background = colors[i];
            btn.innerText = name;
            btn.onclick = () => { activeId = i + 1; update(); };
            container.appendChild(btn);
        });
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('po_date').value = today;
        document.getElementById('del_date').value = today;
        addRow();
    }

    function update() {
        const items = [];
        document.querySelectorAll('.item-row').forEach((row, i) => {
            items.push({ no: i + 1, desc: row.querySelector('.i-desc').value, hsn: row.querySelector('.i-hsn').value, qty: row.querySelector('.i-qty').value, unit: row.querySelector('.i-unit').value, rate: row.querySelector('.i-rate').value, total: row.querySelector('.i-total').value });
        });

        const d = {
            bName: document.getElementById('b_name').value, bAddr: document.getElementById('b_addr').value, bGst: document.getElementById('b_gst').value, bPhone: document.getElementById('b_phone').value, bEmail: document.getElementById('b_email').value, bWeb: document.getElementById('b_web').value,
            logo: logoData ? `<img src="${logoData}" width="120" height="60" style="width:120px; height:60px;">` : "<h2>LOGO</h2>",
            poNo: document.getElementById('po_no').value, poDate: document.getElementById('po_date').value, delDate: document.getElementById('del_date').value, delPlace: document.getElementById('del_pos').value,
            sName: document.getElementById('s_name').value, sGst: document.getElementById('s_gst').value, sAddr: document.getElementById('s_addr').value, sCont: document.getElementById('s_phone').value + " | " + document.getElementById('s_email').value,
            items: items, sub: document.getElementById('summ_sub').value, disc: document.getElementById('summ_disc').value, gstR: document.getElementById('summ_gst_rate').value, grand: document.getElementById('summ_grand').value,
            pTerms: document.getElementById('e_pay').value, dTerms: document.getElementById('e_del').value, tAndC: document.getElementById('e_terms').value, thank: document.getElementById('f_thank').value
        };
        document.getElementById('render-target').innerHTML = renderTemplate(activeId, d, colors[activeId-1]);
    }

    function renderTemplate(id, d, color) {
        const borderStyle = `border: 8px solid ${color}; outline: 2px solid ${color}; outline-offset: 4px;`;
        const wrapS = (bg) => `<div style="background:${bg}; ${borderStyle} padding:30px; min-height:280mm; box-sizing:border-box; background:white; font-family:Arial; color:#333; position:relative;">`;
        const wrapE = `</div>`;
        const seller = `<div style="font-size:11px;"><b>${d.bName}</b><br>${d.bAddr}<br><b>GSTIN:</b> ${d.bGst} | <b>PH:</b> ${d.bPhone}<br>${d.bEmail} | ${d.bWeb}</div>`;
        const supplier = `<div style="font-size:11px; border-left:3px solid ${color}; padding-left:15px;"><b>SUPPLIER:</b><br><b style="font-size:14px;">${d.sName}</b><br>${d.sAddr}<br><b>GSTIN:</b> ${d.sGst}</div>`;
        const poInfo = `<div style="font-size:11px; text-align:right;"><b>PO No:</b> ${d.poNo}<br><b>Date:</b> ${d.poDate}<br><b>Delivery By:</b> ${d.delDate}<br><b>Place:</b> ${d.delPlace}</div>`;
        const rows = d.items.map(it => `<tr><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.no}</td><td style="border:1px solid #ccc; padding:8px;">${it.desc}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.hsn}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.qty}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.unit}</td><td style="border:1px solid #ccc; padding:8px; text-align:right;">${it.rate}</td><td style="border:1px solid #ccc; padding:8px; text-align:right;">${it.total}</td></tr>`).join('');
        const table = `<table width="100%" style="border-collapse:collapse; margin:20px 0; font-size:11px;"><tr style="background:${color}; color:white;"><th>No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Unit</th><th>Rate</th><th>Total</th></tr>${rows}</table>`;
        const totals = `<table width="100%" style="font-size:12px; border-collapse:collapse; margin-top:20px;"><tr><td width="60%" valign="top" style="font-size:11px;"><b>PAYMENT:</b> ${d.pTerms}<br><b>DELIVERY:</b> ${d.dTerms}<br><br><b>Terms:</b> ${d.tAndC}</td><td width="40%"><table width="100%" style="text-align:right; font-weight:bold;"><tr><td>Subtotal:</td><td>₹ ${d.sub}</td></tr><tr><td>Tax (${d.gstR}%):</td><td>₹ ${(parseFloat(d.grand) - (parseFloat(d.sub) - parseFloat(d.disc))).toFixed(2)}</td></tr><tr style="font-size:18px; color:${color}; border-top:2px solid #333;"><td>TOTAL VALUE:</td><td>₹ ${d.grand}</td></tr></table></td></tr></table><div style="margin-top:50px; text-align:right; font-size:12px;"><i>${d.thank}</i><br><br><b>Authorized Signatory</b><br><br><br>__________________________</div>`;

        switch(id) {
            case 1: return wrapS("#fff") + `<table width="100%"><tr><td>${d.logo}<h1>PURCHASE ORDER</h1></td><td align="right">${seller}</td></tr></table><hr color="${color}">${supplier}${poInfo}${table}${totals}` + wrapE;
            case 2: return wrapS("#fff") + `<center>${d.logo}<h2 style="color:${color}">PURCHASE ORDER</h2><hr>${seller}</center><br><table width="100%"><tr><td>${supplier}</td><td align="right" valign="top">${poInfo}</td></tr></table>${table}${totals}` + wrapE;
            case 3: return wrapS("#f3f4f6") + `<div style="background:white; border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:10px;"><table width="100%"><tr><td>${d.logo}</td><td align="right">${seller}</td></tr></table></div><div style="background:white; border:1px solid #ddd; padding:15px; border-radius:10px;">${supplier}</div><div style="background:white; border:1px solid #ddd; padding:15px; border-radius:10px;">${poInfo}${table}${totals}</div>` + wrapE;
            case 4: return wrapS("#fff") + `<table width="100%" height="100%"><tr><td width="30%" bgcolor="${color}" style="color:white; padding:20px;" valign="top">${d.logo}<br><h3>BUYER</h3>${seller}<hr>PO: ${d.poNo}</td><td width="70%" style="padding:20px;" valign="top"><h1>PURCHASE ORDER</h1>${supplier}${poInfo}${table}${totals}</td></tr></table>` + wrapE;
            case 5: return wrapS("#111") + `<div style="color:white; text-align:center;">${d.logo}<h1>PURCHASE ORDER</h1><hr color="gold">${seller}<div style="background:#fff; color:#333; padding:20px; margin-top:20px;">${supplier}${poInfo}${table}${totals}</div></div>` + wrapE;
            case 6: return wrapS("#f8fafc") + `<table width="100%" border="1" style="border-collapse:collapse; background:white;"><tr><td style="padding:15px;">${seller}</td><td style="padding:15px;" align="right"><b>PO DETAILS</b><br># ${d.poNo}<br>${d.poDate}</td></tr></table><br>${supplier}${table}${totals}` + wrapE;
            case 7: return wrapS("linear-gradient(to right, #f3f4f6, #fff)") + `<div style="background:white; padding:25px; border-top:5px solid ${color};">${d.logo}<table width="100%"><tr><td>${seller}</td><td align="right">${supplier}</td></tr></table>${poInfo}${table}${totals}</div>` + wrapE;
            case 8: return wrapS("#fff") + `<div style="font-family:'Times New Roman';"><table width="100%"><tr><td>${seller}</td><td align="right">${d.logo}</td></tr></table><center><h2><u>PURCHASE ORDER</u></h2></center>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 9: return wrapS("#f9fafb") + `<div style="font-size:11px;"><table width="100%"><tr><td><b>${d.bName}</b><br>PO Ref: <b>${d.poNo}</b></td><td align="right">${d.logo}</td></tr></table><hr>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 10: return wrapS("#fff") + `<div style="background:${color}; color:white; padding:30px; margin:-30px -30px 20px -30px;"><center><h1>${d.bName}</h1></center></div>${seller}<hr>${supplier}${poInfo}${table}${totals}` + wrapE;
            case 11: return wrapS("#f0f9ff") + `<div style="background:white; border-radius:40px; padding:20px; border:1px solid #bae6fd;">${d.logo}${seller}<hr>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 12: return wrapS("#fff") + `<table width="100%"><tr><td width="45%" valign="top" style="border-right:2px solid #eee; padding-right:15px;">${d.logo}<br>${seller}</td><td width="55%" style="padding-left:15px;"><h1>PURCHASE ORDER</h1>${poInfo}${supplier}</td></tr></table>${table}${totals}` + wrapE;
            case 13: return wrapS("#fff") + `<div style="padding:40px;">${d.logo}<h1>PURCHASE ORDER</h1>${seller}<hr>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 14: return wrapS("linear-gradient(to bottom, #ecfeff, #fff)") + `<table width="100%"><tr><td>${d.logo}</td><td align="right"><b>${d.bName}</b></td></tr></table><div style="background:white; border-radius:15px; padding:20px; border:1px solid #e0f2f1; margin-top:10px;">${poInfo}${supplier}</div>${table}${totals}` + wrapE;
            case 15: return wrapS("#fff") + `<div style="border:2px solid ${color}; padding:10px; margin-bottom:10px;">${seller}</div><div style="border:2px solid ${color}; padding:10px; margin-bottom:10px;">${supplier}</div>${poInfo}${table}${totals}` + wrapE;
            case 16: return wrapS("#fff") + `<center><h3>OFFICIAL PURCHASE AGREEMENT</h3></center><br>This document certifies a purchase obligation by <b>${d.bName}</b> to <b>${d.sName}</b>.<br><hr>${poInfo}${table}${summary}` + wrapE;
            case 17: return wrapS("#fff5f5") + `<div style="background:white; border-radius:20px; padding:20px; border:3px solid #feb2b2;">${seller}<hr>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 18: return wrapS("#fff") + `<table width="100%" border="1" style="border-collapse:collapse;"><tr><td colspan="2" align="center"><b>${d.bName}</b></td></tr><tr><td>${seller}</td><td>${supplier}</td></tr></table>${poInfo}${table}${totals}` + wrapE;
            case 19: return wrapS("#000") + `<div style="color:white; padding:10px;"><center>${d.logo}<h1 style="color:#d4af37;">PREMIUM PURCHASE ORDER</h1></center><br>${seller}<div style="background:#222; padding:15px;">${supplier}${poInfo}${table}${totals}</div></div>` + wrapE;
            case 20: return wrapS("#fff") + `<table width="100%"><tr><td><h1>PURCHASE ORDER</h1></td><td align="right">${d.logo}</td></tr></table><table width="100%"><tr><td width="50%">${seller}</td><td width="50%" align="right" valign="top">${supplier}</td></tr></table><hr>${poInfo}${table}${totals}` + wrapE;
            case 21: return wrapS("#f8fafc") + `<div style="background:white; border:1px solid #ddd; padding:20px;">${seller}</div><br><div style="background:white; border:1px solid #ddd; padding:20px;">${supplier}</div>${poInfo}${table}${totals}` + wrapE;
            case 22: return wrapS("#fff") + `<div style="border:1px solid #ccc; padding:20px; margin:10px;">${seller}<hr>${supplier}${poInfo}${table}${totals}</div>` + wrapE;
            case 23: return wrapS("linear-gradient(to bottom, #f1f5f9, #fff)") + `<table width="100%"><tr><td>${d.logo}</td><td align="right"><b>PURCHASE ORDER</b><br># ${d.poNo}</td></tr></table><hr>${seller}<br>${supplier}${poInfo}${table}${totals}` + wrapE;
            case 24: return wrapS("#fff") + `<div style="background:${color}; color:white; padding:20px; margin:-30px -30px 10px -30px;"><h2>${d.bName}</h2></div><br>${supplier}${poInfo}${table}${totals}` + wrapE;
            case 25: return wrapS("#fff") + `<center>${d.logo}<h1>${d.bName}</h1></center><hr color="${color}">${supplier}${poInfo}${table}${totals}` + wrapE;
            default: return wrapS("#fff") + `<table width="100%"><tr><td>${d.logo}<h2>${d.bName}</h2></td><td align="right"># ${d.poNo}</td></tr></table><hr>${supplier}${poInfo}${table}${totals}` + wrapE;
        }
    }

    function saveToLocal() {
        const data = { b: document.getElementById('b_name').value, g: document.getElementById('b_gst').value, a: document.getElementById('b_addr').value };
        localStorage.setItem('po_settings', JSON.stringify(data));
        alert("Buyer Company Details Saved!");
    }

    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'><style>table{border-collapse:collapse; width:100%;} td,th{border:1px solid #ccc; padding:5px; font-family:Arial;}</style></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `PurchaseOrder_${document.getElementById('po_no').value}.doc`;
        link.click();
    }
    window.onload = init;
</script>




<script>
    function masterScaler() {
        const target = document.getElementById('render-target');
        const container = document.querySelector('.preview-box');
        if (!target || window.innerWidth > 768) return;

        const screenWidth = window.innerWidth;
        const a4Width = 800; // Standard A4 pixel width
        // Calculate scale with a 5% safety gap (0.95) to prevent border cutting
        const scale = (screenWidth / a4Width) * 0.92; 

        target.style.transform = `scale(${scale})`;
        container.style.height = (target.offsetHeight * scale) + 'px';
    }

    window.addEventListener('load', masterScaler);
    window.addEventListener('resize', masterScaler);
    // Re-scale if the user clicks a style button
    document.addEventListener('click', () => setTimeout(masterScaler, 50));
</script>
</body>
</html>
