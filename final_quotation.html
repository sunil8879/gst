<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUOTATION TEMPLATES PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #2563eb; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .no-print { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; text-transform: uppercase; color: var(--s); border-bottom: 3px solid var(--p); padding-bottom: 10px; }
        h3 { background: var(--s); color: white; padding: 10px; border-radius: 5px; font-size: 14px; text-transform: uppercase; margin-top: 25px; margin-bottom: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        input, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        
        .ui-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        .ui-table th { background: #f8fafc; padding: 10px; border: 1px solid #e2e8f0; font-size: 11px; text-align: left; }
        .ui-table td { border: 1px solid #e2e8f0; padding: 5px; }
        .ui-table input { border: 1px solid transparent; width: 100%; background: transparent; padding: 5px; box-sizing: border-box; }
        .ui-table input:focus { border-color: var(--p); background: #fff; }

        .template-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px 0; }
        .tpl-btn { padding: 12px 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .tpl-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .preview-box { display: flex; justify-content: center; background: #334155; padding: 40px 10px; border-radius: 12px; margin-top: 30px; }
        #render-target { background: white; width: 210mm; min-height: 297mm; padding: 15mm; box-sizing: border-box; border: 1px solid #000; }
        .btn-act { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: 900; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 10px; font-size: 14px; }
     @media print {
    /* Hide all UI elements */
    .no-print, .btn-add-row, button, h1, h3, .template-grid { 
        display: none !important; 
    }

    /* Force the browser to show colors and borders */
    body, html { 
        background: white !important; 
        margin: 0 !important; 
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important; 
        print-color-adjust: exact !important;
    }

    /* Reset the preview container so it doesn't center or hide content */
    .preview-box { 
        display: block !important; 
        padding: 0 !important; 
        margin: 0 !important; 
        background: white !important;
    }

    /* Ensure the target is visible and spans full width */
    #render-target {
        width: 100% !important;
        height: auto !important;
        border: none !important;
        box-shadow: none !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
    }
}

/* 12. VERTICAL STACK FOR TOOL PAGES (REFINED) */
/* This ensures buttons stack vertically and fit within the screen */

/* 1. Target the containers for buttons and tools */
.featured-grid, 
.button-group, 
.tools-container,
.btn-group,
#tpl-grid {
    display: flex !important;
    flex-direction: column !important; /* Force vertical stacking */
    align-items: center !important;
    width: 100% !important;
    max-width: 100% !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    box-sizing: border-box !important;
}

/* 2. Target the buttons themselves to make them responsive */
.select-btn, 
.exciting-tools-btn, 
.btn-act,
button,
select {
    width: 100% !important;      /* Make them full width of container */
    max-width: 500px !important; /* Prevent them from becoming too wide on desktop */
    margin: 5px 0 !important;
    padding: 12px 15px !important;
    height: auto !important;     /* Allow button to expand if text is long */
    white-space: normal !important; /* Allow text to wrap inside the button */
    word-wrap: break-word !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    text-align: center !important;
}

/* 3. Specifically fix the Template Grid if it's overflowing */
#tpl-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)) !important; /* Better than forced columns */
    gap: 5px !important;
    max-height: 200px;
    overflow-y: auto;
}

/* 4. Ensure images or barcodes inside buttons don't break the width */
button img, button svg {
    max-width: 100% !important;
    height: auto !important;
}
    </style>
</head>
<body>

<div class="no-print">
    <div class="editor-panel">
        <h1>Quotation Templates Pro</h1>

        <h3>1. My Business Information</h3>
        <div class="form-grid">
            <div class="field"><label>Logo</label><input type="file" id="b_logo" accept="image/*" onchange="loadLogo(this)"></div>
            <div class="field"><label>Business Name</label><input type="text" id="b_name" value="Global Tech Solutions" oninput="update()"></div>
            <div class="field"><label>GSTIN</label><input type="text" id="b_gst" value="27ABCDE1234F1Z1" oninput="update()"></div>
            <div class="field"><label>Contact</label><input type="text" id="b_phone" value="+91 98765 43210" oninput="update()"></div>
            <div class="field"><label>Email</label><input type="text" id="b_email" value="info@globaltech.com" oninput="update()"></div>
            <div class="field"><label>Website</label><input type="text" id="b_web" value="www.globaltech.com" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Address</label><input type="text" id="b_addr" value="123 Corporate Plaza, New Delhi" oninput="update()"></div>
        </div>

        <h3>2. Quotation & 3. Customer Details</h3>
        <div class="form-grid">
            <div class="field"><label>Quote #</label><input type="text" id="q_no" value="QTN-889" oninput="update()"></div>
            <div class="field"><label>Date</label><input type="date" id="q_date" oninput="update()"></div>
            <div class="field"><label>Place of Supply</label><input type="text" id="q_pos" value="Delhi (07)" oninput="update()"></div>
            <div class="field"><label>Customer Name</label><input type="text" id="c_name" value="John Doe" oninput="update()"></div>
            <div class="field"><label>Customer GSTIN</label><input type="text" id="c_gst" value="19QWERT5544P1Z2" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Customer Address</label><input type="text" id="c_addr" value="Park Street, Kolkata" oninput="update()"></div>
        </div>

        <h3>4. Dynamic Items Table</h3>
        <table class="ui-table">
            <thead>
                <tr>
                    <th width="5%">No</th><th width="35%">Description</th><th width="10%">HSN</th><th width="8%">Qty</th><th width="8%">Unit</th><th width="10%">Rate</th><th width="8%">Disc%</th><th width="10%">Total</th><th width="5%"></th>
                </tr>
            </thead>
            <tbody id="ui_item_rows"></tbody>
        </table>
        <button onclick="addRow()" style="margin-top:10px; padding:10px; cursor:pointer;">+ Add New Item</button>

        <h3>5. Summary & 6. Additional Details</h3>
        <div class="form-grid">
            <div class="field"><label>Subtotal</label><input type="text" id="s_sub" readonly style="background:#f0f0f0;"></div>
            <div class="field"><label>GST Rate (%)</label><input type="number" id="s_gst_rate" value="18" oninput="calculateTotals()"></div>
            <div class="field"><label>Total Tax</label><input type="text" id="s_tax_total" readonly style="background:#f0f0f0;"></div>
            <div class="field"><label>Grand Total</label><input type="text" id="s_grand" readonly style="font-weight:bold; color:red; background:#f0f0f0;"></div>
            <div class="field"><label>Warranty</label><input type="text" id="e_war" value="1 Year" oninput="update()"></div>
            <div class="field"><label>Delivery</label><input type="text" id="e_del" value="7 Days" oninput="update()"></div>
            <div class="field"><label>Payment</label><input type="text" id="e_pay" value="100% Advance" oninput="update()"></div>
            <div class="field" style="grid-column: span 2;"><label>Terms & Conditions</label><textarea id="e_terms" rows="2" oninput="update()">Prices are subject to change.</textarea></div>
            <div class="field"><label>Thank You Message</label><input type="text" id="f_thank" value="Thank you for your business!" oninput="update()"></div>
        </div>

        <h3>7. Select Template Design</h3>
        <div class="template-grid" id="btn-container"></div>

        <div style="display:flex; gap:15px; justify-content:center; margin-bottom:40px;">
            <button class="btn-act" style="background:#10b981" onclick="alert('Quotation Saved!')"><i class="fas fa-save"></i> Save</button>
           
            <button class="btn-act" style="background:#2563eb" onclick="exportWord()"><i class="fas fa-file-word"></i> MS Word</button>
        </div>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>

<script>
    let logoImg = "";
    let activeId = 1;
    const colors = ["#1e40af","#111827","#64748b","#0f172a","#1e3a8a","#2563eb","#374151","#60a5fa","#1d4ed8","#475569","#2563eb","#1e40af","#1e3a8a","#4b5563","#000000","#7c3aed","#111827","#334155","#2563eb","#444444","#1e40af","#1d4ed8","#3b82f6","#52525b","#1e3a8a"];

    function addRow() {
        const tbody = document.getElementById('ui_item_rows');
        const id = Date.now();
        const row = `<tr class="item-row" id="row_${id}">
            <td align="center">${tbody.children.length + 1}</td>
            <td><input type="text" class="i-desc" value="Product Service Item" oninput="update()"></td>
            <td><input type="text" class="i-hsn" value="9983" oninput="update()"></td>
            <td><input type="number" class="i-qty" value="1" oninput="calculateTotals()"></td>
            <td><input type="text" class="i-unit" value="Nos" oninput="update()"></td>
            <td><input type="number" class="i-rate" value="1000" oninput="calculateTotals()"></td>
            <td><input type="number" class="i-disc" value="0" oninput="calculateTotals()"></td>
            <td><input type="text" class="i-total" value="1000.00" readonly></td>
            <td align="center"><button onclick="document.getElementById('row_${id}').remove(); calculateTotals();" style="color:red; cursor:pointer;">&times;</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
        calculateTotals();
    }

    function calculateTotals() {
        let subtotal = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const qty = parseFloat(row.querySelector('.i-qty').value) || 0;
            const rate = parseFloat(row.querySelector('.i-rate').value) || 0;
            const disc = parseFloat(row.querySelector('.i-disc').value) || 0;
            let line = (qty * rate) - ((qty * rate) * (disc / 100));
            row.querySelector('.i-total').value = line.toFixed(2);
            subtotal += line;
        });
        const gstRate = parseFloat(document.getElementById('s_gst_rate').value) || 0;
        const tax = subtotal * (gstRate / 100);
        document.getElementById('s_sub').value = subtotal.toFixed(2);
        document.getElementById('s_tax_total').value = tax.toFixed(2);
        document.getElementById('s_grand').value = (subtotal + tax).toFixed(2);
        update();
    }

    function loadLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { logoImg = e.target.result; update(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function init() {
        const container = document.getElementById('btn-container');
        for (let i = 1; i <= 25; i++) {
            const btn = document.createElement('button');
            btn.className = 'tpl-btn';
            btn.style.background = colors[i-1];
            btn.innerText = "Layout " + i;
            btn.onclick = () => { activeId = i; update(); };
            container.appendChild(btn);
        }
        document.getElementById('q_date').valueAsDate = new Date();
        addRow();
    }

    function update() {
        const itms = [];
        document.querySelectorAll('.item-row').forEach((r, i) => {
            itms.push({
                no: i + 1,
                desc: r.querySelector('.i-desc').value,
                hsn: r.querySelector('.i-hsn').value,
                qty: r.querySelector('.i-qty').value,
                unit: r.querySelector('.i-unit').value,
                rate: r.querySelector('.i-rate').value,
                disc: r.querySelector('.i-disc').value,
                total: r.querySelector('.i-total').value
            });
        });

        const data = {
            b_name: document.getElementById('b_name').value,
            b_gst: document.getElementById('b_gst').value,
            b_addr: document.getElementById('b_addr').value,
            b_phone: document.getElementById('b_phone').value,
            b_email: document.getElementById('b_email').value,
            b_web: document.getElementById('b_web').value,
            logo: logoImg ? `<img src="${logoImg}" width="120" height="60" style="width:120px; height:60px;">` : "<h2>LOGO</h2>",
            q_no: document.getElementById('q_no').value,
            q_date: document.getElementById('q_date').value,
            q_pos: document.getElementById('q_pos').value,
            c_name: document.getElementById('c_name').value,
            c_gst: document.getElementById('c_gst').value,
            c_addr: document.getElementById('c_addr').value,
            items: itms,
            s_sub: document.getElementById('s_sub').value,
            s_tax: document.getElementById('s_tax_total').value,
            s_gst_r: document.getElementById('s_gst_rate').value,
            s_grand: document.getElementById('s_grand').value,
            e_war: document.getElementById('e_war').value,
            e_del: document.getElementById('e_del').value,
            e_pay: document.getElementById('e_pay').value,
            e_terms: document.getElementById('e_terms').value,
            f_thank: document.getElementById('f_thank').value
        };
        document.getElementById('render-target').innerHTML = getTemplateHtml(activeId, data, colors[activeId-1]);
    }

    function getTemplateHtml(id, d, color) {
        const borderStyles = [`border:8px solid ${color}; outline:2px solid ${color}; outline-offset:5px;`,`border:4px double ${color};`,`border-left:20px solid ${color}; border-right:1px solid #eee;`,`outline:5px solid ${color}; outline-offset:-15px; border:1px solid #ddd;`,`border-top:25px solid ${color}; border-bottom:25px solid #eee;`,`border:2px solid ${color}; border-radius:40px;`,`border:10px inset ${color};`,`border-bottom:20px solid ${color};`,`border:4px dashed ${color};`,`box-shadow:15px 15px 0px ${color}; border:2px solid #000;`,`border-left:12px ridge ${color};`,`border:5px dotted ${color};`,`border:12px groove ${color};`,`border-top:10px solid ${color}; border-left:10px solid ${color};`,`border:3px solid black; padding:10px;`,`border-radius:100px 0 100px 0; border:5px solid ${color};`,`border:15px solid #222; border-top-color:${color};`,`border-bottom:8px solid ${color}; border-top:8px solid ${color};`,`border:2px solid ${color}; background: linear-gradient(to bottom, #fff 96%, ${color} 4%);`,`border:1px solid #eee; border-top:20px double ${color};`,`border:4px solid ${color}; box-shadow:inset 0 0 40px ${color}22;`,`border:25px solid ${color}; border-style:solid none;`,`border-bottom:10px dotted ${color}; border-top:10px dotted ${color};`,`border:4px solid ${color}; border-radius:20px;`,`border:15px double ${color}; padding:15px;` ];
        const wrapS = `<div style="${borderStyles[id-1]} padding:30px; min-height:280mm; box-sizing:border-box; background:white; font-family:Arial;">`;
        const wrapE = `</div>`;
        const sellerInfo = `<div style="font-size:12px;"><b>${d.b_name}</b><br>${d.b_addr}<br><b>GSTIN:</b> ${d.b_gst}<br><b>Contact:</b> ${d.b_phone}<br><b>Email:</b> ${d.b_email}<br><b>Web:</b> ${d.b_web}</div>`;
        const customerInfo = `<div style="font-size:12px; border-left:3px solid ${color}; padding-left:10px;"><b>BILL TO:</b><br>${d.c_name}<br>${d.c_addr}<br><b>GST:</b> ${d.c_gst}</div>`;
        const rows = d.items.map(it => `<tr><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.no}</td><td style="border:1px solid #ccc; padding:8px;">${it.desc}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.hsn}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.qty}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.unit}</td><td style="border:1px solid #ccc; padding:8px; text-align:right;">${it.rate}</td><td style="border:1px solid #ccc; padding:8px; text-align:center;">${it.disc}%</td><td style="border:1px solid #ccc; padding:8px; text-align:right;">${it.total}</td></tr>`).join('');
        const table = `<table width="100%" style="border-collapse:collapse; margin:20px 0; font-size:11px;"><tr style="background:${color}; color:white;"><th>No</th><th>Description</th><th>HSN</th><th>Qty</th><th>Unit</th><th>Rate</th><th>Disc</th><th>Total</th></tr>${rows}</table>`;
        const summary = `<table width="100%" style="font-size:12px; border-collapse:collapse; margin-top:20px;"><tr><td width="60%" valign="top" style="font-size:11px;"><b>Warranty:</b> ${d.e_war}<br><b>Delivery:</b> ${d.e_del}<br><b>Payment:</b> ${d.e_pay}<br><b>Terms:</b> ${d.e_terms}</td><td width="40%"><table width="100%" style="text-align:right; font-weight:bold;"><tr><td>Subtotal:</td><td>₹ ${d.s_sub}</td></tr><tr><td>Tax (${d.s_gst_r}%):</td><td>₹ ${d.s_tax}</td></tr><tr style="font-size:18px; color:${color}; border-top:2px solid #333;"><td>TOTAL:</td><td>₹ ${d.s_grand}</td></tr></table></td></tr></table><div style="margin-top:40px; text-align:right; font-size:12px;">${d.f_thank}<br><br><b>For ${d.b_name}</b><br><br><br>Authorized Signatory</div>`;

      switch(id) {
            case 1: // Classic Business Layout
                return wrapS + `<center>${d.logo}${sellerInfo}</center><hr color="${color}"><table width="100%"><tr><td width="50%">${customerInfo}</td><td width="50%" align="right"><b>Ref:</b> ${d.q_no}<br><b>Date:</b> ${d.q_date}<br><b>POS:</b> ${d.q_pos}</td></tr></table>${table}${summary}</div>`;

            case 2: // Modern SaaS Style
                return wrapS + `<table width="100%" bgcolor="${color}" style="color:white; padding:25px; margin:-30px -30px 20px -30px;"><tr><td>${d.logo}</td><td align="right">${sellerInfo}</td></tr></table><table width="100%"><tr><td>${customerInfo}</td><td align="right"><b>Quotation:</b> ${d.q_no}</td></tr></table>${table}${summary}</div>`;

            case 3: // Minimal Clean Template
                return wrapS + `<div style="border-bottom:1px solid #eee; padding-bottom:15px; margin-bottom:20px;">${sellerInfo}</div><table width="100%"><tr><td width="60%">${customerInfo}</td><td width="40%" align="right" valign="top">${d.logo}<br><b># ${d.q_no}</b></td></tr></table>${table}${summary}</div>`;

            case 4: // Box Layout Template
                return wrapS + `<table width="100%" border="1" style="border-collapse:collapse; margin-bottom:15px;"><tr><td style="padding:20px;">${d.logo}</td><td style="padding:20px;" align="right">${sellerInfo}</td></tr></table><div style="border:1px solid #ddd; padding:15px;">${customerInfo}</div>${table}${summary}</div>`;

            case 5: // Corporate Proposal Style
                return wrapS + `<div style="background:${color}; color:white; padding:40px; text-align:center; margin:-30px -30px 20px -30px;"><h1>OFFICIAL PROPOSAL</h1>${d.b_name}</div><table width="100%"><tr><td width="50%">${sellerInfo}</td><td width="50%" align="right">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 6: // Vertical Sidebar Layout
                return wrapS + `<table width="100%" height="100%"><tr><td width="35%" bgcolor="${color}" style="color:white; padding:20px;" valign="top">${d.logo}<br><br>${sellerInfo}</td><td width="65%" style="padding:20px;" valign="top"><h1 style="color:${color}; margin-top:0;">QUOTATION</h1>${customerInfo}<br>${table}${summary}</td></tr></table></div>`;

            case 7: // Elegant Premium Layout
                return wrapS + `<div style="border-bottom:5px double #d4af37; padding-bottom:15px; margin-bottom:25px;">${d.logo}<br>${sellerInfo}</div><center>${customerInfo}</center>${table}${summary}</div>`;

            case 8: // Compact Business Format
                return wrapS + `<div style="font-size:11px;"><table width="100%"><tr><td>${sellerInfo}</td><td align="right">${d.logo}</td></tr></table><hr size="1" color="${color}">${customerInfo}${table}${summary}</div>`;

            case 9: // Full Width Professional Layout
                return wrapS + `<div style="border-bottom:4px solid ${color}; padding-bottom:10px; margin-bottom:20px;"><h1 style="margin:0; letter-spacing:5px;">QUOTATION</h1></div><table width="100%"><tr><td>${sellerInfo}</td><td align="right">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 10: // Card Based Layout
                return wrapS + `<div style="padding:20px; background:#f4f4f4; border-radius:15px; margin-bottom:20px;">${d.logo}${sellerInfo}</div><div style="padding:20px; border:1px solid #ddd; border-radius:15px;">${customerInfo}</div>${table}${summary}</div>`;

            case 11: // Left Aligned Professional Layout
                return wrapS + `<div style="text-align:left;">${d.logo}<br>${sellerInfo}<br><div style="border-left:8px solid ${color}; padding-left:15px;">${customerInfo}</div></div>${table}${summary}</div>`;

            case 12: // Highlighted Summary Layout
                return wrapS + `<table width="100%"><tr><td>${d.logo}</td><td align="right"># ${d.q_no}</td></tr></table><hr>${sellerInfo}<br>${customerInfo}${table}<div style="background:${color}11; padding:20px;">${summary}</div></div>`;

            case 13: // Detailed Quotation Layout
                return wrapS + `<h2 style="background:#eee; padding:10px; color:${color}; text-align:center;">PRICE ESTIMATION</h2><table width="100%"><tr><td valign="top" style="border-right:1px solid #eee;">${sellerInfo}</td><td valign="top" align="right">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 14: // Grid Based Layout
                return wrapS + `<table width="100%" border="1" style="border-collapse:collapse;"><tr><td style="padding:20px;">${d.logo}<br>${sellerInfo}</td><td style="padding:20px;">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 15: // Document Style Layout
                return wrapS + `<center><h2 style="text-decoration:underline;">MEMORANDUM OF QUOTATION</h2></center><br>${sellerInfo}<br><table width="100%" border="1" style="border-collapse:collapse;"><tr><td style="padding:10px;">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 16: // Startup Style Layout
                return wrapS + `<div style="background:linear-gradient(45deg, ${color}, #666); color:white; padding:30px; border-radius:20px; margin-bottom:20px;"><table width="100%"><tr><td>${d.logo}</td><td align="right"><b>REF:</b> ${d.q_no}</td></tr></table></div>${sellerInfo}<hr>${customerInfo}${table}${summary}</div>`;

            case 17: // High Contrast Layout
                return wrapS + `<div style="background:#333; color:white; padding:30px; margin:-30px -30px 20px -30px;"><table width="100%"><tr><td><h1 style="margin:0; color:${color}">ESTIMATE</h1></td><td align="right">${d.b_web}</td></tr></table></div>${sellerInfo}<br>${customerInfo}${table}${summary}</div>`;

            case 18: // Table Focused Layout
                return wrapS + `<table width="100%"><tr><td>${sellerInfo}</td><td align="right">${d.logo}</td></tr></table><div style="text-align:center; background:#eee; padding:8px; margin:15px 0;"><b>QUOTATION SCHEDULE</b></div>${customerInfo}${table}${summary}</div>`;

            case 19: // Section Divider Layout
                return wrapS + `<h1 style="color:${color}; margin:0; font-size:30px;">${d.b_name}</h1><div style="height:3px; background:${color}; margin:5px 0;"></div><div style="height:8px; background:${color}; margin:5px 0;"></div><table width="100%" style="margin-top:20px;"><tr><td>${sellerInfo}</td><td align="right">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 20: // Elegant Minimal Layout
                return wrapS + `<div style="text-align:center; font-family:serif;">${d.logo}<br><h2 style="letter-spacing:10px; border-bottom:1px solid #000; display:inline-block; padding-bottom:5px;">PROPOSAL</h2><p>${d.q_date}</p></div><br>${sellerInfo}<br>${customerInfo}${table}${summary}</div>`;

            case 21: // Balanced Two Column Layout
                return wrapS + `<table width="100%"><tr><td width="50%" valign="top" style="border-right:1px solid #eee; padding-right:15px;">${sellerInfo}</td><td width="50%" align="right" valign="top" style="padding-left:15px;">${customerInfo}</td></tr></table><br>${table}${summary}</div>`;

            case 22: // Highlight Header Layout
                return wrapS + `<div style="background:${color}; color:white; padding:30px; margin-bottom:25px; border-radius:0 0 50px 50px;"><h1>QUOTATION</h1>${d.b_name}</div><table width="100%"><tr><td>${sellerInfo}</td><td align="right">${customerInfo}</td></tr></table>${table}${summary}</div>`;

            case 23: // Clean Invoice Style Layout
                return wrapS + `<div style="border:1px solid #ccc; padding:20px;"><table width="100%"><tr><td>${sellerInfo}</td><td align="right"><h2>QUOTATION</h2></td></tr></table></div><br>${customerInfo}${table}${summary}</div>`;

            case 24: // Structured Business Layout
                return wrapS + `<div style="background:#f9f9f9; padding:15px; border:1px solid #ddd; margin-bottom:15px;"><b>REFERENCE:</b> ${d.q_no} | <b>DATE:</b> ${d.q_date} | <b>POS:</b> ${d.q_pos}</div>${sellerInfo}<hr>${customerInfo}${table}${summary}</div>`;

            case 25: // Premium Corporate Proposal Layout
                return wrapS + `<div style="border:10px double ${color}; padding:25px;"><center>${d.logo}<h1 style="margin:0;">OFFICIAL PROPOSAL</h1>${sellerInfo}</center><hr color="${color}">${customerInfo}${table}${summary}</div>`;

            default:
                return wrapS + `<table width="100%"><tr><td>${d.logo}</td><td align="right">${sellerInfo}</td></tr></table><hr>${customerInfo}${table}${summary}</div>`;
        }
}
    function exportWord() {
        const content = document.getElementById('render-target').innerHTML;
        const source = `<html><head><meta charset='utf-8'><style>table{border-collapse:collapse; width:100%;} td,th{border:1px solid #ccc; padding:5px; font-family:Arial;}</style></head><body>${content}</body></html>`;
        const blob = new Blob(['\ufeff', source], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `Quotation_${document.getElementById('q_no').value}.doc`;
        link.click();
    }

    window.onload = init;
</script>
</body>
</html>
