<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WELCOME TO THE LOGIN PAGE OF SMART INVOICE PRO</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            border: 20px solid black;
            box-sizing: border-box;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-btn-container {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            background: #ffffff;
            color: black;
            border: 4px solid black;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 8px 8px 0px #7FFFD4, 14px 14px 0px black;
            text-transform: uppercase;
        }

        .title-box {
            background: #7FFFD4;
            color: black;
            border: 10px solid black;
            border-top-color: #ffffff;
            border-left-color: #ffffff;
            border-bottom-color: #004d40;
            border-right-color: #004d40;
            box-shadow: 15px 15px 0px black;
            text-align: center;
            padding: 30px 50px;
            margin: 40px 20px;
            width: 85%;
            max-width: 1000px;
        }

        .title-box h1 {
            margin: 0;
            text-decoration: underline;
            font-size: 2.5rem;
            font-weight: 900;
            text-shadow: 3px 3px 0px white;
        }

        .image-container {
            width: 90%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 50px;
        }

        .image-container img {
            width: 100%;
            height: auto;
            border: 6px solid black;
            box-shadow: 15px 15px 0px #7FFFD4, 22px 22px 0px black;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; padding: 40px; border: 6px solid black;
            box-shadow: 15px 15px 0px #7FFFD4, 22px 22px 0px black;
            width: 90%; max-width: 450px;
        }

        .modal-content label { font-weight: 900; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .modal-content input, .modal-content select {
            width: 100%; padding: 12px; margin-bottom: 20px; border: 3px solid black;
            box-sizing: border-box; font-weight: bold; box-shadow: 5px 5px 0px black;
        }
        .modal-content input[readonly] { background: #e0e0e0; }

        .submit-btn {
            width: 100%; padding: 15px; background: #7FFFD4; color: black; border: 4px solid black;
            font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 6px 6px 0px black;
        }
        .cancel-btn {
            width: 100%; padding: 12px; margin-top: 15px; background: black; color: white; border: none; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-btn-container">
        <button class="action-btn" onclick="openModal('owner')">REGISTER AS AN OWNER</button>
        <button class="action-btn" onclick="openModal('staff')">REGISTER AS A STAFF MEMBER</button>
    </div>

    <div class="title-box">
        <h1>WELCOME TO THE LOGIN PAGE OF SMART INVOICE PRO</h1>
    </div>

    <div class="image-container">
        <img src="gst.jpg" alt="GST Image">
    </div>

    <!-- OWNER MODAL -->
    <div id="modal-owner" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; text-decoration:underline;">OWNER LOGIN</h2>
            <div id="google-btn-owner" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
            
            <div id="form-owner" style="display: none;">
                <label>Business ID (Auto-Generated)</label>
                <input type="text" id="owner_biz_id" readonly>
                <label>Google ID</label>
                <input type="text" id="owner_google_id" readonly>
                <label>Owner Email</label>
                <input type="email" id="owner_email" readonly>
                <label>Business Name</label>
                <input type="text" id="owner_biz_name" placeholder="Enter Business Name" required>
                <button class="submit-btn" onclick="submitOwner()">SUBMIT</button>
            </div>
            <button class="cancel-btn" onclick="closeModal('owner')">CANCEL</button>
        </div>
    </div>

    <!-- STAFF MODAL -->
    <div id="modal-staff" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; text-decoration:underline;">STAFF LOGIN</h2>
            <div id="google-btn-staff" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
            
            <div id="form-staff" style="display: none;">
                <label>Business ID (Ask Owner)</label>
                <input type="text" id="staff_biz_id" placeholder="Paste Business ID here" required>
                <label>Google ID</label>
                <input type="text" id="staff_google_id" readonly>
                <label>Staff Name</label>
                <input type="text" id="staff_name" readonly>
                <label>Role</label>
                <input type="text" value="staff" readonly>
                <label>Email</label>
                <input type="email" id="staff_email" readonly>
                <label>Status</label>
                <select id="staff_status">
                    <option value="Active">Active</option>
                    <option value="Disabled">Disabled</option>
                </select>
                <button class="submit-btn" onclick="submitStaff()">SUBMIT</button>
            </div>
            <button class="cancel-btn" onclick="closeModal('staff')">CANCEL</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kqqlrtsmcrjbupigvofe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxcWxydHNtY3JqYnVwaWd2b2ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDE4MzYsImV4cCI6MjA4OTY3NzgzNn0.PfJelqOhMBx_1gAtTWyM09qBTXtEoBzlezaavScyQF4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let activeRole = ''; 
        let tempPayload = null;

        function openModal(role) {
            activeRole = role;
            document.getElementById(`modal-${role}`).style.display = 'flex';
            document.getElementById(`form-${role}`).style.display = 'none';
            document.getElementById(`google-btn-${role}`).style.display = 'flex';

            google.accounts.id.initialize({
                client_id: "68135849389-j91ihmh5ser165q8rgudsstb1c1e6ctt.apps.googleusercontent.com",
                callback: handleGoogle
            });
            google.accounts.id.renderButton(document.getElementById(`google-btn-${role}`), { theme: "filled_blue", size: "large" });
        }

        function closeModal(role) {
            document.getElementById(`modal-${role}`).style.display = 'none';
        }

        async function handleGoogle(response) {
            const payload = JSON.parse(window.atob(response.credential.split('.')[1]));
            tempPayload = payload;

            const { data: user } = await supabase.from('users').select('*').eq('email', payload.email).single();

            if (user) {
                if (user.role !== activeRole) return alert(`Email already registered as ${user.role}.`);
                if (user.status === 'Disabled') return alert("Your account is disabled.");
                
                // Login Success
                localStorage.setItem('userRole', user.role);
                localStorage.setItem('userEmail', user.email);
                window.location.replace("index.html"); // Go to main app
            } else {
                // New User - Show Form
                document.getElementById(`google-btn-${activeRole}`).style.display = 'none';
                document.getElementById(`form-${activeRole}`).style.display = 'block';

                if (activeRole === 'owner') {
                    document.getElementById('owner_biz_id').value = crypto.randomUUID();
                    document.getElementById('owner_google_id').value = payload.sub;
                    document.getElementById('owner_email').value = payload.email;
                } else {
                    document.getElementById('staff_google_id').value = payload.sub;
                    document.getElementById('staff_email').value = payload.email;
                    document.getElementById('staff_name').value = payload.name;
                }
            }
        }

        async function submitOwner() {
            const bid = document.getElementById('owner_biz_id').value;
            const bname = document.getElementById('owner_biz_name').value;
            if(!bname) return alert("Enter Business Name");

            await supabase.from('business').insert([{ business_id: bid, owner_id: tempPayload.sub, business_name: bname, owner_email: tempPayload.email, google_id: tempPayload.sub }]);
            await supabase.from('users').insert([{ id: crypto.randomUUID(), user_uid: tempPayload.sub, name: tempPayload.name, role: 'owner', email: tempPayload.email, business_id: bid, status: 'Active', google_id: tempPayload.sub }]);

            localStorage.setItem('userRole', 'owner');
            localStorage.setItem('userEmail', tempPayload.email);
            window.location.replace("index.html");
        }

        async function submitStaff() {
            const bid = document.getElementById('staff_biz_id').value;
            if(!bid) return alert("Enter Business ID");

            const { data: biz } = await supabase.from('business').select('*').eq('business_id', bid).single();
            if(!biz) return alert("Invalid Business ID");

            await supabase.from('users').insert([{ id: crypto.randomUUID(), user_uid: tempPayload.sub, name: tempPayload.name, role: 'staff', email: tempPayload.email, business_id: bid, status: document.getElementById('staff_status').value, google_id: tempPayload.sub }]);

            localStorage.setItem('userRole', 'staff');
            localStorage.setItem('userEmail', tempPayload.email);
            window.location.replace("index.html");
        }
    </script>
</body>
</html>
