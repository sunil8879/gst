<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Invoice Pro - Login</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #f0f0f0;
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
        }

        /* 3D TITLE BOX (Black, White, Aquamarine) */
        .title-box {
            background: #7FFFD4; color: black;
            border: 8px solid black;
            border-top: 10px solid #ffffff;
            border-left: 10px solid #ffffff;
            border-bottom: 12px solid #000000;
            border-right: 10px solid #000000;
            box-shadow: 15px 15px 0px #000000;
            text-align: center; padding: 20px 40px; margin: 40px 20px 20px;
            width: 85%; max-width: 900px;
        }

        .title-box h1 {
            margin: 0; font-size: 2.2rem; font-weight: 900;
            text-transform: uppercase; text-decoration: underline; text-decoration-thickness: 4px;
            text-shadow: 2px 2px 0px #ffffff;
        }

        /* COLLAPSED BUTTONS CONTAINER (Top Center) */
        .btn-container {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 30px;
        }

        /* STYLISH BLUE BUTTONS WITH HIGH INTENSITY BEVEL */
        .action-btn {
            background: #007BFF; color: white;
            border: 5px solid #002244;
            border-top: 6px solid #80bdff;
            border-left: 6px solid #80bdff;
            border-bottom: 8px solid #001a33;
            border-right: 6px solid #001a33;
            box-shadow: 8px 8px 0px #000000;
            padding: 15px 30px; font-size: 1.1rem; font-weight: 900;
            cursor: pointer; text-transform: uppercase; transition: 0.1s;
        }
        .action-btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #000000; border-top: 6px solid #001a33; border-left: 6px solid #001a33; border-bottom: 8px solid #80bdff; border-right: 6px solid #80bdff; }

        /* FULL SIZE IMAGE CONTAINER */
        .image-container {
            width: 90%; max-width: 800px; margin: 0 auto 40px; text-align: center;
        }
        .image-container img {
            width: 100%; height: auto; border: 5px solid black; box-shadow: 12px 12px 0px #7FFFD4;
        }

        /* FORMS CONTAINER */
        .form-section {
            display: none; /* Collapsed initially */
            background: white; border: 5px solid black; box-shadow: 12px 12px 0px #7FFFD4;
            padding: 35px; width: 90%; max-width: 600px; margin-bottom: 40px; box-sizing: border-box;
        }

        .form-section h2 { margin-top: 0; border-bottom: 4px solid black; padding-bottom: 10px; text-transform: uppercase; text-align: center; }

        /* FORM INPUTS */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { font-weight: 900; font-size: 0.85rem; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 3px solid black; box-sizing: border-box;
            font-weight: 700; font-size: 1rem; box-shadow: 5px 5px 0px black; font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group select:focus { outline: none; background: #e0f7fa; transform: translate(-2px, -2px); box-shadow: 7px 7px 0px black; }

        .submit-btn {
            width: 100%; padding: 15px; background: black; color: #7FFFD4; border: none;
            font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 6px 6px 0px #007BFF;
            text-transform: uppercase; margin-top: 15px; transition: 0.2s;
        }
        .submit-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px #007BFF; }

        .links { margin-top: 15px; text-align: center; font-size: 0.85rem; font-weight: 700; }
        .links a { color: #007BFF; text-decoration: none; margin: 0 10px; cursor: pointer; }
        .links a:hover { text-decoration: underline; color: black; }
    </style>
</head>
<body>

    <!-- 3D TITLE -->
    <div class="title-box">
        <h1>Welcome to Smart Invoice Pro</h1>
    </div>

    <!-- 3 BUTTONS IN COLLAPSE MODE -->
    <div class="btn-container">
        <button class="action-btn" onclick="toggleSection('signup-sec')">SIGNUP</button>
        <button class="action-btn" onclick="toggleSection('login-sec')">LOGIN</button>
        <button class="action-btn" onclick="toggleSection('gmail-sec')">GMAIL LOGIN</button>
    </div>

    <!-- FULL SIZE IMAGE PROVISION -->
    <div class="image-container" id="landing-img">
        <img src="gst.jpg" alt="GST Software" onerror="this.style.display='none'">
    </div>

    <!-- 1. SIGNUP SECTION -->
    <div id="signup-sec" class="form-section">
        <h2>Register Account</h2>
        <div class="form-group">
            <label>Status</label>
            <select id="reg_role" onchange="toggleBizIdField()">
                <option value="owner">Owner</option>
                <option value="staff">Staff</option>
            </select>
        </div>
        <div class="form-group" id="biz_id_group" style="display: none;">
            <label>Business ID (Ask your Owner)</label>
            <input type="text" id="reg_biz_id" placeholder="e.g. SI-123456">
        </div>
        <div class="form-group"><label>Name</label><input type="text" id="reg_name" required></div>
        <div class="form-group"><label>Business Name</label><input type="text" id="reg_biz_name" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="reg_email" required></div>
        <div class="form-group"><label>Password (Min 6 chars)</label><input type="password" id="reg_password" required></div>
        
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1;"><label>Gender</label><select id="reg_gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
            <div class="form-group" style="flex:1;"><label>Age</label><input type="number" id="reg_age"></div>
        </div>

        <div class="form-group"><label>Address</label><input type="text" id="reg_address"></div>
        
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex:1;"><label>City</label><input type="text" id="reg_city"></div>
            <div class="form-group" style="flex:1;"><label>State</label><input type="text" id="reg_state"></div>
        </div>

        <div class="form-group"><label>WhatsApp No.</label><input type="text" id="reg_wa"></div>
        <button class="submit-btn" onclick="handleSignup()">SIGNUP NOW</button>
    </div>

    <!-- 2. LOGIN SECTION -->
    <div id="login-sec" class="form-section">
        <h2>Secure Login</h2>
        <div class="form-group">
            <label>Status</label>
            <select id="login_role">
                <option value="owner">Owner</option>
                <option value="staff">Staff</option>
            </select>
        </div>
        <div class="form-group"><label>Email</label><input type="email" id="login_email" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="login_password" required></div>
        <button class="submit-btn" onclick="handleLogin()">LOGIN</button>
        <div class="links">
            <a onclick="alert('Please contact support to recover your password.')">Forgot Password?</a> | 
            <a onclick="alert('Please contact support to recover your email.')">Forgot Email?</a>
        </div>
    </div>

    <!-- 3. GMAIL LOGIN SECTION -->
    <div id="gmail-sec" class="form-section" style="text-align: center;">
        <h2>GMAIL LOGIN (OWNERS ONLY)</h2>
        <p style="font-weight: 700; font-size: 0.85rem; color: #555; margin-bottom: 25px;">Click the button below to instantly sign in or register as a Business Owner securely using Google.</p>
        <div id="g_id_onload"
             data-client_id="68135849389-j91ihmh5ser165q8rgudsstb1c1e6ctt.apps.googleusercontent.com"
             data-callback="onGoogleLogin">
        </div>
        <div class="g_id_signin" data-type="standard" data-theme="filled_blue" data-size="large" style="display:flex; justify-content:center;"></div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://kqqlrtsmcrjbupigvofe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxcWxydHNtY3JqYnVwaWd2b2ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDE4MzYsImV4cCI6MjA4OTY3NzgzNn0.PfJelqOhMBx_1gAtTWyM09qBTXtEoBzlezaavScyQF4';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);




        // --- NEW: AUTO-REDIRECT IF ALREADY LOGGED IN ---
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                // Force redirect and bypass browser cache
                window.location.href = "index.html?t=" + new Date().getTime();
            }
        });



        // --- ACCORDION LOGIC ---
        function toggleSection(id) {
            document.getElementById('landing-img').style.display = 'none'; // Hide image when a form opens
            ['signup-sec', 'login-sec', 'gmail-sec'].forEach(sec => {
                document.getElementById(sec).style.display = (sec === id) ? 'block' : 'none';
            });
        }

        // Show/Hide Business ID field in Signup based on role
        function toggleBizIdField() {
            const role = document.getElementById('reg_role').value;
            document.getElementById('biz_id_group').style.display = (role === 'staff') ? 'block' : 'none';
        }

        // --- SIGNUP LOGIC ---
        async function handleSignup() {
            const role = document.getElementById('reg_role').value;
            const email = document.getElementById('reg_email').value.trim();
            const password = document.getElementById('reg_password').value;
            
            if (password.length <= 6) return alert("Password must be more than 6 characters.");
            if (!email) return alert("Email is required.");

            let bizId = "";
            if (role === 'owner') {
                // 6-digit Auto ID for Owner
                bizId = "SI-" + Math.floor(100000 + Math.random() * 900000); 
            } else {
                bizId = document.getElementById('reg_biz_id').value.trim();
                if (!bizId) return alert("Staff members must enter a valid Business ID provided by the owner.");
            }

            // 1. Create Auth user
            const { data: authData, error: authErr } = await supabaseClient.auth.signUp({ email, password });
            if (authErr) return alert("Signup Failed: " + authErr.message);

            if (authData.user) {
                // 2. Insert into modified 'users' table
                const payload = {
                    user_uid: authData.user.id,
                    role: role,
                    name: document.getElementById('reg_name').value,
                    business_name: document.getElementById('reg_biz_name').value,
                    email: email,
                    gender: document.getElementById('reg_gender').value,
                    age: document.getElementById('reg_age').value || null,
                    address: document.getElementById('reg_address').value,
                    city: document.getElementById('reg_city').value,
                    state: document.getElementById('reg_state').value,
                    whatsapp_no: document.getElementById('reg_wa').value,
                    business_id: bizId,
                    status: 'Active'
                };

                const { error: dbErr } = await supabaseClient.from('users').insert([payload]);
                if (dbErr) return alert("Database Error: " + dbErr.message);

                // Sign out immediately so they are forced to log in via the Login Tab
                await supabaseClient.auth.signOut();

                if (role === 'owner') {
                    alert(`SIGNUP SUCCESSFUL!\n\nYour Unique Business ID is: ${bizId}\n\nPlease COPY and SAVE this safely to share with your staff.\n\nYou will now be redirected to the Login tab.`);
                } else {
                    alert("Staff Account Created! You will now be redirected to the Login tab.");
                }
                
                // Clear form and switch to login
                document.querySelectorAll('input').forEach(i => i.value = '');
                toggleSection('login-sec');
            }
        }

        // --- LOGIN LOGIC (EMAIL/PASSWORD) ---
        async function handleLogin() {
            const role = document.getElementById('login_role').value;
            const email = document.getElementById('login_email').value.trim();
            const password = document.getElementById('login_password').value;

            const { data: authData, error: authErr } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (authErr) return alert("Login Failed: " + authErr.message);

            // Fetch user profile
            const { data: userProfile, error: dbErr } = await supabaseClient.from('users').select('*').eq('user_uid', authData.user.id).single();
            if (dbErr || !userProfile) return alert("User profile not found. Please contact support.");

            if (userProfile.role !== role) {
                await supabaseClient.auth.signOut();
                return alert(`Access Denied: This email is registered as a ${userProfile.role.toUpperCase()}, not a ${role.toUpperCase()}.`);
            }

            if (userProfile.status !== 'Active') {
                await supabaseClient.auth.signOut();
                return alert("Account Disabled by Administrator.");
            }

            // Save essential data for index.html to use
            localStorage.setItem('businessId', userProfile.business_id);
           window.location.href = "index.html?t=" + new Date().getTime();
        }

        // --- GMAIL LOGIN LOGIC (OWNER ONLY) ---
        async function onGoogleLogin(response) {
            const { data, error } = await supabaseClient.auth.signInWithIdToken({
                provider: 'google',
                token: response.credential,
            });
            if (error) return alert("Gmail Login Failed: " + error.message);

            // Check if profile exists
            const { data: existingUser } = await supabaseClient.from('users').select('*').eq('user_uid', data.user.id).single();

            let bizId = "";
            if (!existingUser) {
                // Generate ID and create new Owner profile
                bizId = "SI-" + Math.floor(100000 + Math.random() * 900000);
                await supabaseClient.from('users').insert([{
                    user_uid: data.user.id,
                    role: 'owner',
                    name: data.user.user_metadata.full_name,
                    business_name: 'My Business',
                    email: data.user.email,
                    business_id: bizId,
                    status: 'Active'
                }]);
                
                alert(`GMAIL REGISTRATION SUCCESSFUL!\n\nYour Unique Business ID is: ${bizId}\n\nPlease COPY and SAVE this to share with your staff.`);
            } else {
                if (existingUser.role !== 'owner') {
                    await supabaseClient.auth.signOut();
                    return alert("This email is registered as Staff. Gmail Login is restricted to Owners only.");
                }
                bizId = existingUser.business_id;
            }

            localStorage.setItem('businessId', bizId);
           window.location.href = "index.html?t=" + new Date().getTime();
        }
    </script>
</body>
</html>
