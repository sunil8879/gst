<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARCODE GENERATOR PRO - 500 STYLES</title>
    <!-- Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #1e293b; --s: #334155; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .no-print { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; }
        h3 { background: var(--p); color: white; padding: 8px; font-size: 11px; border-radius: 4px; text-transform: uppercase; margin: 20px 0 10px 0; }
        
        .template-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-height: 150px; overflow-y: auto; background: #e2e8f0; padding: 10px; border-radius: 8px; margin-top:10px; }
        .tpl-btn { padding: 8px 0; border: none; cursor: pointer; color: white; font-size: 9px; font-weight: bold; border-radius: 3px; }
        .tpl-btn.active { outline: 2px solid black; transform: scale(1.1); z-index: 5; }

        .preview-box { display: flex; flex-direction:column; align-items: center; background: #475569; padding: 60px 10px; margin-top: 20px; border-radius: 10px; }
        #render-target { background: white; padding: 20px; box-sizing: border-box; display: inline-block; min-width: 350px; text-align: center; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn-act { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; color: white; text-transform: uppercase; display: flex; align-items: center; gap: 8px; font-size: 13px; }

        @media print { .no-print { display: none !important; } .preview-box { background: white; padding: 0; } #render-target { border: none !important; box-shadow: none; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1><i class="fas fa-barcode"></i>  Custom Barcode Generator for Inventory and Internal Use Only</h1>

    <h3>1. Barcode Configuration</h3>
    <div class="form-grid">
        <div class="field"><label>Text to Encode (Enter Product ID / SKU / Invoice No)</label><input type="text" id="v_text" value="SKU-9908821" oninput="generate()"></div>
        <div class="field"><label>Barcode Type</label>
            <select id="v_type" onchange="generate()">
                <option value="CODE128">Code 128 (Recommended)</option>
                <option value="CODE39">Code 39</option>
                <option value="EAN13">EAN-13 (Numeric Only)</option>
                <option value="UPC">UPC-A (Numeric Only)</option>
                <option value="QR">QR Code</option>
            </select>
        </div>
        <div class="field"><label>Description (Optional)</label><input type="text" id="v_desc" value="Inventory Asset Label" oninput="generate()"></div>
    </div>

    <h3>2. Size & Display Settings</h3>
    <div class="form-grid">
        <div class="field"><label>Barcode Width</label><input type="range" id="s_width" min="1" max="4" step="0.5" value="2" oninput="generate()"></div>
        <div class="field"><label>Barcode Height</label><input type="range" id="s_height" min="20" max="150" value="60" oninput="generate()"></div>
        <div class="field"><label>Show Text Below</label>
            <select id="s_showtext" onchange="generate()">
                <option value="true">Yes</option>
                <option value="false">No</option>
            </select>
        </div>
        <div class="field"><label>Margin</label><input type="number" id="s_margin" value="10" oninput="generate()"></div>
        <div class="field"><label>Font Size</label><input type="number" id="s_fontsize" value="14" oninput="generate()"></div>
        <div class="field"><label>Alignment</label>
            <select id="s_align" onchange="generate()">
                <option value="center">Center</option>
                <option value="left">Left</option>
                <option value="right">Right</option>
            </select>
        </div>
    </div>

    <h3>3. Label Information (MetaData)</h3>
    <div class="form-grid">
        <div class="field"><label>Product Name</label><input type="text" id="m_name" value="Wireless Gaming Mouse" oninput="generate()"></div>
        <div class="field"><label>Price (₹)</label><input type="text" id="m_price" value="1,499" oninput="generate()"></div>
        <div class="field"><label>Category / SKU</label><input type="text" id="m_sku" value="Electronics / WGM-01" oninput="generate()"></div>
    </div>

    <p style="font-weight:bold; margin-top:20px; color:var(--p);"><i class="fas fa-palette"></i> SELECT LABEL STYLE (1-500):</p>
    <div class="template-grid" id="tpl-grid"></div>

    <div class="btn-group">
        <div class="field">
            <select id="download_format" style="height: 46px;">
                <option value="png">Format: PNG</option>
                <option value="pdf">Format: PDF</option>
                <option value="svg">Format: SVG (Barcode Only)</option>
            </select>
        </div>
        <button class="btn-act" style="background:#2563eb;" onclick="download()"><i class="fas fa-download"></i> Save / Download</button>
        <button class="btn-act" style="background:#ef4444;" onclick="resetTool()"><i class="fas fa-undo"></i> Reset</button>
    </div>
</div>

<div class="preview-box no-print">
    <div id="render-target"></div>
</div>
<script>
    let activeStyle = 1;
    const themeColors = ["#1e293b", "#b91c1c", "#047857", "#1d4ed8", "#7c3aed"];

    // --- Helper: Calculates valid Check Digit for EAN/UPC so it never errors ---
    function fixChecksum(number, length) {
        let digits = number.split('').map(Number);
        if (digits.length < length - 1) return number.padEnd(length, "0");
        
        let sum = 0;
        for (let i = 0; i < length - 1; i++) {
            let factor = (length === 13) ? (i % 2 === 0 ? 1 : 3) : (i % 2 === 0 ? 3 : 1);
            sum += digits[i] * factor;
        }
        let checkDigit = (10 - (sum % 10)) % 10;
        return number.substring(0, length - 1) + checkDigit;
    }

    const Modules = {
        borders: [
            (c) => `border: 2px solid ${c};`,
            (c) => `border: 1px solid #ddd; box-shadow: 10px 10px 0px ${c};`,
            (c) => `border: 4px double ${c}; padding: 5px; outline: 1px solid #eee;`,
            (c) => `border-top: 12px solid ${c}; border-bottom: 1px solid #ddd; border-left: 1px solid #ddd; border-right: 1px solid #ddd;`,
            (c) => `border: 2px solid #000; border-radius: 12px;`
        ],
        headers: [
            (d, c) => `<div style="text-align:${d.align}; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:10px;"><b style="color:${c}; font-size:1.1em;">${d.pName}</b><br><small>${d.pSku}</small></div>`,
            (d, c) => `<div style="background:${c}; color:white; padding:10px; margin:-20px -20px 10px -20px; text-align:center;"><b>${d.pName}</b></div>`,
            (d, c) => `<table width="100%"><tr><td><b>${d.pName}</b></td><td align="right"><b style="color:${c}">₹${d.pPrice}</b></td></tr></table><hr style="border:0; border-top:1px solid #ddd;">`,
            (d, c) => `<div style="border-left:5px solid ${c}; padding-left:10px; margin-bottom:10px;"><b>${d.pName}</b><br><small>${d.pDesc}</small></div>`,
            (d, c) => `<div style="text-align:center;"><i>${d.pSku}</i><h2 style="margin:5px 0;">${d.pName}</h2></div>`
        ],
        layouts: [
            (d, barHtml) => `<div style="text-align:${d.align}">${barHtml}<br><b>Price: ₹${d.pPrice}</b></div>`,
            (d, barHtml) => `<table width="100%"><tr><td width="70%">${barHtml}</td><td align="right" valign="middle"><b>₹${d.pPrice}</b></td></tr></table>`,
            (d, barHtml) => `<div style="background:#f8fafc; padding:10px; border:1px solid #eee;">${barHtml}</div><div style="margin-top:5px; font-size:10px;">${d.pDesc}</div>`,
            (d, barHtml) => `<div style="display:flex; flex-direction:column; align-items:center;">${barHtml}<div style="margin-top:10px; border:2px solid #000; padding:4px 12px; font-weight:bold;">MRP: ₹${d.pPrice}</div></div>`
        ]
    };

    function generate() {
        const id = activeStyle - 1;
        const color = themeColors[id % 5];
        let val = document.getElementById('v_text').value || "123456789012";
        const type = document.getElementById('v_type').value;

        // --- SANITIZE AND FIX FOR UPC / EAN13 ---
        if (type === "UPC" || type === "EAN13") {
            val = val.replace(/\D/g, ""); // Keep numbers only
            if (val === "") val = "123456789012";
            
            if (type === "UPC") {
                val = fixChecksum(val.substring(0, 11).padEnd(11, "0"), 12);
            } else {
                val = fixChecksum(val.substring(0, 12).padEnd(12, "0"), 13);
            }
        }

        const d = {
            pName: document.getElementById('m_name').value,
            pPrice: document.getElementById('m_price').value,
            pSku: document.getElementById('m_sku').value,
            pDesc: document.getElementById('v_desc').value,
            align: document.getElementById('s_align').value
        };

        const border = Modules.borders[Math.floor(id / 5) % 5](color);
        const header = Modules.headers[Math.floor(id / 25) % 5](d, color);
        const layout = Modules.layouts[Math.floor(id / 125) % 4];

        let barContent = (type === "QR") ? `<div id="qrcode_box" style="display:inline-block; background:white; padding:5px;"></div>` 
                                         : `<svg id="barcode_svg" style="background:white;"></svg>`;

        document.getElementById('render-target').innerHTML = `
            <div id="capture-area" style="${border} background:white; padding:20px; font-family:sans-serif; min-width:300px;">
                ${header} ${layout(d, barContent)}
            </div>`;

        if (type === "QR") {
            new QRCode(document.getElementById("qrcode_box"), { text: val, width: 120, height: 120 });
        } else {
            try {
                JsBarcode("#barcode_svg", val, {
                    format: type,
                    width: parseFloat(document.getElementById('s_width').value),
                    height: parseFloat(document.getElementById('s_height').value),
                    displayValue: document.getElementById('s_showtext').value === "true",
                    fontSize: parseInt(document.getElementById('s_fontsize').value),
                    margin: parseInt(document.getElementById('s_margin').value),
                    flat: true
                });
            } catch (e) {
                document.getElementById('barcode_svg').innerHTML = `<text y="20" x="10" fill="red" font-size="12">Barcode Logic Error</text>`;
            }
        }
    }

    async function download() {
        const format = document.getElementById('download_format').value;
        const element = document.getElementById('capture-area');
        if (format === "svg") {
            const svg = document.getElementById('barcode_svg');
            if (!svg) { alert("SVG format only for Barcodes"); return; }
            const svgData = new XMLSerializer().serializeToString(svg);
            const blob = new Blob([svgData], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = "label.svg"; a.click();
        } else if (format === "png") {
            const canvas = await html2canvas(element);
            const link = document.createElement('a'); link.download = 'label.png'; link.href = canvas.toDataURL(); link.click();
        } else if (format === "pdf") {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(element);
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 15);
            pdf.save("label.pdf");
        }
    }

 function resetTool() {
    // 1. Reset all Input Fields
    document.getElementById('v_text').value = "BCODE-9901";
    document.getElementById('v_type').value = "CODE128";
    document.getElementById('s_width').value = 2;
    document.getElementById('s_height').value = 60;
    document.getElementById('s_margin').value = 10;
    document.getElementById('s_showtext').value = "true";
    document.getElementById('s_fontsize').value = 14;
    document.getElementById('s_align').value = "center";
    document.getElementById('m_name').value = "Wireless Gaming Mouse";
    document.getElementById('m_price').value = "1,499";
    document.getElementById('m_sku').value = "Electronics / WGM-01";
    
    // 2. Reset the Template Style to #1
    activeStyle = 1;

    // 3. Force Refresh the Preview
    generate();
}
    const grid = document.getElementById('tpl-grid');
    for (let i = 1; i <= 500; i++) {
        const btn = document.createElement('button');
        btn.className = 'tpl-btn'; btn.style.background = themeColors[(i-1) % 5]; btn.innerText = i;
        btn.onclick = () => { activeStyle = i; generate(); };
        grid.appendChild(btn);
    }
    window.onload = generate;
</script>
</body>
</html>
